<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Természetismeret Játék 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --grass:#22c55e;--grass-light:#4ade80;
  --earth:#f59e0b;--earth-dark:#92400e;
  --sun:#fbbf24;--sun-warm:#f59e0b;
  --water:#38bdf8;--water-light:#7dd3fc;
  --true-col:#22c55e;--true-bg:rgba(34,197,94,0.12);
  --false-col:#f43f5e;--false-bg:rgba(244,63,94,0.12);
  --card-bg:rgba(30,30,50,0.85);--text-dark:#f0f0f8;--text-mid:#94a3b8;
  --accent:#7c3aed;--accent2:#0ea5e9;
  --border:rgba(255,255,255,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#12121f;color:var(--text-dark);overflow-x:hidden;}
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(110vh) scale(0);opacity:0}10%{opacity:.7}90%{opacity:.2}100%{transform:translateY(-10vh) scale(1.2);opacity:0}}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-deco::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(124,58,237,.10) 0%,transparent 70%);}
.bg-deco::after{content:'';position:absolute;bottom:-20%;left:10%;width:80%;height:60%;background:radial-gradient(ellipse at 50% 100%,rgba(34,197,94,.06) 0%,transparent 70%);}
.sun-fixed{display:none;}
#app{position:relative;z-index:2;max-width:860px;margin:0 auto;padding:16px 14px 70px;}
header{text-align:center;padding:32px 10px 14px;}
header h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:2.4rem;font-weight:400;color:#fff;letter-spacing:-.01em;line-height:1.1;text-shadow:0 0 40px rgba(124,58,237,.5);}
header h1 em{color:#7c3aed;font-style:normal;}
header p{margin-top:6px;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#334155;font-weight:500;}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:none}}
.card{background:rgba(22,22,40,0.90);border-radius:20px;padding:26px 24px 22px;border:1px solid var(--border);box-shadow:0 0 0 1px rgba(124,58,237,.1), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);animation:cardIn 0.35s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(12px);}
.card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none;}
.card{position:relative;}
.name-screen{text-align:center;}
.name-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.7rem;font-weight:400;color:#fff;margin-bottom:8px;text-shadow:0 0 20px rgba(124,58,237,.4);}
.name-screen p{color:var(--text-mid);font-size:.9rem;margin-bottom:24px;font-weight:400;letter-spacing:.03em;}
.name-input{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:500;padding:13px 18px;border-radius:12px;border:1px solid rgba(124,58,237,.4);width:100%;max-width:320px;text-align:center;outline:none;color:#fff;background:rgba(124,58,237,.08);box-shadow:0 0 0 0 rgba(124,58,237,0);margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;transition:border-color .2s, box-shadow .2s;}
.name-input:focus{border-color:rgba(124,58,237,.8);box-shadow:0 0 0 3px rgba(124,58,237,.2);}
.name-input::placeholder{color:#334155;}
.bigtopic-screen{text-align:center;}
.bigtopic-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.55rem;font-weight:400;color:#fff;margin-bottom:4px;}
.bigtopic-screen .sub{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:22px;}
.bigtopic-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:18px;}
.bigtopic-btn{width:100%;font-family:'DM Sans',sans-serif;font-weight:600;padding:20px 22px;border-radius:16px;border:1px solid;cursor:pointer;transition:all 0.2s;text-align:left;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
.bigtopic-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.bigtopic-btn.fuves{border-color:rgba(34,197,94,.3);background:radial-gradient(ellipse at 30% 50%,rgba(34,197,94,.08),rgba(10,20,14,.9));color:#4ade80;}
.bigtopic-btn.fuves:hover{border-color:rgba(34,197,94,.6);background:radial-gradient(ellipse at 30% 50%,rgba(34,197,94,.15),rgba(10,20,14,.9));transform:translateY(-2px);box-shadow:0 8px 30px rgba(34,197,94,.15);}
.bigtopic-btn.vizek{border-color:rgba(56,189,248,.3);background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,.08),rgba(5,15,30,.9));color:#7dd3fc;}
.bigtopic-btn.vizek:hover{border-color:rgba(56,189,248,.6);background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,.15),rgba(5,15,30,.9));transform:translateY(-2px);box-shadow:0 8px 30px rgba(56,189,248,.15);}
.bigtopic-icon{font-size:2.4rem;flex-shrink:0;filter:drop-shadow(0 0 10px currentColor);}
.bigtopic-title{font-size:1rem;font-weight:600;color:#e2e8f0;}
.bigtopic-sub{font-size:.72rem;font-weight:400;color:var(--text-mid);margin-top:3px;letter-spacing:.02em;}
.subtopic-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.3rem;font-weight:400;color:#fff;margin-bottom:4px;text-align:center;}
.subtopic-screen.water-theme h2{color:var(--water-light);}
.subtopic-screen .sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:18px;text-align:center;}
.subtopic-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:16px;}
.subtopic-btn{font-family:'DM Sans',sans-serif;font-weight:500;font-size:.93rem;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#e2e8f0;cursor:pointer;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:11px;}
.subtopic-btn:hover{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.3);transform:translateX(4px);}
.subtopic-btn.water-style:hover{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);}
.subtopic-btn .snum{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:#475569;min-width:26px;flex-shrink:0;}
.subtopic-btn.water-style .snum{color:#475569;}
.subtopic-btn .sicon{font-size:1.3rem;flex-shrink:0;}
.subtopic-btn .stitle{font-size:.9rem;font-weight:600;}
.subtopic-btn .sstatus{font-size:.68rem;color:var(--text-mid);margin-top:1px;}
.subtopic-btn.locked{opacity:0.35;cursor:not-allowed;}
.subtopic-btn.locked:hover{transform:none;background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);}
.coming-badge{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:2px 8px;font-size:.68rem;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.ready-badge{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:2px 8px;font-size:.68rem;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.ready-badge.water{background:rgba(56,189,248,.1);color:#7dd3fc;border-color:rgba(56,189,248,.3);}
.mode-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.25rem;font-weight:400;color:#fff;margin-bottom:4px;text-align:center;}
.mode-screen.water-theme h2{color:var(--water-light);}
.mode-screen .sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:18px;text-align:center;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.mode-btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;padding:16px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.18s;text-align:center;position:relative;overflow:hidden;background:rgba(20,20,38,.85);}
.mode-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.mode-btn .btn-icon{font-size:1.8rem;display:block;margin-bottom:5px;filter:drop-shadow(0 0 8px currentColor);}
.mode-btn .btn-label{display:block;font-size:.88rem;color:#e2e8f0;}
.mode-btn .btn-sub{display:block;font-size:.66rem;font-weight:400;color:var(--text-mid);margin-top:3px;}
.mode-btn.igaz{border-color:rgba(34,197,94,.3);color:#4ade80;}
.mode-btn.igaz:hover{border-color:rgba(34,197,94,.7);background:rgba(34,197,94,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(34,197,94,.15);}
.mode-btn.kviz{border-color:rgba(56,189,248,.3);color:#7dd3fc;}
.mode-btn.kviz:hover{border-color:rgba(56,189,248,.7);background:rgba(56,189,248,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(56,189,248,.15);}
.mode-btn.lyukas{border-color:rgba(245,158,11,.3);color:#fbbf24;}
.mode-btn.lyukas:hover{border-color:rgba(245,158,11,.7);background:rgba(245,158,11,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(245,158,11,.15);}
.mode-btn.sort{border-color:rgba(244,63,94,.3);color:#fb7185;}
.mode-btn.sort:hover{border-color:rgba(244,63,94,.7);background:rgba(244,63,94,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(244,63,94,.15);}
.mode-btn.cat{border-color:rgba(124,58,237,.3);color:#a78bfa;}
.mode-btn.cat:hover{border-color:rgba(124,58,237,.7);background:rgba(124,58,237,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,58,237,.15);}
.top-bar{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.q-counter{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;color:#94a3b8;white-space:nowrap;min-width:60px;}
.back-game-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:600;background:transparent;border:1px solid rgba(255,255,255,.12);color:#475569;border-radius:12px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.back-game-btn:hover{border-color:rgba(244,63,94,.4);color:#fb7185;background:rgba(244,63,94,.07);}
.prog-wrap{flex:1;background:rgba(255,255,255,.06);border-radius:20px;height:4px;overflow:hidden;min-width:50px;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#7c3aed,#22c55e);transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.score-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:3px 11px;color:#a78bfa;white-space:nowrap;}
.timer-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);border-radius:20px;padding:3px 11px;color:#7dd3fc;white-space:nowrap;}
.pct-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:20px;padding:3px 11px;color:#4ade80;white-space:nowrap;transition:all .3s;}
.pct-pill.low{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#fb7185;}
.pass-banner{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);color:#4ade80;border-radius:14px;padding:14px 18px;font-size:1rem;font-weight:700;margin-bottom:14px;text-align:center;letter-spacing:.01em;}
.fail-banner{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.35);color:#fb7185;border-radius:14px;padding:14px 18px;font-size:.92rem;font-weight:600;margin-bottom:14px;text-align:center;line-height:1.55;}
.streak-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 11px;color:#fbbf24;white-space:nowrap;transition:all .3s;}
.streak-pill.pop{animation:streakPop 0.4s cubic-bezier(.4,0,.2,1);}
@keyframes streakPop{0%{transform:scale(1)}40%{transform:scale(1.45) rotate(-6deg)}70%{transform:scale(0.92) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.streak-pill.on-fire{background:linear-gradient(90deg,rgba(251,191,36,.2),rgba(239,68,68,.2));border-color:rgba(239,68,68,.5);color:#fca5a5;}
.streak-pill.broken{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:#fb7185;animation:streakBreak 0.45s ease;}
@keyframes streakBreak{0%{transform:scale(1)}30%{transform:scale(1.12) rotate(8deg)}65%{transform:scale(0.9) rotate(-5deg)}100%{transform:scale(1) rotate(0)}}
.diff-badge{display:inline-block;border-radius:20px;padding:3px 13px;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;margin-bottom:13px;letter-spacing:.05em;}
.diff-1{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
.diff-2{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.diff-3{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.3);}
.q-number{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:500;color:#475569;margin-bottom:5px;letter-spacing:.05em;}
.q-text{font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:500;color:#e2e8f0;line-height:1.55;margin-bottom:18px;}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px;}
.ans-btn{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;padding:15px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-true{background:rgba(34,197,94,.08);color:#4ade80;border-color:rgba(34,197,94,.3);}
.btn-false{background:rgba(244,63,94,.08);color:#fb7185;border-color:rgba(244,63,94,.3);}
.ans-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.ans-btn:disabled{cursor:default;opacity:0.7;}
.ans-btn.selected-correct{background:rgba(34,197,94,.2);border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.2);}
.ans-btn.selected-wrong{background:rgba(244,63,94,.2);border-color:#f43f5e;}
.ans-btn.reveal-correct{background:rgba(34,197,94,.15);border-color:#22c55e;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
.opt-btn{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#cbd5e1;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4;}
.opt-btn:hover:not(:disabled){background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.4);color:#e2e8f0;}
.opt-btn:disabled{cursor:default;}
.opt-btn.selected-correct{background:rgba(34,197,94,.15);border-color:#22c55e;color:#4ade80;}
.opt-btn.selected-wrong{background:rgba(244,63,94,.15);border-color:#f43f5e;color:#fb7185;}
.opt-btn.reveal-correct{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.5);}
.fill-sentence{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:400;line-height:2.5;color:#e2e8f0;margin-bottom:15px;background:rgba(255,255,255,.03);border-radius:12px;padding:15px 17px;border:1px solid rgba(255,255,255,.07);}
.fill-select{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:600;padding:4px 9px;border-radius:8px;border:1px solid rgba(124,58,237,.4);background:rgba(124,58,237,.1);color:#a78bfa;cursor:pointer;outline:none;vertical-align:middle;min-width:110px;}
.fill-select:focus{border-color:rgba(124,58,237,.8);}
.fill-select.correct{background:rgba(34,197,94,.15);border-color:#22c55e;color:#4ade80;}
.fill-select.wrong{background:rgba(244,63,94,.15);border-color:#f43f5e;color:#fb7185;}
.fill-select:disabled{cursor:default;}
.fill-hint{font-size:.8rem;color:var(--text-mid);font-weight:400;margin-bottom:13px;font-style:italic;letter-spacing:.02em;}
.feedback{border-radius:12px;padding:12px 15px;font-size:.9rem;font-weight:500;line-height:1.55;margin-bottom:13px;display:none;}
.feedback.show{display:block;animation:feedIn 0.25s ease;}
@keyframes feedIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.feedback.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.feedback.wrong{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fb7185;}
.fill-result{border-radius:12px;padding:12px 15px;font-size:.9rem;font-weight:500;line-height:1.55;margin-bottom:13px;display:none;}
.fill-result.show{display:block;animation:feedIn 0.25s ease;}
.fill-result.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.fill-result.wrong{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fb7185;}
.fill-result.partial{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24;}
.check-fill-btn{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:11px 32px;background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.4);border-radius:25px;cursor:pointer;transition:all 0.15s;display:block;margin:0 auto 13px;}
.check-fill-btn:hover{background:rgba(124,58,237,.25);border-color:rgba(124,58,237,.7);transform:translateY(-2px);}
.check-fill-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.sort-intro{font-size:.8rem;color:var(--text-mid);font-weight:400;margin-bottom:14px;font-style:italic;background:rgba(255,255,255,.03);border-radius:10px;padding:9px 13px;border:1px solid rgba(255,255,255,.07);letter-spacing:.02em;}
.sort-list{display:flex;flex-direction:column;gap:8px;margin-bottom:15px;min-height:40px;}
.sort-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:.93rem;font-weight:500;color:#e2e8f0;cursor:grab;user-select:none;display:flex;align-items:center;gap:10px;transition:all 0.15s;touch-action:none;}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:0.4;transform:scale(1.03);border-color:rgba(124,58,237,.5);}
.sort-item.drag-over{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.5);}
.sort-item.correct-item{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#4ade80;}
.sort-item.wrong-item{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:#fb7185;}
.sort-handle{font-size:1rem;opacity:0.3;flex-shrink:0;}
.sort-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;color:#475569;min-width:22px;flex-shrink:0;}
.sort-check-btn{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:11px 32px;background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.35);border-radius:25px;cursor:pointer;transition:all 0.15s;display:block;margin:0 auto 13px;}
.sort-check-btn:hover{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.6);transform:translateY(-2px);}
.sort-check-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.sort-result{border-radius:12px;padding:12px 15px;font-size:.9rem;font-weight:500;line-height:1.55;margin-bottom:13px;display:none;}
.sort-result.show{display:block;animation:feedIn .25s ease;}
.sort-result.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.sort-result.wrong{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fb7185;}
.cat-intro{font-size:.8rem;color:var(--text-mid);font-weight:400;margin-bottom:14px;font-style:italic;background:rgba(255,255,255,.03);border-radius:10px;padding:9px 13px;border:1px solid rgba(255,255,255,.07);letter-spacing:.02em;}

/* ===== TÉMA-ALAPÚ VIZUÁLIS RENDSZER ===== */
body { transition: background 1.2s cubic-bezier(.4,0,.2,1); }

/* FÜVES */
body.theme-fuves { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(20,60,20,.95) 0%, #0a1a0e 55%, #10141a 100%); }
body.theme-fuves .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(34,197,94,.18) 0%, transparent 70%); }
body.theme-fuves .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(34,197,94,.16) 0%, rgba(251,191,36,.07) 40%, transparent 70%); }
body.theme-fuves .card { border-color: rgba(34,197,94,.25) !important; box-shadow: 0 0 0 1px rgba(34,197,94,.15), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(34,197,94,.10) !important; }
body.theme-fuves .prog-fill { background: linear-gradient(90deg, #22c55e, #fbbf24); }

/* VIZEK */
body.theme-vizek { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(5,30,60,.98) 0%, #030d1e 55%, #0a0f18 100%); }
body.theme-vizek .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(56,189,248,.18) 0%, transparent 70%); }

        tananyag:{
          bevezeto:"Az őshonos puszták nemcsak az Alföldön, hanem az Északi- és a Dunántúli-középhegység melegebb, déli oldalain is megtalálhatók. Emberi beavatkozás nélkül jöttek létre: a kevés csapadék, a forró nyár és a talajviszonyok miatt a fák nem tudtak megtelepedni. A puszta uralkodó növényei a pázsitfűfélék, amelyek tökéletesen alkalmazkodtak a szeles, száraz körülményekhez. Bojtos (mellékgyökerű) gyökérzetük szorosan kapaszkodik a talajba, üreges, hajlékony szalmaszáruk ellenáll a szélnek, szárölelő leveleik védik és merevítik a szárat. Virágzataik aprók, feltűnésmentes — beporzásukat a szél végzi. Konkrét fajok: az angolperje alacsony, taposástűrő legelőfű; a siskanád magasabb, sűrű csomókban nő, szárazságtűrő; a mezeizsálya lila virágú, illatos gyógynövény, szőrös levelei csökkentik a párolgást. A mélyebb fekvésű, állandóan nedves területeken mocsárrétek alakulnak ki — buja növényzettel. Jellegzetes lakóik: a mocsári zsurló (spórás, érdes szárú, mérgező!), valamint a réti boglárka (frissen mérgező, szárítva ártalmatlan).",
          fogalmak:[
            {nev:"Mellékgyökérzet (bojtos gyökér)",leiras:"A pázsitfűfélék gyökérrendszere — sok vékony gyökér szorosan kapaszkodik a talajba, gyorsan felszívja a felszíni nedvességet, és gátolja az eróziót."},
            {nev:"Szalmaszár",leiras:"A pázsitfűfélék üreges, hajlékony szára — bütykök merevítik, és éppen hajlékonysága miatt ellenáll a folyamatos szélnek."},
            {nev:"Szárölelő levél",leiras:"A levélhüvely rásimul a szárra, védve és merevítve azt — a pázsitfűfélék jellegzetes levéltípusa."},
            {nev:"Szélbeporzás",leiras:"A pázsitfűfélék virágai aprók, feltűnésmenteresek — nem a rovarok, hanem a szél viszi át a pollent."},
            {nev:"Angolperje",leiras:"Alacsony termetű, taposást jól tűrő pázsitfűféle — fontos legelőfű, a háziállatok kedvelik."},
            {nev:"Siskanád",leiras:"Magasabb termetű, sűrű csomókban növő fűféle — jól bírja a szárazabb időszakokat is."},

            {nev:"Mocsárrét",leiras:"Mélyebben fekvő, állandóan nedves terület — belvíz vagy közeli folyók miatt a talaj mindig nedves, buja növényzet jellemzi."},
            {nev:"Mocsári zsurló",leiras:"Ősi, spórás növény — szára érdes (kovasavat tartalmaz), nincs valódi virága vagy levele. Figyelem: állatok számára mérgező!"},
            {nev:"Réti boglárka",leiras:"Élénksárga, fényes szirmú virág — nedves réteken él, frissen minden része mérgező, de szárítva (szénában) már ártalmatlan."},
          ],
          erdekes:"A mocsári zsurló az egyik legősibb szárazföldi növény — rokonai a kőszénkorszakban fa magasságúra nőttek. Mai alakja szinte változatlan 300 millió év óta. Érdes szárát régen edények súrolására használták, innen kapta a 'zsurló' nevét.",

        tananyag:{
          bevezeto:"A füves területek három jellegzetes madarát érdemes összehasonlítani. A fácán a rét talajon élő, kapirgálólábas madara: a tojó rejtőszínű barna tollazatával ülhet észrevétlenül a fészken, míg a kakas díszes tollazata párzási célokat szolgál. Az egerészölyv a rét csúcsragadozója: kb. 50 cm hosszú, de szárnyai kiterítve 120 cm-t is elérhetnek. Vitorlázórepüléssel kering a termikus áramlatokon, szitálórepüléssel figyeli a talajt, majd zuhanórepüléssel csap le a zsákmányra. A vörös vércse kisebb, galambméretű ragadozó — legjellemzőbb vadászmódja a szitálórepülés. A réti táplálkozási láncban a nyíl az energia (táplálék) áramlásának irányát mutatja: növények → szöcskék → gyík → vörös vércse. A lánc végén a lebontók (giliszta, baktériumok) zárják be a tápanyagkörforgást. A táplálkozási piramis a szintek mennyiségét is szemlélteti: alul a legtöbb termelő növény, feljebb egyre kevesebb fogyasztó, a csúcson az egyetlen egerészölyv.",

            {nev:"Tépőcsőr és fogóláb",leiras:"A ragadozó madarak (egerészölyv, vörös vércse) horgas csőre és éles, görbe karmú lába — a zsákmány megragadására és darabolására szolgál."},
            {nev:"Vitorlázórepülés",leiras:"A meleg, felszálló termikus légáramlatokat kihasználva körözés a magasban — energiatakarékos repülési mód."},
            {nev:"Szitálórepülés",leiras:"Egy helyben 'lebegés' sűrű szárnycsapásokkal — a vörös vércse és az egerészölyv is így figyeli a zsákmányt."},
            {nev:"Táplálkozási lánc",leiras:"Az élőlények közötti táplálkozási kapcsolatok sorozata — a nyíl az energia áramlásának irányát mutatja (ki kit eszik meg)."},
            {nev:"Táplálkozási piramis",leiras:"A táplálkozási szintek mennyiségi ábrázolása — csúcs felé haladva egyre kevesebb az élőlény (egy egerészölyvhez rengeteg pocok kell)."},
            {nev:"Lebontók",leiras:"Giliszta, rovarok, baktériumok — az elpusztult maradványokat ásványi anyagokra bontják, visszajuttatva a tápanyagokat a talajba."},
            {nev:"Csúcsragadozó",leiras:"A táplálkozási lánc/piramis csúcsán álló állat (pl. egerészölyv) — őt más állat nem eszi meg a természetben."},

      {id:9,icon:"🦢",title:"A vizek, vízpartok madarai",ready:true,
        tananyag:{
          bevezeto:"A vízparti madarak különböző életterekre specializálódtak — ezzel csökken a versengés a táplálékért és a fészkelőhelyért. A tőkés réce csónak alakú testű, úszóhártyás, vízlepergető tollazatú úszómadár. A fehér gólya gázlólábon jár, vitorlázórepüléssel vonul Afrikába. A gémfélék nagy telepekben költenek, hegyes csőrükkel nyársalják fel a zsákmányt. A barna rétihéja nádasokban fészkel.",
          fogalmak:[
            {nev:"Tőkés réce tollazata",leiras:"Zsíros váladék fedi a tollakat — a víz lepereg róluk, a madár nem ázik meg."},
            {nev:"Fészekhagyó fiókák",leiras:"A tőkés réce fiókái kikelés után hamar elhagyják a fészket — szemük nyitva van, szőrösek, önállóan követik az anyát."},
            {nev:"Gázlóláb",leiras:"A gólya hosszú lábú, hosszú csüdű — sekély vízben gázol, ujjai között nincs úszóhártya."},
            {nev:"Vitorlázórepülés",leiras:"A fehér gólya szárnyait mozdulatlanul tartja, meleg felszálló légáramlaton emelkedik — energiatakarékos vonulási módszer."},
            {nev:"Gémfélék",leiras:"Szürke gém, vörös gém, kis kócsag, nagy kócsag — nagy telepekben költenek, hegyes csőrükkel nyársalják fel a halat."},
            {nev:"Barna rétihéja",leiras:"Kb. 60 cm-es, 130 cm szárnyfesztávolságú ragadozó — nádasokban fészkel, békákat, vízimaderakat, siklókat, rágcsálókat eszik."},
            {nev:"Gólya vonulása",leiras:"Afrika középső és déli részére vonul — több ezer kilométeres út, vitorlázórepüléssel."},
            {nev:"Gólya fészke",leiras:"Ágakból épített, villanyoszlopra vagy kéményre rakott fészek — tavasszal a régi fészket újítják fel."},
            {nev:"Gólya lába",leiras:"Gázlóláb — hosszú lábszár és csüd, ujjai között NINCS úszóhártya. Sekély vízben gázolva vadászik."},
            {nev:"Gémek vadászmódszere",leiras:"Mozdulatlanul várakoznak a vízparton, majd villámsebesen nyársalják fel a zsákmányt hegyes csőrükkel."},
            {nev:"Rétihéja mérete",leiras:"Kb. 60 cm, szárnyfesztávolsága 130 cm — nádasokban fészkel, békákat, vízimaderakat, siklókat, rágcsálókat eszik."},
            {nev:"Gólyafiókák — fészeklakók",leiras:"A gólyafiókák fészeklakók — szüleik etetik őket. Ellentétben a réce fészekhagyó fiókáival, akik azonnal önállóak."},
            {nev:"Gémek vadászmódszere",leiras:"Mozdulatlanul állnak a vízparton, majd villámsebesen nyársalják fel a zsákmányt — energiatakarékosabb, mint az üldözés."},
            {nev:"Gólya fészkelőhely",leiras:"Villanyoszlopokra, kéményekre, épületekre rakja fészkét — az állatok alkalmazkodtak az emberi környezethez."},
          ],
          erdekes:"A fehér gólya egyáltalán nem ver szárnyat a vonulás nagy részén — meleg felszálló légáramlatokon emelkedik, majd siklva halad. Így takarítja meg az energiát az Afrikáig tartó hosszú úton.",

      {id:10,icon:"🌊",title:"A vizek, vízpartok életközössége",ready:true,
        tananyag:{
          bevezeto:"A vízi életközösségben termelők (plankton, hínár, parti növények), fogyasztók (növényevők és ragadozók) és lebontók (baktériumok, gombák, férgek, rovarlárvák) alkotnak táplálékhálózatot. A lebontók az elpusztult élőlényeket egyszerű anyagokká bontják, amelyeket a növények újra felhasználnak. A környezeti tényezők — különösen a víz hőmérséklete — szabályozzák az életközösség működését.",
          fogalmak:[
            {nev:"Táplálkozási lánc",leiras:"Termelők → elsődleges fogyasztók → másodlagos fogyasztók → csúcsragadozó. Pl.: plankton növényei → békalárva → szitakötőlárva → dévérkeszeg → lesőharcsa."},
            {nev:"Lebontók",leiras:"Baktériumok, gombák, férgek, rovarlárvák — elpusztult élőlények maradványait bontják le tápanyagokká a növények számára."},
            {nev:"Anyagok körforgása",leiras:"Az anyagok állandóan körforgásban vannak a táplálkozási láncokon keresztül — a lebontók zárják le a kört."},
            {nev:"Optimum",leiras:"Az a környezeti feltétel, amelyen az élőlény a legjobban él és szaporodik — pl. pontynak 20°C."},
            {nev:"Tűrőképesség",leiras:"Az élőlény elviseli a környezeti tényezők változásait egy bizonyos határig — ezen túl elpusztul."},
            {nev:"Szűk tűrőképesség",leiras:"Kis változást visel el — pl. sebes pisztráng csak hideg, tiszta, oxigéndús vízben él."},
            {nev:"Tág tűrőképesség",leiras:"Nagy változást is elvisel — pl. róka sokféle élőhelyen megél."},
            {nev:"Ponty hőtűrése",leiras:"+4°C alatt elvermel; 20°C-on optimális, szaporodik; 26°C felett elpusztul az oxigénhiány miatt."},
            {nev:"Euritóp faj",leiras:"Tág tűrőképességű — nagy változásokat is elvisel. Pl. ponty, róka: sokféle körülmény között megél."},
            {nev:"Sztenotóp faj",leiras:"Szűk tűrőképességű — kis változást visel el. Pl. sebes pisztráng: csak hideg, oxigéndús, tiszta vízben él."},
            {nev:"Vonuló madarak",leiras:"Szűk tűrőképességűek az évszakos változások szempontjából — télen elhagyják a hideg területeket."},
            {nev:"Életközösségi egyensúly",leiras:"Az egyensúly azt jelenti, hogy egyik faj sem szaporodik túl a másik kárára — mindenki elegendő táplálékhoz és helyhez jut."},
            {nev:"Csúcsragadozó szerepe",leiras:"Ha a csúcsragadozó eltűnik, a zsákmányfajok elszaporodnak — ez az egész táplálékhálózat egyensúlyát felborítja."},
          ],
          erdekes:"A lesőharcsa az egyik legnehezebb hazai édesvízi halunk — akár 100 kg-ot is elér! A táplálékláncban csúcsragadozóként tartja egyensúlyban a többi halfaj állományát.",
        },
        tf:[
          {text:"A vízi életközösség termelői a planktonok, a hínárosok és a parti növények.",answer:true,diff:1,explain:"Igen! A vizekben a zöld növények (planktonalgák, hínár, parti fák) a termelők, amelyek fotoszintézissel állítják elő a szerves anyagot."},
          {text:"A táplálkozási lánc nyila a zsákmánytól a fogyasztó felé mutat.",answer:true,diff:1,explain:"Igen! A nyíl az energiaáramlás irányát mutatja: aki megeszi a másikat – felé mutat."},
          {text:"A lebontók (baktériumok, gombák) a ragadozó lánc végét alkotják.",answer:false,diff:1,explain:"Nem! A lebontók külön kategória – ők az elpusztult élőlények maradványait bontják le, nem a táplálkozási lánc végén állnak."},
          {text:"A ponty 20°C körül éli meg az optimális életkörülményeket.",answer:true,diff:1,explain:"Igen! 20°C körül a ponty aktív, táplálkozik és szaporodik is – ez az optimuma."},
          {text:"A tűrőképesség azt jelenti, hogy az élőlény bármilyen körülményt elvisel.",answer:false,diff:2,explain:"Nem! A tűrőképesség a változások elviselésének KORLÁTAIT jelenti – minden élőlénynek van alsó és felső határa."},
          {text:"A sebes pisztráng szűk tűrőképességű, és csak hideg, oxigéndús vizekben él.",answer:true,diff:2,explain:"Igen! A pisztráng sztenotóp – csak szűk hőmérsékleti és oxigénhatárok között él meg."},
          {text:"A lesőharcsa a vízi táplálkozási lánc termelője.",answer:false,diff:2,explain:"Nem! A lesőharcsa csúcsragadozó – a táplálkozási lánc végén áll, fogyasztó."},
          {text:"Az egyensúly a vizek életközösségében azt jelenti, hogy egyik faj sem szaporodik el korlátlanul.",answer:true,diff:2,explain:"Igen! A táplálkozási kapcsolatok szabályozzák az egyedszámot – elöl a termelők, hátrafelé a fogyasztók és csúcsragadozók."},
          {text:"Ha a víz hőmérséklete tartósan 26°C fölé emelkedik, a ponty elpusztulhat.",answer:true,diff:3,explain:"Igen! 26°C felett a vízben kevés az oldott oxigén, és káros gázok képződnek – a ponty elpusztulhat."},
          {text:"A róka tág tűrőképességű – sok minden nem befolyásolja károsan.",answer:true,diff:3,explain:"Igen! A róka euritóp – sok különféle körülményt elvisel (éghajlat, táplálék, élőhely)."},
          {text:"A vonuló madarak szűk tűrőképességűek az évszakos változások szempontjából.",answer:true,diff:3,explain:"Igen! A vonuló madarak nem tűrik a hideg telet – el kell vonulniuk, hogy elkerüljék a számukra nem tűrhető körülményeket."},
          {text:"Ha egy vízből kipusztul a csúcsragadozó, a többi halfaj elszaporodik, ami az egész életközösség egyensúlyát felborítja.",answer:true,diff:3,explain:"Igen! Csúcsragadozó nélkül az alacsonyabb szintű fogyasztók elszaporodnak, táplálékuk elfogy, az egyensúly felbomlik."},

      {id:11,icon:"♻️",title:"A vizek szennyezése. A vizes élőhelyek védelme",ready:true,
        tananyag:{
          bevezeto:"A vizeket háztartási szennyvíz, ipari szennyvíz és mezőgazdasági műtrágyák szennyezik. Az eutrofizáció (tápanyag-feldúsulás) az algák elszaporodásához, oxigénhiányhoz és tömeges halpusztuláshoz vezet. A folyók és tavak bizonyos mértékig képesek az öntisztulásra — planktonok, nádasok, kagylók szűrik a vizet. A Natura 2000 program segítségével ártéri erdők és mocsárvilág újul meg.",
          fogalmak:[
            {nev:"Eutrofizáció",leiras:"Tápanyagok (nitrogén, foszfor) feldúsulása a vízben — algák és planktonok elszaporodnak, oxigén elfogy, élőlények pusztulnak."},
            {nev:"Nehézfémek",leiras:"Ipari szennyvízből kerülnek a vízbe — beépülnek a táplálkozási láncba, a csúcsragadozókban feldúsulnak."},
            {nev:"Öntisztulás",leiras:"A folyók és tavak természetes védekezése — planktonok, hinarasok, nádasok, kagylók, csigák szűrik és bontják le a szennyezőanyagokat."},
            {nev:"Tömeges halpusztulás",leiras:"Az öntisztulás megszűnésének jele — oxigénhiány és mérgező gázok (metán, kén-dioxid) ölik el a halakat."},
            {nev:"Ártéri erdők pusztulása",leiras:"A folyószabályozás megszüntette az elöntéseket — az ártéri erdők kiszáradtak, a folyó és az ártér kapcsolata megszakadt."},
            {nev:"Natura 2000",leiras:"Az EU természetvédelmi programja — ártéri erdők, mocsárvilág, szikes tavak élőhely-rekonstrukcióját támogatja."},
            {nev:"Vidra",leiras:"A vizes élőhelyek csúcsragadozója — száma Magyarországon növekszik az élőhely-visszaállításnak köszönhetően."},
            {nev:"Ivóvíz",leiras:"Egyre értékesebb erőforrás — a felszín közeli kutak sok helyen fertőzöttek, egyre mélyebbre kell fúrni a tiszta vízért."},
            {nev:"Folyószabályozás és vízlépcsők",leiras:"Megváltoztatják a folyók természetes állapotát — az ártéri erdők kiszáradnak, a hal vándorlása akadályozva van."},
            {nev:"Mocsarak lecsapolása",leiras:"Értékes vizes élőhelyek tűnnek el — csökken a természetes vízvisszatartó kapacitás és a biodiverzitás."},
            {nev:"Balaton eutrofizáció",leiras:"A Balaton és más tavak tápanyag-feldúsulása komoly probléma — a foszforterhelés csökkentése a védekezés fő módja."},
          ],
          erdekes:"Egy 4 fős háztartás naponta 400-600 liter szennyvizet termel — ez mind visszakerül valamilyen formában a természetbe. A szennyvíztisztítás ezért minden település alapvető környezetvédelmi feladata.",
        },
        tf:[
          {text:"Mi az eutrofizáció?",opts:["A víz kiszáradása","A vizek tápanyagokkal való túldúsulása, ami tömeges algaszaporodáshoz vezet","A víz sózódása","A halak betegségei"],correct:1,diff:1,explain:"Az eutrofizáció a vizek tápanyagokkal (nitrogén, foszfor) való túldúsulása – az algák elszaporodnak, a fény és az oxigén csökken, ami tömeges pusztuláshoz vezet."},
          {diff:1,question:"Rendezd sorba az eutrofizáció folyamatát!",items:["Algák tömeges elszaporodása","Mérgező gázok képződnek, élőlények pusztulnak","Tápanyagok (műtrágya, szennyvíz) kerülnek a vízbe","Fény nem jut a mélyre, oxigénszint csökken"],correct:[2,0,3,1],explain:"Szennyezés → algák elszaporodnak → fény és oxigén csökken → mérgező gázok és pusztulás."},
          {diff:1,question:"Sorold be: vizes élőhelyet VESZÉLYEZTETI vagy VÉDI?",boxYes:"⚠️ Veszélyezteti",boxNo:"🌿 Védi",items:[{text:"Folyószabályozás",correct:true},{text:"Mocsarak lecsapolása",correct:true},{text:"Ipari szennyvíz",correct:true},{text:"Natura 2000 program",correct:false},{text:"Élőhely-rekonstrukció",correct:false},{text:"Szennyvíztisztítás",correct:false},{text:"Vízlépcső építése",correct:true},{text:"Ártéri erdők visszaállítása",correct:false}],explain:"Veszélyezteti: folyószabályozás, lecsapolás, ipari szennyvíz, vízlépcső. Védi: Natura 2000, élőhely-rekonstrukció, szennyvíztisztítás, ártéri erdők."},
          {text:"A vizek öntisztulása azt jelenti, hogy a természet képes lassabban lebomlani a kisebb szennyezéseket.",answer:true,diff:1,explain:"Igen! A vizek öntisztulási képessége valódi – a baktériumok, planktonok és a természetes folyamatok képesek kisebb szennyezések semlegesítésére, de ez korlátozott."},
          {text:"Miért nem megoldás az, ha egy szennyezett vízbe egyszerűen több halat telepítenek?",opts:["Mert a halak nem szaporodnak","Mert a szennyezés alapproblémája megmarad – az újratelepített halak is elpusztulnak, ha a víz nem tisztul meg","Mert nincs elég hal","Mert a halak kimennek a folyóból"],correct:1,diff:2,explain:"A haltelepítés tüneti kezelés – ha a szennyezés forrása megmarad, az újratelepített halak is elpusztulnak. Először a szennyezést kell megszüntetni."},
          {text:"A víz öntisztulásának van határa – ha a szennyezés nagy, az öntisztulás nem elegendő.",answer:true,diff:2,explain:"Igen! A vizek öntisztulása csak kisebb szennyezeknél hatékony – nagy ipari, mezőgazdasági vagy kommunális szennyezés esetén emberi beavatkozás (szennyvíztisztítás) szükséges."},
          {text:"A természetes vizek szennyezése csak ott hat, ahova a szennyvíz közvetlenül kerül.",answer:false,diff:2,explain:"Nem! A szennyezés a folyók és talajvíz útján terjed, és messze a szennyezés forrásától is hatást fejt ki – pl. a Duna-delta a felső folyók szennyezésétől is szenved."},
          {text:"A Balaton és más tavak eutrofizációja ellen hatékony védekezés a foszforterhelés csökkentése.",answer:true,diff:2,explain:"Igen! Az eutrofizáció fő tápanyaga a foszfor (mosószerek, műtrágyák) – ha ezt csökkentik, az algák elszaporodása visszafogható."},
          {text:"A szennyvíztisztítás nemcsak ökológiai, hanem közegészségügyi szempontból is elengedhetetlen.",answer:true,diff:3,explain:"Igen! A tisztítatlan szennyvíz fertőző betegségek forrása (kolerabaktérium, tífusz stb.) – az ivóvíz és fürdővíz biztonsága függ a tisztítástól."},
          {text:"A vizes élőhelyek védelme és az ember ivóvíz-biztonsága szorosan összefügg egymással.",answer:true,diff:3,explain:"Igen! Az egészséges vizes élőhelyek természetes vízszűrői és vízraktárai – pusztulásuk ivóvízkészletek csökkenéséhez és szennyeződéséhez vezet."},
          {text:"Miért fontosabb a szennyvíztisztítás a városokban, mint a kis falvakban?",opts:["Mert a városiak gazdagabbak","Mert a nagy népesség koncentrált szennyvize túlterhelné a vizek öntisztulási képességét","Mert a falvak közelebb vannak a természethez","Mert a városokban több a csapadék"],correct:1,diff:3,explain:"Nagy városok szennyvize olyan mennyiségű, hogy azt egyetlen folyó sem tudná öntisztulással kezelni – a szennyvíztisztítók nélkül a vizek hamar kipusztulnának."},
          {text:"Miért van szükség a Natura 2000 hálózatra az egyes országok saját természetvédelmi területei mellett?",opts:["Mert az EU kötelezi","Mert az élőlények nem ismernek határokat – a vándorló fajok védelme csak összehangolt, határokon átívelő erőfeszítéssel biztosítható","Mert az EU pénzt ad","Mert a hálózat szebb"],correct:1,diff:3,explain:"A vándorló madarak, vonuló halak és más élőlények határokat átívelő életterükben csak az összehangolt, transznacionális természetvédelem nyújthat hatékony oltalmat."},

      {id:12,icon:"📋",title:"Rendszerezzük ismereteinket!",ready:true,
        tananyag:{
          bevezeto:"A Vizek, vízpartok életközössége témakör összefoglalója. A vízben és vízparton rendkívül sokféle élőlény él: parányi planktonoktól a halakig, kétéltűektől a hüllőkig, vízi rovaroktól a vízimadarak és ragadozók csúcsáig. Mindenkit összeköt a táplálkozási hálózat és az anyagok körforgása. A vizek védelme — az eutrofizáció, szennyezés és élőhely-pusztítás elleni küzdelem — az egész életközösség fennmaradásának kulcsa.",
          fogalmak:[
            {nev:"🌿 Élő szűrő",leiras:"A vízparti növényzet felfogja a part mögül érkező szennyeződéseket és beépíti a tápanyagokat — megakadályozza az eutrofizációt."},
            {nev:"🌿 Fonalas zöldmoszat",leiras:"Telepes felépítésű vízi növény — nincs gyökér, szár, levél, virág; sekély vizekben tömegesen elszaporodik."},
            {nev:"🌿 Hínáros békaszőlő",leiras:"Gyöktörzse az iszapban van, virágzata a víz fölé emelkedik — az áramló víz porozza be."},
            {nev:"🌿 Tündérrózsa és vízitök",leiras:"Iszapban gyökereznek, viaszos leveleik a víz felszínén terülnek szét — levegőt a levelek veszik fel, tápanyagot a gyöktörzs tárolja."},
            {nev:"🌿 Békalencse",leiras:"Apró, 1 cm-es lebegő vízi növény — lencse alakú szára van, levele elcsökevényesedett, gyökérszála lefelé lóg."},
            {nev:"🌿 Közönséges nád",leiras:"Erős, üreges szárú, párhuzamos erezetű vízparti növény — bugavirágzatát a szél porozza be, 2 méteres vízmélységig is megél."},
            {nev:"🌿 Széleslevelű gyékény",leiras:"Náddal közös élőhelyű növény — szélesebb levelek, torzsavirágzat (buzogány), szél porozza be."},
            {nev:"🌿 Nádas szerepe",leiras:"Élőhelyet biztosít, védi a partot, meggátolja a tápanyagok feldúsulását — nélkülözhetetlen a vízparti ökoszisztémában."},
            {nev:"🐌 Hirudin",leiras:"Az orvosi pióca nyálában lévő véralvadásgátló anyag — ma kémiai úton állítják elő gyógyszeralapanyagként."},
            {nev:"🐌 Szívókorong / tapadókorong",leiras:"A pióca két végén lévő rögzítőszervek — egyikkel kapaszkodik, másikkal táplálkozik."},
            {nev:"🐌 Pontszemek",leiras:"Fényérzékelő szervek a pióca testén — képet nem alkot, csak fényt és árnyékot érzékel."},
            {nev:"🐌 Hímnős",leiras:"Egy egyedben hím és nőstény ivarszerv is van — de kölcsönös párzással szaporodnak."},
            {nev:"🐌 Nagy mocsári csiga",leiras:"6 cm-es, csúcsos házú vízi csiga — kezdetleges tüdővel lélegzik, a vízfelszínre mászik levegőért."},
            {nev:"🐌 Haslábak",leiras:"A csiga mozgásszerve — izmos talpán csúszik."},
            {nev:"🐌 Tavi kagyló",leiras:"Iszapos tavak és folyók lakója, akár 20 cm hosszú — tolólábbal mozog, szűrőtáplálkozással él."},
            {nev:"🐌 Szűrőtáplálkozás",leiras:"A kagyló vizet szív be, kiszűri a lebegő apró élőlényeket — légzése és táplálkozása összekapcsolódik."},
            {nev:"🐌 Pióca mérete és légzése",leiras:"Kb. 15 cm hosszú, barnászöld, narancssárga sávos. Nyálkás kültakarón lélegzik — oxigént vesz fel, szén-dioxidot ad le."},
            {nev:"🐌 Petézés",leiras:"Hímnős állat — párzás után a parti öv talajába rakja petéit, a kis piócák a következő év tavaszán kelnek ki."},
            {nev:"🐌 Csiga légzése",leiras:"A nagy mocsári csiga kezdetleges tüdővel lélegzik — NEM kopoltyúval. Időnként a vízfelszínre mászik levegőért."},
            {nev:"🐌 Pióca légzése és mozgása",leiras:"Nyálkás kültakarón lélegzik — NEM tüdővel. Vízben úszik (test hullámmozgása), szárazföldön féregmozgással is halad."},
            {nev:"🐌 Pióca vérszívás",leiras:"Testtömegénél ÖTSZÖR több vért képes felszívni — nem kétszeresét. Fogazott állkapcsokkal sebzi meg a gazdát."},
            {nev:"🐌 Pióca petézése",leiras:"Petéit a parti öv talajába rakja — NEM a vízbe szórja. A kis piócák a következő év tavaszán kelnek ki."},
            {nev:"🦟 Kitinpáncél",leiras:"A folyami rák kültakarója — kitin és mész keveréke, védelem és tartás. Vedléssel cserélődik."},
            {nev:"🦟 Fejtor",leiras:"A rák feje és torának összenőtt része — itt vannak a kopoltyúk, csápok és összetett szemek."},
            {nev:"🦟 Farki lemezek",leiras:"A rák potrohának végén lévő lemezek — hátrafelé való gyors úszásra szolgálnak."},
            {nev:"🦟 Rákpestis",leiras:"Az amerikai folyami rák által terjesztett betegség — az őshonos folyami rákokat elpusztítja."},
            {nev:"🦟 Szitakötő álarc",leiras:"A szitakötőlárva alsó ajkából képződött fogókészülék — apró rovarokat, halivadékokat, békalárvát fog."},
            {nev:"🦟 Szitakötő fejlődése",leiras:"Nincs bábállapot — a lárva 2-3 évig él a vízben, majd a felszínen vedlik és szárnyas kifejlett egyeddé válik."},
            {nev:"🦟 Szúnyog fejlődése",leiras:"Teljes átalakulás: pete → lárva (vízben, légcsővel lélegzik) → mozgó báb → kifejlett szúnyog."},
            {nev:"🦟 Szúnyog nőstény",leiras:"Szúró-szívó szájszervvel vért szív — a hímek nem szúrnak, növényi nedvekkel táplálkoznak."},
            {nev:"🦟 Folyami rák lábai",leiras:"5 pár lába van — az első pár ollóvá alakult zsákmányszerzésre és védekezésre. Összetett szemei rövid nyélen ülnek."},
            {nev:"🦟 Szitakötő szárnyai",leiras:"Két pár hártyás szárnyát egymástól függetlenül mozgatja — ezért rendkívül manőverező repülő."},
            {nev:"🦟 Tiszavirág",leiras:"Egynapos életű kérész — lárvája évekig él a vízben, a tömeges rajzás a folyó jó vízminőségét jelzi."},
            {nev:"🐟 Euritóp hal",leiras:"Széles tűrőképességű — pl. ponty, kárász: iszapos, meleg, kevés oxigénű vizekben is megél."},
            {nev:"🐟 Sztenotóp hal",leiras:"Szűk tűrőképességű — pl. sebes pisztráng: csak tiszta, hideg, oxigéndús vizet tűr."},
            {nev:"🐟 Kopoltyú",leiras:"A hal légzőszerve — szájon át veszi fel a vizet, a kopoltyún kivonja az oxigént, a kopoltyúfedőn engedi ki."},
            {nev:"🐟 Úszóhólyag",leiras:"Levegővel teli szerv — a hal sűrűségét szabályozza, segít a lebegésben."},
            {nev:"🐟 Oldalvonal",leiras:"Érzékszerv a hal oldalán — a víz áramlását és rezgéseit érzékeli."},
            {nev:"🐟 Pikkelyek + nyálka",leiras:"A hal kültakarója — védelmet nyújt a kórokozók ellen, csökkenti a vízállást."},
            {nev:"🐟 Elvermelés",leiras:"Téli életmód: a ponty a meder iszapjába húzódik, életfunkciói lelassulnak."},
            {nev:"🐟 Tükörponty",leiras:"A tőponty nemesített változata — kevesebb, nagyobb pikkely, gyors növekedés."},
            {nev:"🐟 Változó testhőmérséklet",leiras:"A hal hidegvérű — testhőmérséklete a vízéval egyezik meg, ezért télen elvermel, 26°C felett elpusztulhat."},
            {nev:"🐟 Gátak és vándorló halak",leiras:"A gátak megakadályozzák a halak ívóhelyre való felvándorlását — a szaporodás meghiúsul, a populáció összeomlik."},
            {nev:"🐸 Kétéltűek",leiras:"Két élettérben élő gerincesek — lárvájuk vízben él, kifejlett korukban a szárazföldön is megélnek."},
            {nev:"🐸 Bőrlégzés",leiras:"A kecskebéka nedves bőrén keresztül is vesz fel oxigént — téli álomban szinte kizárólag így lélegzik."},
            {nev:"🐸 Ebihal",leiras:"A béka lárvaállapota — külső kopoltyúval lélegzik, planktonokkal táplálkozik, farka és kopoltyúja az átalakulás során visszafejlődik."},
            {nev:"🐸 Külső megtermékenyítés",leiras:"A hím a vízbe rakott peték mellé engedi ivarsejtjeit — a megtermékenyítés a vízben történik."},
            {nev:"🐸 Kocsonyás peték",leiras:"A béka petéit kocsonyás burok védi és táplálja — átlátszó gömb alakú tömegben úsznak a vízben."},
            {nev:"🐸 Barna varangy",leiras:"Akár 15 cm-es kétéltű — nyirkos erdőkben, kertekben él, csak szaporodáskor keresi fel a vizet."},
            {nev:"🐸 Fültőmirigy",leiras:"A barna varangy fejének két oldalán lévő mirigy — mérgező váladékot termel védekezésként."},
            {nev:"🐸 Békamentés",leiras:"Tavaszi vonuláskor az utakon kerítésekkel és gyűjtőedényekkel segítik a békák biztonságos átkelését."},
            {nev:"🐸 Változó testhőmérséklet",leiras:"A béka hidegvérű — testhőmérséklete a környezettel változik, télen iszapba ásva tölti a hideget."},
            {nev:"🐸 Gőték és szalamandrák",leiras:"A kétéltűek közeli rokonai — szintén vízben szaporodnak, lárvájuk vízben fejlődik."},
            {nev:"🐸 Amfibiaátjárók",leiras:"Az utak alá épített békaátjárók — lehetővé teszik a biztonságos tavaszi vonulást a szaporodóhelyre."},
            {nev:"🐸 Béka petéje",leiras:"Kocsonyás burok védi és táplálja — NEM kemény héj. A kocsonyaburok átlátszó, csoportosan úszik a vízben."},
            {nev:"🐸 Átalakulás menete",leiras:"Ebihal → végtagok nőnek → farok és kopoltyú VISSZAFEJLŐDIK → tüdő + bőrlégzés alakul ki. NEM farok nő!"},
            {nev:"🐸 Változó testhőmérséklet",leiras:"A béka hidegvérű — testhőmérséklete a környezettel változik. Télen iszapba ásva telel."},
            {nev:"🐸 Kétéltűek két élettere",leiras:"NEM kizárólag víziek — lárvájuk vízben él, de kifejletten szárazföldön is megélnek. Gőték, szalamandrák is kétéltűek."},
            {nev:"🐸 Bőrlégzés és szennyezés",leiras:"A béka nedves bőrén át is lélegzik — ezért a vizes élőhelyek szennyezése különösen veszélyes rájuk."},
            {nev:"🐍 Szarupikkelyek",leiras:"A vízisikló száraz, pikkelyes bőre — védi a testet és megakadályozza a kiszáradást."},
            {nev:"🐍 Sárga félhold foltok",leiras:"A vízisikló fejének megkülönböztető jelzése — segít elkülöníteni más kígyóktól."},
            {nev:"🐍 Haspajzsok",leiras:"A vízisikló hasán lévő nagyobb pikkelyek — szűk helyeken ezekkel kapaszkodik és mozog."},
            {nev:"🐍 Tágulékony bélcsatorna",leiras:"A vízisikló egészben nyeli le a zsákmányát — bélcsatornája a nagy falat befogadásához kitágul."},
            {nev:"🐍 Telelőközösség",leiras:"A vízisiklók fagymentes helyeken együtt telelnek — testmelegük közösen tartja a hőmérsékletet."},
            {nev:"🐍 Mocsári teknős páncélja",leiras:"Szarupajzsokból álló páncél — veszély esetén a teknős fejét és végtagjait behúzza."},
            {nev:"🐍 Szarukáva",leiras:"A mocsári teknős fogak nélküli, kemény szájpereme — a zsákmányt karmaival marcangolja szét, szarukávával aprítja."},
            {nev:"🐍 Változó testhőmérséklet",leiras:"Mindkét állat hidegvérű — testhőmérsékletük a környezet hőmérsékletével változik, ezért alszanak télen."},
            {nev:"🐍 Vízisikló: mérgetlen",leiras:"A vízisikló NEM mérgező — sárga félhold foltjai alapján azonosítható. Védekezéskor kellemetlen váladékot bocsát ki."},
            {nev:"🐍 Ellenségek",leiras:"A vízisikló természetes ellenségei a gólyák, gémek és a rétihéják — ezért fontos a rejtőzés és a gyors menekülés."},
            {nev:"🦢 Tőkés réce tollazata",leiras:"Zsíros váladék fedi a tollakat — a víz lepereg róluk, a madár nem ázik meg."},
            {nev:"🦢 Fészekhagyó fiókák",leiras:"A tőkés réce fiókái kikelés után hamar elhagyják a fészket — szemük nyitva van, szőrösek, önállóan követik az anyát."},
            {nev:"🦢 Gázlóláb",leiras:"A gólya hosszú lábú, hosszú csüdű — sekély vízben gázol, ujjai között nincs úszóhártya."},
            {nev:"🦢 Vitorlázórepülés",leiras:"A fehér gólya szárnyait mozdulatlanul tartja, meleg felszálló légáramlaton emelkedik — energiatakarékos vonulási módszer."},
            {nev:"🦢 Gémfélék",leiras:"Szürke gém, vörös gém, kis kócsag, nagy kócsag — nagy telepekben költenek, hegyes csőrükkel nyársalják fel a halat."},
            {nev:"🦢 Barna rétihéja",leiras:"Kb. 60 cm-es, 130 cm szárnyfesztávolságú ragadozó — nádasokban fészkel, békákat, vízimaderakat, siklókat, rágcsálókat eszik."},
            {nev:"🦢 Gólya vonulása",leiras:"Afrika középső és déli részére vonul — több ezer kilométeres út, vitorlázórepüléssel."},
            {nev:"🦢 Gólya fészke",leiras:"Ágakból épített, villanyoszlopra vagy kéményre rakott fészek — tavasszal a régi fészket újítják fel."},
            {nev:"🦢 Gólya lába",leiras:"Gázlóláb — hosszú lábszár és csüd, ujjai között NINCS úszóhártya. Sekély vízben gázolva vadászik."},
            {nev:"🦢 Gémek vadászmódszere",leiras:"Mozdulatlanul várakoznak a vízparton, majd villámsebesen nyársalják fel a zsákmányt hegyes csőrükkel."},
            {nev:"🦢 Rétihéja mérete",leiras:"Kb. 60 cm, szárnyfesztávolsága 130 cm — nádasokban fészkel, békákat, vízimaderakat, siklókat, rágcsálókat eszik."},
            {nev:"🦢 Gólyafiókák — fészeklakók",leiras:"A gólyafiókák fészeklakók — szüleik etetik őket. Ellentétben a réce fészekhagyó fiókáival, akik azonnal önállóak."},
            {nev:"🦢 Gémek vadászmódszere",leiras:"Mozdulatlanul állnak a vízparton, majd villámsebesen nyársalják fel a zsákmányt — energiatakarékosabb, mint az üldözés."},
            {nev:"🦢 Gólya fészkelőhely",leiras:"Villanyoszlopokra, kéményekre, épületekre rakja fészkét — az állatok alkalmazkodtak az emberi környezethez."},
            {nev:"🌊 Táplálkozási lánc",leiras:"Termelők → elsődleges fogyasztók → másodlagos fogyasztók → csúcsragadozó. Pl.: plankton növényei → békalárva → szitakötőlárva → dévérkeszeg → lesőharcsa."},
            {nev:"🌊 Lebontók",leiras:"Baktériumok, gombák, férgek, rovarlárvák — elpusztult élőlények maradványait bontják le tápanyagokká a növények számára."},
            {nev:"🌊 Anyagok körforgása",leiras:"Az anyagok állandóan körforgásban vannak a táplálkozási láncokon keresztül — a lebontók zárják le a kört."},
            {nev:"🌊 Optimum",leiras:"Az a környezeti feltétel, amelyen az élőlény a legjobban él és szaporodik — pl. pontynak 20°C."},
            {nev:"🌊 Tűrőképesség",leiras:"Az élőlény elviseli a környezeti tényezők változásait egy bizonyos határig — ezen túl elpusztul."},
            {nev:"🌊 Szűk tűrőképesség",leiras:"Kis változást visel el — pl. sebes pisztráng csak hideg, tiszta, oxigéndús vízben él."},
            {nev:"🌊 Tág tűrőképesség",leiras:"Nagy változást is elvisel — pl. róka sokféle élőhelyen megél."},
            {nev:"🌊 Ponty hőtűrése",leiras:"+4°C alatt elvermel; 20°C-on optimális, szaporodik; 26°C felett elpusztul az oxigénhiány miatt."},
            {nev:"🌊 Euritóp faj",leiras:"Tág tűrőképességű — nagy változásokat is elvisel. Pl. ponty, róka: sokféle körülmény között megél."},
            {nev:"🌊 Sztenotóp faj",leiras:"Szűk tűrőképességű — kis változást visel el. Pl. sebes pisztráng: csak hideg, oxigéndús, tiszta vízben él."},
            {nev:"🌊 Vonuló madarak",leiras:"Szűk tűrőképességűek az évszakos változások szempontjából — télen elhagyják a hideg területeket."},
            {nev:"🌊 Életközösségi egyensúly",leiras:"Az egyensúly azt jelenti, hogy egyik faj sem szaporodik túl a másik kárára — mindenki elegendő táplálékhoz és helyhez jut."},
            {nev:"🌊 Csúcsragadozó szerepe",leiras:"Ha a csúcsragadozó eltűnik, a zsákmányfajok elszaporodnak — ez az egész táplálékhálózat egyensúlyát felborítja."},

          {text:"A szén, kőolaj és földgáz megújuló energiaforrások.",answer:false,diff:1,explain:"Nem! A szén, kőolaj és földgáz fosszilis tüzelőanyagok – képzödésük évmilliókat igényelt, az emberiség sokkal gyorsabban fogyasztja el őket, mint képzödnek."},

          {text:"A geotermikus energia (földhő) megújuló energiaforrás.",answer:true,diff:3,explain:"Igen! A geotermikus energia a Föld belsejének hőjéből ered, amely folyamatosan termelődik radioaktív bomlásból – emberi léptékben kimeríthetetlen."},

          {text:"A stalaktit (cseppkő) a barlang plafonjáról lóg le, a stalagmit a padlóról nő felfelé.",answer:true,diff:2,explain:"Igen! A stalaktit felülről lóg (mint a csillagász teleszkópja – le), a stalagmit alulról nő (mint a hangyaboly – fel)."},

          {text:"A belső erők hegységeket emelnek, a külső erők azokat pusztítják és formálják.",answer:true,diff:1,explain:"Igen! A belső erők (gyűrődés, vetődés, vulkánosság) kiemelkedéseket hoznak létre, a külső erők (szél, víz, jég) ezeket pusztítják."},
          {text:"A magashegységekben a jég a legfőbb felszínformáló erő.",answer:true,diff:1,explain:"Igen! A nagy magasságban tartós hó és jég (gleccserek) a domináns felszínformáló erők – éles csipkézett csúcsokat és U-alakú völgyeket hoznak létre."},
          {text:"A középhegységekben a folyóvíz a legfőbb felszínformáló erő.",answer:true,diff:1,explain:"Igen! A középhegységek magassága nem elegendő állandó gleccserekhez – a folyóvíz dominál, legömbölyített tetőket és V-alakú völgyeket alkotva."},
          {text:"A magashegységek csúcsai élesebbek és sziklábbak, mint a középhegységeké.",answer:true,diff:1,explain:"Igen! A gleccserek sziklás, éles piramiscsúcsokat hagynak, míg a folyóvíz legömbölyített, szelíd hegytetőket alkot."},
          {text:"A lánchegységek gerincei szélesek és laposak, mert a folyóvíz egyenlíti ki őket.",answer:false,diff:2,explain:"Nem! A lánchegységek gerincei élesek és csipkézetek (pl. Alpok, Himalája) – a jég formálja őket sziklás, meredek gerincekké."},
          {text:"A röghegységek lépcsős szerkezetükkel különböznek a lánchegységektől.",answer:true,diff:2,explain:"Igen! A vetődéssel keletkező röghegységek lépcsős szerkezete jól látható – a kiemelkedett rögök és a köztük lévő medencék jellemzők."},
          {text:"A Bükk és a Mecsek röghegységek, amelyeket a folyóvíz formált jelenlegi állapotukba.",answer:true,diff:2,explain:"Igen! A Bükk és a Mecsek röghegységek – jelenlegi legömbölyített, szelíd megjelenésüket a hosszú idő alatt ható folyóvíz-erózió alakította ki."},
          {text:"A piramiscsúcs (pl. Matterhorn) a folyóvíz koptató munkájának eredménye.",answer:false,diff:2,explain:"Nem! A piramiscsúcsot gleccserek formálják – több irányból érkező jég csiszolja le a hegycsúcs oldalait, sziklás piramisformát hagyva."},
          {text:"Az Alpokban a gleccserek U-alakú völgyei mára nagy részben jég nélkül, üres völgyekként tárulnak elénk.",answer:true,diff:3,explain:"Igen! A jégkorszak végén a gleccserek visszahúzódtak – az általuk vájt U-alakú völgyek megmaradtak, de mára többnyire jég nélküli, tágas völgyek."},
          {text:"A lánchegységek hosszanti völgyei természetes közlekedési útvonalak.",answer:true,diff:3,explain:"Igen! A hosszanti völgyek az egyetlen sík területek a lánchegységekben – itt haladnak a folyók, az utak és a vasútak is."},
          {text:"Az Alpok magashegységi jellemzői (éles csúcsok, gleccserek) a jövőben is változatlanok maradnak.",answer:false,diff:3,explain:"Nem! Az éghajlatváltozás hatására az Alpok gleccserek visszahúzódnak – a jéggel borított felszín csökken, a csúcsformák is változnak."},
          {text:"A hegységek magassága és a formáló erők típusa szorosan összefügg egymással.",answer:true,diff:3,explain:"Igen! Az összefüggés egyértelmű: magashegységben jég dominál (éles csúcsok), középhegységben folyóvíz (legömbölyített tetők)."},

          {text:"A futóhomok buckáit a szél a folyók által lerakott homokból épített.",answer:true,diff:2,explain:"Igen! A folyók homokot raknak le, amit a szél aztán kifúj és homokbuckákat épít belőle – a Kiskunság buckái így keletkeztek."},
          {text:"Az Alföld és a Kisalföld hazánk két alföldterülete.",answer:true,diff:2,explain:"Igen! A Nagy-Alföld (Alföld) és a Kisalföld Magyarország két fő alföldi területe."},

          {text:"A lösz másnéven sárgaföld – sárga-barna színe a benne lévő vas-oxid tartalomtól ered.",answer:true,diff:2,explain:"Igen! A lösz jellegzetes sárga-barnás színét a szemcsékben lévő vas-oxidáció adja."},
          {text:"A Kiskunságban a homokbuckák kialakulásában a folyóvíz és a szél együttes munkája a döntő.",answer:true,diff:3,explain:"Igen! A folyók rakták le a homokot, a szél alakította buckákká – ez a kétlépéses folyamat jellemzi a Kiskunság homokvidékét."},

          {text:"Hogyan keletkeztek a Kiskunság homokbuckái?",opts:["Gleccserek hordták oda","A folyók hordalékát a szél homokbuckákká formálta","Vulkáni kitörésből","Emberi munkával"],correct:1,diff:1,explain:"A folyók homokot raktak le, a szél aztán kifútta és buckákká formálta – a futóhomok buckák a szél és a folyók közös alkotása."},

          {text:"Miért okoz problémát a futóhomok az alföldeken?",opts:["Mert szép","Mert eltakarítja a termőtalajt és betemetheti az utakat, szántókat, épületeket","Mert nedvessé teszi a talajt","Mert megakadályozza a növényzet fejlődését"],correct:1,diff:3,explain:"A futóhomok komoly gazdasági kárt okoz – eltakarja a termőtalajt, betemeti az utakat és az épületeket."},
          {text:"Miért telepítettek erdőket a Kiskunság buckáira?",opts:["Mert szép","Mert a növényzet gyökerei megkötik a homokot, megakadályozva a futóhomok terjedését","Mert ott jobb a levegő","Mert a fák hűsítik a területet"],correct:1,diff:3,explain:"A futóhomok rögzítésének leghatékonyabb módja a növényzet – a gyökerek szoros hálója fogva tartja a homokszemcséket."},

        tf:[
          {text:"A talaj nem csupán kőzettörmelék – élő rendszer, amelyben baktériumok, gombák és állatok élnek.",answer:true,diff:1,explain:"Igen! A talaj eleven rendszer – baktériumok, gombák, férgek, rovarok milliói lakják, amelyek elvégzik a lebontást és a tápanyag-körforgást."},
          {text:"A humusz a talajban lévő elhalt növényi és állati maradványokból keletkező sötét szerves anyag.",answer:true,diff:1,explain:"Igen! A humusz a talaj termékenységének alapja – sötét színe a lebontott szerves anyagtól ered, és tápanyagban gazdag."},
          {text:"A homoktalaj megtartja a vizet, ezért nem kell öntözni.",answer:false,diff:1,explain:"Nem! A homoktalaj szemcséi lazán kötődnek – a víz gyorsan átfolyik rajta, hamar kiszárad. Öntözést és humusz-pótlást igényel."},
          {text:"A giliszták azzal segítik a talajt, hogy megeszik a talajszemcséket, majd a felszínre ürítik – ezzel keverik és lazítják.",answer:true,diff:1,explain:"Igen! A giliszta járatai levegőztetik a talajt, és az átjárt anyag lazább, morzsásabb lesz – ezért a kertészek a giliszta jelenlétét jó jelnek tartják."},
          {text:"A talaj kialakulása lassú folyamat – 1 cm vastag termőtalaj kialakulásához akár több száz év is kell.",answer:true,diff:2,explain:"Igen! A talajképződés nagyon lassú – 1 cm termőtalaj kialakításához 100-1000 év szükséges. Ezért a talaj védelme elengedhetetlen."},
          {text:"A kötött (agyagos) talaj könnyen ereszti át a vizet.",answer:false,diff:2,explain:"Nem! A kötött (agyagos) talaj szemcséi szorosan tapadnak – rosszul ereszti át a vizet, vízálló, belőle nehéz a levegő és a víz be- és kijutása."},
          {text:"A mezőgazdaságban a betakarítás után trágyázással kell pótolni a talaj elvett tápanyagait.",answer:true,diff:2,explain:"Igen! A természetben az elhalt növények visszakerülnek a talajba – a mezőgazdaságban a termést elvisszük, ezért a kivett tápanyagot trágyázással kell visszaadni."},
          {text:"Az erózió a szél és a víz talajpusztító hatása.",answer:true,diff:2,explain:"Igen! A szél fújja, a víz lemossa a talaj legfelső, legtermékenyebb rétegét – ezt nevezzük talajpusztulásnak (eróziónak)."},
          {text:"A talaj védelme azért elengedhetetlen, mert ami elpusztul, az emberi időtávon belül nem pótolható.",answer:true,diff:3,explain:"Igen! Az 1 cm termőtalaj képzödéséhez akár 500-1000 év kell – amit pillanatok alatt lemoshat az eső. Ezért a talaj védelme civilizációs érdek."},
          {text:"A túlöntözés is káros a talajnak, mert a felső rétegből kiszorítja a levegőt és sókivirágzást okozhat.",answer:true,diff:3,explain:"Igen! A túlöntözés eliszaposítja a talajt, elzárja a levegőtől a gyökereket, és ha elpárolog, só marad vissza – ezzel tönkreteszi a termékenységet."},
          {text:"A monokultúrás gazdálkodás (egy növény évtizedekig) javítja a talaj minőségét.",answer:false,diff:3,explain:"Nem! A monokultúra kizsarolja a talajt – mindig ugyanazokat a tápanyagokat veszi fel, és a fajspecifikus kórokozók is felhalmozódnak. A vetésforgó sokkal kedvezőbb."},
          {text:"A csernozjom (feketeföld) a világ legtermékenyebb talajtípusa, és Magyarország alföldi területeire is jellemző.",answer:true,diff:3,explain:"Igen! A csernozjom löszből képzödő, humuszdús talaj – Magyarország Alföldén is megtalálható, és kiváló termőképességű."},

        quiz:[
          {text:"Miből áll a talaj?",opts:["Csak kőzetből","Kőzettörmelék, szerves anyag, élővilág, víz és levegő együttese","Csak humuszból","Csak ásványi anyagokból"],correct:1,diff:1,explain:"A talaj komplex rendszer: kőzettörmelék (váz), szerves anyagok (humusz), élővilág (baktériumok, férgek stb.), valamint a hézagokat kitöltő víz és levegő."},

          {text:"Mi a különbség a homoktalaj és a kötött talaj között?",opts:["Nincs különbség","Homoktalaj gyorsan ereszti a vizet (hamar kiszárad), kötött talaj rosszul ereszti (vízálló)","Kötött talaj szárazabb","Homoktalaj nehezebben megmunkálható"],correct:1,diff:1,explain:"Homoktalaj: laza szemcsék, gyors vízáteresztés, hamar kiszárad. Kötött (agyagos) talaj: szorosan tapadó szemcsék, rosszul ereszti a vizet és a levegőt."},

          {text:"Mi az erózió és milyen hatásai vannak?",opts:["A talaj termékenységének növekedése","A szél és a víz által lemosott, elpusztított felső termőréteg elvesztése","A talaj nedvességtartalmának növekedése","A talaj lazítása"],correct:1,diff:2,explain:"Az erózió a talaj legfelső, legtermékenyebb rétegének elvesztése – a víz lemossa az eső hatására, a szél fújja a kiszáradt talajt."},
          {text:"Miért káros a helytelen művelés (pl. túlöntözés) a talaj termékenységére?",opts:["Mert drága","Mert agyagosodik a talaj, kiszorítja a levegőt, és sókivirágzás csökkenti a termékenységet","Mert felgyorsítja a lebontást","Mert több víz marad"],correct:1,diff:2,explain:"A túlöntözés eliszaposítja, tömörítettté teszi a talajt, kiszorítja a levegőt a gyökerek mellől, és párolgással sót hagy maga után."},
          {text:"Miért érték a talajban élő baktériumok és gombák?",opts:["Mert gyógyítanak","Mert lebontják az elhalt szervesanyagot és visszaadják a tápanyagokat a talajnak","Mert nedvességet tárolnak","Mert gyökereket alkotnak"],correct:1,diff:2,explain:"A talajbaktériumok és gombák az anyagkörforgás nélkülözhetetlen szereplői – nélkülük az elhalt szervesanyag felhalmozódna és a tápanyagok nem kerülnének vissza a növényekbe."},
          {text:"Miért veszélyesebb a talajpusztulás (erózió) a hegyoldalakon, mint az alföldeken?",opts:["Mert hegyeken több a talaj","Mert a gravitáció és a meredek lejtő felgyorsítja a víz romboló hatását","Mert hegyeken több az eső","Mert hegyeken gyengébb a növényzet"],correct:1,diff:3,explain:"A meredek lejtőn a gravitáció is segíti a vizet a talaj lemosásában – az esőcseppek először lazítják fel, majd a lefolyó víz levezeti a termőréteget."},
          {text:"Miért veszélyezteti a talajt a monokultúrás gazdálkodás?",opts:["Mert egyféle növény szép","Mert mindig ugyanazokat a tápanyagokat vonja ki, fajspecifikus kórokozók halmozódnak fel és a talajszerkezet romlik","Mert a gépek tömörítik","Mert a monokultúra olcsóbb"],correct:1,diff:3,explain:"Monokultúránál minden évben ugyanaz a faj ugyanazokat a tápanyagokat veszi fel – a talaj egyoldalúan kimerül és a fajspecifikus gombák, rovarok is felhalmozódnak."},
          {text:"Miért elengedhetetlen a talaj védelme az emberiség élelmiszerbiztonságához?",opts:["Mert a talaj szép","Mert a talaj az élelmiszer-termelés alapja – a globális népesség élelmiszerének 95%-a a talajból szármanyzik","Mert a talaj tartja a vizet","Mert a talajban laknak az állatok"],correct:1,diff:3,explain:"A világ élelmiszer-termelésének 95%-a a termőtalajtól függ – a talajerózió és pusztulás közvetlen élelmiszer-biztonsági kockázat."},
          {text:"Miért jobb a vetésforgó, mint a monokultúra a talaj védelme szempontjából?",opts:["Mert több munkát ad","Mert eltérő növények eltérő tápanyagokat vesznek fel – a talaj kiegyensúlyozottabban terhelódik","Mert szebb a táj","Mert olcsóbb"],correct:1,diff:3,explain:"A vetésforgóban felváltva más-más fajt termesztenek – a tápanyagkivétel egyensúlyos, a fajspecifikus kórokozók nem halmozódnak fel, a talaj szerkezete megmarad."},

            {id:8,icon:"🏗️",title:"Hogyan alakítja át az ember a környezetét?",ready:true,
        tf:[
          {text:"Az ember az egyetlen élőlény, aki szándékosan és nagy mértékben alakítja át a természetes környezetét.",answer:true,diff:1,explain:"Igen! Más élőlények is változtatják a környezetüket (pl. hód, giliszta), de az ember tudatos és sokkal nagyobb léptékű átalakítást végez."},
          {text:"A csatornázás és a folyószabályozás egyaránt csökkenti az árvízveszélyt.",answer:true,diff:1,explain:"Igen! A folyók gátakkal és csatornákkal való szabályozása megakadályozza a természetes kiöntést – ezzel csökkentik az árvízveszélyt."},
          {text:"A természetes erdők kivágása csökkenti a talaj eróziójának veszélyét.",answer:false,diff:1,explain:"Nem! Az erdők gyökerei kötik a talajt és a lombozat fékezi az esőcseppek erejét – az erdőirtás nagymértékben fokozza az eróziót."},
          {text:"Az urbanizáció (városok terjeszkedése) csökkenti a mezőgazdasági területek arányát.",answer:true,diff:1,explain:"Igen! A városok terjeszkedése betonnal és épületekkel fedi be az egykor termőföldet – Magyarországon is évente több ezer hektár termőföld kerül be az épített területek közé."},
          {text:"A fosszilis tüzelőanyagok égetése növeli a légköri szén-dioxid koncentrációját.",answer:true,diff:2,explain:"Igen! A szén, az olaj és a gáz elégetése millió évek alatt tárolt szenet szabadít fel CO₂ formájában – ez az üvegházhatás fokozódásához vezet."},
          {text:"A megújuló energiaforrások (szél, nap) ugyanolyan mértékben szennyezik a légkört, mint a fosszilis tüzelőanyagok.",answer:false,diff:2,explain:"Nem! A nap- és szélenergia termelése minimális szén-dioxid-kibocsátással jár – ezért ezek megújuló, tiszta energiaforrások."},
          {text:"A vizes élőhelyek lecsapolása növeli a biodiverzitást.",answer:false,diff:2,explain:"Nem! A vizes élőhelyek lecsapolása elpusztítja az ott élő fajokat – a biodiverzitás csökken, nem nő."},
          {text:"A fenntartható fejlődés célja, hogy az emberi igényeket úgy elégítsük ki, hogy a jövő generációk is el tudják látni saját szükségleteiket.",answer:true,diff:2,explain:"Igen! Ez a Brundtland-bizottság 1987-es definíciója: a fenntartható fejlődés kielégíti a jelenlegi igényeket anélkül, hogy veszélyeztetné a jövő generációk lehetőségeit."},
          {text:"Az öntözéses gazdálkodás megszünteti az aszály problémáját.",answer:false,diff:3,explain:"Nem! Az öntözés segít, de az aszály alapproblémáját (kevés csapadék) nem oldja meg – sőt, nem megfelelő öntözés talajsózódást és elmocsarasodást okozhat."},
          {text:"Az emberi tevékenység hatására kialakult éghajlatváltozás visszafordítható, ha csökkentjük a CO₂-kibocsátást.",answer:true,diff:3,explain:"Igen! Bár a már bekövetkezett változások részben visszafordíthatatlanok, a kibocsátás csökkentésével meg lehet állítani a további gyorsuló változást."},
          {text:"Az invazív fajok betelepítése az őshonosak kiszorításával csökkenti a biodiverzitást.",answer:true,diff:3,explain:"Igen! Az invazív fajok versenyképesebben szaporodnak az ismeretlen ökoszisztémában – az őshonosakat kiszorítva csökkentik a biológiai sokféleséget."},
          {text:"Magyarország területének lecsapolása és folyószabályozása teljesen megszüntette az árvízveszélyt.",answer:false,diff:3,explain:"Nem! A folyószabályozás csökkentette, de nem szüntette meg az árvízveszélyt – a 2000-es, 2010-es tiszai árvizek bizonyítják, hogy a kockázat megmaradt."},
          ],
        quiz:[
          {text:"Miért szükséges az erdők védelme az erózió megakadályozásához?",opts:["Mert az erdők szépek","Mert a fák gyökerei kötik a talajt, a lomblevel fékezi az esőcseppek energiáját","Mert az erdők tartják a vizet","Mert az erdők oxigént termelnek"],correct:1,diff:1,explain:"Az erdők kétszeresen védenek az erózió ellen: a gyökerek szorosan tartják a talajt, a lombkorona pedig csökkenti az esőcseppek ütési energiáját."},
          {text:"Mit jelent a fenntartható fejlődés?",opts:["Minél több erőforrás kitermelése","Az emberi igények kielégítése úgy, hogy a jövő generációk is elégíthessék ki a sajátjaikat","A fejlesztések leállítása","Csak megújuló energia használata"],correct:1,diff:1,explain:"A fenntartható fejlődés lényege az egyensúly – a jelennek is elég legyen, de a jövő számára is maradjon elegendő."},
          {text:"Miért veszélyes a fosszilis tüzelőanyagok elégetése?",opts:["Mert drága","Mert CO₂-t bocsát ki, ami fokozza az üvegházhatást és éghajlatváltozást okoz","Mert sötétet termel","Mert zajos"],correct:1,diff:1,explain:"A szén, olaj és gáz elégetése CO₂-t juttat a légkörbe – az üvegházhatás fokozódása felmelegedést és éghajlatváltozást okoz."},
          {text:"Miért csökkenti az urbanizáció (városok terjeszkedése) a termőföldeket?",opts:["Mert a városok szennyezik a termőföldet","Mert az épületek és utak betonnal borítják el az egykor termőföldet","Mert a városiaknak nincs szükségük termőföldre","Mert a városok melletti talaj rosszabb"],correct:1,diff:1,explain:"A városok terjeszkedése betonozza le a termőföldeket – amit egyszer beépítenek, az a mezőgazdaság számára általában elvész."},
          {text:"Miért kevésbé káros a nap- és szélenergia, mint a fosszilis tüzelőanyagok?",opts:["Mert olcsóbb","Mert minimális CO₂-kibocsátással termel energiát, és a napfény, szél kimeríthetetlen forrás","Mert hatékonyabb","Mert nem igényel infrastruktúrát"],correct:1,diff:2,explain:"A megújuló energiaforrások szinte CO₂-mentesen termelnek energiát, és a Nap és a szél energiája nem fogy el – ez teszi őket fenntarthatóbbá."},
          {text:"Miért okoz problémát az invazív fajok megjelenése az ökoszisztémákban?",opts:["Mert szépek","Mert az ős predátorok nem ismerik, így zavartalanul szaporodnak és kiszorítják az őshonosakat","Mert mérgezőek","Mert az emberek terjesztik"],correct:1,diff:2,explain:"Az invazív fajoknak nincs természetes ellensége az új területen – zavartalanul szaporodnak, az őshonosokat élőhely- és táplálékversenyével kiszorítják."},
          {text:"Miért nem oldja meg az öntözés az aszály alapproblémáját?",opts:["Mert az öntözőrendszer drága","Mert az öntözés vizet ad, de a csapadékhiány alapproblémája megmarad, és helytelen öntözés talajsózódást okoz","Mert az öntözött növények gyengébbek","Mert az öntözés több vizet fogyaszt"],correct:1,diff:2,explain:"Az öntözés tüneti kezelés – a csapadékhiány alapproblémáját nem szünteti meg, és nem megfelelő öntözés talaj sókiváláshoz és elmocsarasodáshoz vezethet."},
          {text:"Miért járul hozzá a nagyvárosok betonfelszíne az árvizek fokozódásához?",opts:["Mert a betonváros nehezebb","Mert a betonfelszín nem szívja fel az esővizet – az rögtön a csatornákba és folyókba folyik, gyors árhullámot okozva","Mert a városban hidegebb","Mert a városban több a csapadék"],correct:1,diff:2,explain:"A természetes felszín (talaj, fű) felszívja az esővíz egy részét – a betonfelszín ezt nem tudja, ezért az esővíz gyorsan a folyókba kerül és árhullámot okoz."},
          {text:"Miért szükséges az éghajlatváltozás miatti alkalmazkodás, még ha csökkentjük is a kibocsátást?",opts:["Mert a csökkentés hatástalan","Mert a már bekövetkezett változások részben visszafordíthatatlanok – a hatásokhoz alkalmazkodni kell","Mert az alkalmazkodás olcsóbb","Mert nem érdemes csökkenteni"],correct:1,diff:3,explain:"A kibocsátás csökkentése lelassítja a változást, de a már bekövetkezett és bekövetkező változásokhoz (aszály, árvíz, melegedés) is alkalmazkodni kell."},
          {text:"Miért különösen veszélyesek a mikroplasztikumok a tápláléklánc szempontjából?",opts:["Mert láthatóak","Mert méretük miatt élőlények lenyelik, beépülnek a szövetekbe és a táplálékláncon felfelé haladva feldúsulnak","Mert nehezek","Mert megváltoztatják a víz pH-ját"],correct:1,diff:3,explain:"A mikroplasztikumok biomagnifikálódnak – minden táplálkozási szinten feldúsulnak, végül az ember szervezetébe is bekerülnek."},
          {text:"Miért elengedhetetlen a biodiverzitás megőrzése az emberiség hosszú távú jólétéhez?",opts:["Mert szép a sokféleség","Mert az ökoszisztéma-szolgáltatások (tiszta víz, talaj, porozás) a biológiai sokféleségtől függnek","Mert a fajok érdekesek","Mert törvény írja elő"],correct:1,diff:3,explain:"Az emberiség élelemtől a gyógyszerekig rengeteg dologban támaszkodik az ökoszisztéma-szolgáltatásokra (porozás, vízszűrés, talajképzés) – ezek a biodiverzitás eléréséhez szükségesek."},
          {text:"Miért nem elegendő egyéni szinten tenni a környezetért, ha rendszerszintű változásra van szükség?",opts:["Mert az egyéni tetteknek nincs hatása","Mert az egyéni szintű változás szükséges, de az ipari és energetikai rendszerek globális átalakítása nélkül a globális emisszió nem csökken érdemlegesen","Mert az emberek lusták","Mert a politikusok mindig jobban tudják"],correct:1,diff:3,explain:"Az egyéni tetteknek van hatása (és mintát adnak), de a szén-dioxid nagy részét az ipar, energia és közlekedési szektor bocsátja ki – rendszerszintű szabályozás nélkül elégtelenek az egyéni intézkedések."},

function getProgress(){try{return JSON.parse(localStorage.getItem('termeszet_progress')||'{}');}catch(e){return{};}}
function saveProgress(bigId,subtopicId,pct){var prog=getProgress();if(!prog[bigId])prog[bigId]={};if(!prog[bigId][subtopicId]||pct>(prog[bigId][subtopicId].pct||0)){prog[bigId][subtopicId]={passed:pct>=70,pct:pct};}localStorage.setItem('termeszet_progress',JSON.stringify(prog));}
function isSubtopicUnlocked(bigId,subtopicId){if(subtopicId<=1)return true;var prog=getProgress();var prev=prog[bigId]&&prog[bigId][subtopicId-1];return !!(prev&&prev.passed);}
function getLog(){try{return JSON.parse(localStorage.getItem('termeszet_log')||'[]');}catch(e){return[];}}
function appendLog(entry){var log=getLog();log.push(entry);localStorage.setItem('termeszet_log',JSON.stringify(log));}

function formatTime(s){const m=Math.floor(s/60),sec=s%60;return(m>0?m+' perc ':'')+sec+' mp';}
function streakLabel(){if(streak===0)return'🔥 0';if(streak>=5)return'🔥🔥 '+streak+'!!!';if(streak>=3)return'🔥 '+streak+'!';return'🔥 '+streak;}
function diffLabel(d){if(d===1)return['diff-1','🟢 Könnyű'];if(d===2)return['diff-2','🟡 Közepes'];return['diff-3','🔴 Nehéz'];}
function starsStr(sc,total){const p=sc/total;if(p>=0.9)return'⭐⭐⭐';if(p>=0.65)return'⭐⭐';return'⭐';}
function updateTimer(){elapsedSeconds=Math.floor((Date.now()-startTime)/1000);const el=document.getElementById('timerPill');if(el)el.textContent='⏱ '+formatTime(elapsedSeconds);}
