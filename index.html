<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Természetismeret Játék 🌱 – 5. évfolyam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --grass:#22c55e;--grass-light:#4ade80;
  --earth:#f59e0b;--earth-dark:#92400e;
  --sun:#fbbf24;--sun-warm:#f59e0b;
  --water:#38bdf8;--water-light:#7dd3fc;
  --true-col:#22c55e;--true-bg:rgba(34,197,94,0.12);
  --false-col:#f43f5e;--false-bg:rgba(244,63,94,0.12);
  --card-bg:rgba(30,30,50,0.85);--text-dark:#f0f0f8;--text-mid:#94a3b8;
  --accent:#7c3aed;--accent2:#0ea5e9;
  --border:rgba(255,255,255,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#12121f;color:var(--text-dark);overflow-x:hidden;}
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(110vh) scale(0);opacity:0}10%{opacity:.7}90%{opacity:.2}100%{transform:translateY(-10vh) scale(1.2);opacity:0}}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-deco::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(124,58,237,.10) 0%,transparent 70%);}
.bg-deco::after{content:'';position:absolute;bottom:-20%;left:10%;width:80%;height:60%;background:radial-gradient(ellipse at 50% 100%,rgba(34,197,94,.06) 0%,transparent 70%);}
.sun-fixed{display:none;}
#app{position:relative;z-index:2;max-width:860px;margin:0 auto;padding:16px 14px 70px;}
header{text-align:center;padding:32px 10px 14px;}
header h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:2.4rem;font-weight:400;color:#fff;letter-spacing:-.01em;line-height:1.1;text-shadow:0 0 40px rgba(124,58,237,.5);}
header h1 em{color:#7c3aed;font-style:normal;}
header p{margin-top:6px;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#334155;font-weight:500;}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:none}}
.card{background:rgba(22,22,40,0.90);border-radius:20px;padding:26px 24px 22px;border:1px solid var(--border);box-shadow:0 0 0 1px rgba(124,58,237,.1), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);animation:cardIn 0.35s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(12px);}
.card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none;}
.card{position:relative;}
.name-screen{text-align:center;}
.name-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.7rem;font-weight:400;color:#fff;margin-bottom:8px;text-shadow:0 0 20px rgba(124,58,237,.4);}
.name-screen p{color:var(--text-mid);font-size:.9rem;margin-bottom:24px;font-weight:400;letter-spacing:.03em;}
.name-input{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:500;padding:13px 18px;border-radius:12px;border:1px solid rgba(124,58,237,.4);width:100%;max-width:320px;text-align:center;outline:none;color:#fff;background:rgba(124,58,237,.08);box-shadow:0 0 0 0 rgba(124,58,237,0);margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;transition:border-color .2s, box-shadow .2s;}
.name-input:focus{border-color:rgba(124,58,237,.8);box-shadow:0 0 0 3px rgba(124,58,237,.2);}
.name-input::placeholder{color:#334155;}
.bigtopic-screen{text-align:center;}
.bigtopic-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.55rem;font-weight:400;color:#fff;margin-bottom:4px;}
.bigtopic-screen .sub{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:22px;}
.bigtopic-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:18px;}
.bigtopic-btn{width:100%;font-family:'DM Sans',sans-serif;font-weight:600;padding:20px 22px;border-radius:16px;border:1px solid;cursor:pointer;transition:all 0.2s;text-align:left;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
.bigtopic-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.bigtopic-btn.fuves{border-color:rgba(34,197,94,.3);background:radial-gradient(ellipse at 30% 50%,rgba(34,197,94,.08),rgba(10,20,14,.9));color:#4ade80;}
.bigtopic-btn.fuves:hover{border-color:rgba(34,197,94,.6);background:radial-gradient(ellipse at 30% 50%,rgba(34,197,94,.15),rgba(10,20,14,.9));transform:translateY(-2px);box-shadow:0 8px 30px rgba(34,197,94,.15);}
.bigtopic-btn.vizek{border-color:rgba(56,189,248,.3);background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,.08),rgba(5,15,30,.9));color:#7dd3fc;}
.bigtopic-btn.vizek:hover{border-color:rgba(56,189,248,.6);background:radial-gradient(ellipse at 30% 50%,rgba(56,189,248,.15),rgba(5,15,30,.9));transform:translateY(-2px);box-shadow:0 8px 30px rgba(56,189,248,.15);}
.bigtopic-icon{font-size:2.4rem;flex-shrink:0;filter:drop-shadow(0 0 10px currentColor);}
.bigtopic-title{font-size:1rem;font-weight:600;color:#e2e8f0;}
.bigtopic-sub{font-size:.72rem;font-weight:400;color:var(--text-mid);margin-top:3px;letter-spacing:.02em;}
.subtopic-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.3rem;font-weight:400;color:#fff;margin-bottom:4px;text-align:center;}
.subtopic-screen.water-theme h2{color:var(--water-light);}
.subtopic-screen .sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:18px;text-align:center;}
.subtopic-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:16px;}
.subtopic-btn{font-family:'DM Sans',sans-serif;font-weight:500;font-size:.93rem;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);color:#e2e8f0;cursor:pointer;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:11px;}
.subtopic-btn:hover{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.3);transform:translateX(4px);}
.subtopic-btn.water-style:hover{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);}
.subtopic-btn .snum{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:#475569;min-width:26px;flex-shrink:0;}
.subtopic-btn.water-style .snum{color:#475569;}
.subtopic-btn .sicon{font-size:1.3rem;flex-shrink:0;}
.subtopic-btn .stitle{font-size:.9rem;font-weight:600;}
.subtopic-btn .sstatus{font-size:.68rem;color:var(--text-mid);margin-top:1px;}
.subtopic-btn.locked{opacity:0.35;cursor:not-allowed;}
.subtopic-btn.locked:hover{transform:none;background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07);}
.coming-badge{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:2px 8px;font-size:.68rem;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.ready-badge{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:2px 8px;font-size:.68rem;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0;}
.ready-badge.water{background:rgba(56,189,248,.1);color:#7dd3fc;border-color:rgba(56,189,248,.3);}
.mode-screen h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.25rem;font-weight:400;color:#fff;margin-bottom:4px;text-align:center;}
.mode-screen.water-theme h2{color:var(--water-light);}
.mode-screen .sub{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:500;margin-bottom:18px;text-align:center;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.mode-btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;padding:16px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.18s;text-align:center;position:relative;overflow:hidden;background:rgba(20,20,38,.85);}
.mode-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.mode-btn .btn-icon{font-size:1.8rem;display:block;margin-bottom:5px;filter:drop-shadow(0 0 8px currentColor);}
.mode-btn .btn-label{display:block;font-size:.88rem;color:#e2e8f0;}
.mode-btn .btn-sub{display:block;font-size:.66rem;font-weight:400;color:var(--text-mid);margin-top:3px;}
.mode-btn.igaz{border-color:rgba(34,197,94,.3);color:#4ade80;}
.mode-btn.igaz:hover{border-color:rgba(34,197,94,.7);background:rgba(34,197,94,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(34,197,94,.15);}
.mode-btn.kviz{border-color:rgba(56,189,248,.3);color:#7dd3fc;}
.mode-btn.kviz:hover{border-color:rgba(56,189,248,.7);background:rgba(56,189,248,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(56,189,248,.15);}
.mode-btn.lyukas{border-color:rgba(245,158,11,.3);color:#fbbf24;}
.mode-btn.lyukas:hover{border-color:rgba(245,158,11,.7);background:rgba(245,158,11,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(245,158,11,.15);}
.mode-btn.sort{border-color:rgba(244,63,94,.3);color:#fb7185;}
.mode-btn.sort:hover{border-color:rgba(244,63,94,.7);background:rgba(244,63,94,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(244,63,94,.15);}
.mode-btn.cat{border-color:rgba(124,58,237,.3);color:#a78bfa;}
.mode-btn.cat:hover{border-color:rgba(124,58,237,.7);background:rgba(124,58,237,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,58,237,.15);}
.mode-btn.komp{border-color:rgba(251,191,36,.3);color:#fbbf24;position:relative;overflow:hidden;}
.mode-btn.komp::after{content:'HAMAROSAN';position:absolute;top:6px;right:-18px;background:rgba(251,191,36,.2);color:#fbbf24;font-size:.48rem;font-weight:700;letter-spacing:.08em;padding:2px 22px;transform:rotate(35deg);pointer-events:none;}
.mode-btn.komp:hover{border-color:rgba(251,191,36,.6);background:rgba(251,191,36,.06);transform:translateY(-3px);box-shadow:0 8px 24px rgba(251,191,36,.12);}
.mode-btn.cat:hover{border-color:rgba(124,58,237,.7);background:rgba(124,58,237,.08);transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,58,237,.15);}
.top-bar{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.q-counter{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;color:#94a3b8;white-space:nowrap;min-width:60px;}
.back-game-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:600;background:transparent;border:1px solid rgba(255,255,255,.12);color:#475569;border-radius:12px;padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.back-game-btn:hover{border-color:rgba(244,63,94,.4);color:#fb7185;background:rgba(244,63,94,.07);}
.prog-wrap{flex:1;background:rgba(255,255,255,.06);border-radius:20px;height:4px;overflow:hidden;min-width:50px;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#7c3aed,#22c55e);transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.score-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:3px 11px;color:#a78bfa;white-space:nowrap;}
.timer-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);border-radius:20px;padding:3px 11px;color:#7dd3fc;white-space:nowrap;}
.pct-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:20px;padding:3px 11px;color:#4ade80;white-space:nowrap;transition:all .3s;}
.pct-pill.low{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#fb7185;}
.pass-banner{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.4);color:#4ade80;border-radius:14px;padding:14px 18px;font-size:1rem;font-weight:700;margin-bottom:14px;text-align:center;letter-spacing:.01em;}
.fail-banner{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.35);color:#fb7185;border-radius:14px;padding:14px 18px;font-size:.92rem;font-weight:600;margin-bottom:14px;text-align:center;line-height:1.55;}
.streak-pill{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.88rem;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 11px;color:#fbbf24;white-space:nowrap;transition:all .3s;}
.streak-pill.pop{animation:streakPop 0.4s cubic-bezier(.4,0,.2,1);}
@keyframes streakPop{0%{transform:scale(1)}40%{transform:scale(1.45) rotate(-6deg)}70%{transform:scale(0.92) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.streak-pill.on-fire{background:linear-gradient(90deg,rgba(251,191,36,.2),rgba(239,68,68,.2));border-color:rgba(239,68,68,.5);color:#fca5a5;}
.streak-pill.broken{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:#fb7185;animation:streakBreak 0.45s ease;}
@keyframes streakBreak{0%{transform:scale(1)}30%{transform:scale(1.12) rotate(8deg)}65%{transform:scale(0.9) rotate(-5deg)}100%{transform:scale(1) rotate(0)}}
.diff-badge{display:inline-block;border-radius:20px;padding:3px 13px;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;margin-bottom:13px;letter-spacing:.05em;}
.diff-1{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
.diff-2{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.diff-3{background:rgba(244,63,94,.1);color:#fb7185;border:1px solid rgba(244,63,94,.3);}
.q-number{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:500;color:#475569;margin-bottom:5px;letter-spacing:.05em;}
.q-text{font-family:'DM Sans',sans-serif;font-size:1.1rem;font-weight:500;color:#e2e8f0;line-height:1.55;margin-bottom:18px;}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px;}
.ans-btn{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;padding:15px 10px;border-radius:14px;border:1px solid;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-true{background:rgba(34,197,94,.08);color:#4ade80;border-color:rgba(34,197,94,.3);}
.btn-false{background:rgba(244,63,94,.08);color:#fb7185;border-color:rgba(244,63,94,.3);}
.ans-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.ans-btn:disabled{cursor:default;opacity:0.7;}
.ans-btn.selected-correct{background:rgba(34,197,94,.2);border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.2);}
.ans-btn.selected-wrong{background:rgba(244,63,94,.2);border-color:#f43f5e;}
.ans-btn.reveal-correct{background:rgba(34,197,94,.15);border-color:#22c55e;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
.opt-btn{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#cbd5e1;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4;}
.opt-btn:hover:not(:disabled){background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.4);color:#e2e8f0;}
.opt-btn:disabled{cursor:default;}
.opt-btn.selected-correct{background:rgba(34,197,94,.15);border-color:#22c55e;color:#4ade80;}
.opt-btn.selected-wrong{background:rgba(244,63,94,.15);border-color:#f43f5e;color:#fb7185;}
.opt-btn.reveal-correct{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.5);}
.fill-sentence{font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:400;line-height:2.5;color:#e2e8f0;margin-bottom:15px;background:rgba(255,255,255,.03);border-radius:12px;padding:15px 17px;border:1px solid rgba(255,255,255,.07);}
.fill-select{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:600;padding:4px 9px;border-radius:8px;border:1px solid rgba(124,58,237,.4);background:rgba(124,58,237,.1);color:#a78bfa;cursor:pointer;outline:none;vertical-align:middle;min-width:110px;}
.fill-select:focus{border-color:rgba(124,58,237,.8);}
.fill-select.correct{background:rgba(34,197,94,.15);border-color:#22c55e;color:#4ade80;}
.fill-select.wrong{background:rgba(244,63,94,.15);border-color:#f43f5e;color:#fb7185;}
.fill-select:disabled{cursor:default;}
.fill-hint{font-size:.8rem;color:var(--text-mid);font-weight:400;margin-bottom:13px;font-style:italic;letter-spacing:.02em;}
.feedback{border-radius:12px;padding:12px 15px;font-size:.9rem;font-weight:500;line-height:1.55;margin-bottom:13px;display:none;}
.feedback.show{display:block;animation:feedIn 0.25s ease;}
@keyframes feedIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.feedback.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.feedback.wrong{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fb7185;}
.fill-result{border-radius:12px;padding:12px 15px;font-size:.9rem;font-weight:500;line-height:1.55;margin-bottom:13px;display:none;}
.fill-result.show{display:block;animation:feedIn 0.25s ease;}
.fill-result.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;}
.fill-result.wrong{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);color:#fb7185;}
.fill-result.partial{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24;}
.check-fill-btn{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:11px 32px;background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.4);border-radius:25px;cursor:pointer;transition:all 0.15s;display:block;margin:0 auto 13px;}
.check-fill-btn:hover{background:rgba(124,58,237,.25);border-color:rgba(124,58,237,.7);transform:translateY(-2px);}
.check-fill-btn:disabled{opacity:0.4;cursor:default;transform:none;}
.sort-intro{font-size:.8rem;color:var(--text-mid);font-weight:400;margin-bottom:14px;font-style:italic;background:rgba(255,255,255,.03);border-radius:10px;padding:9px 13px;border:1px solid rgba(255,255,255,.07);letter-spacing:.02em;}
.sort-list{display:flex;flex-direction:column;gap:8px;margin-bottom:15px;min-height:40px;}
.sort-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:.93rem;font-weight:500;color:#e2e8f0;cursor:grab;user-select:none;display:flex;align-items:center;gap:10px;transition:all 0.15s;touch-action:none;}
.sort-item:active{cursor:grabbing;}
.sort-item.dragging{opacity:0.4;transform:scale(1.03);border-color:rgba(124,58,237,.5);}
.sort-item.drag-over{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.5);}
.sort-item.correct-item{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#4ade80;}
.sort-item.wrong-item{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);color:#fb7185;}
.sort-handle{font-size:1rem;opacity:0.3;flex-shrink:0;}
.sort-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem;color:#475569;min-width:22px;flex-shrink:0;}
.sort-check-btn{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:11px 32px;background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.35);border-radius:25px;cursor:pointer;transition:all 0.15s;display:block;margin:0 auto 13px;}
.sort-check-btn:hover{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.6);transform:translateY(-2px);}
.sort-check-btn:disabled{opacity:0.4;cursor:default;transform:none;}

/* ===== TÉMA-ALAPÚ VIZUÁLIS RENDSZER ===== */
body { transition: background 1.2s cubic-bezier(.4,0,.2,1); }

/* FÜVES */
body.theme-fuves { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(20,60,20,.95) 0%, #0a1a0e 55%, #10141a 100%); }
body.theme-fuves .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(34,197,94,.18) 0%, transparent 70%); }
body.theme-fuves .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(34,197,94,.16) 0%, rgba(251,191,36,.07) 40%, transparent 70%); }
body.theme-fuves .card { border-color: rgba(34,197,94,.25) !important; box-shadow: 0 0 0 1px rgba(34,197,94,.15), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(34,197,94,.10) !important; }
body.theme-fuves .prog-fill { background: linear-gradient(90deg, #22c55e, #fbbf24); }

/* VIZEK */
body.theme-vizek { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(5,30,60,.98) 0%, #030d1e 55%, #0a0f18 100%); }
body.theme-vizek .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(56,189,248,.18) 0%, transparent 70%); }
body.theme-vizek .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(56,189,248,.18) 0%, rgba(14,165,233,.07) 40%, transparent 70%); }
body.theme-vizek .card { border-color: rgba(56,189,248,.25) !important; box-shadow: 0 0 0 1px rgba(56,189,248,.15), 0 20px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(56,189,248,.10) !important; }
body.theme-vizek .prog-fill { background: linear-gradient(90deg, #0ea5e9, #7dd3fc); }

/* ERDŐ */
body.theme-erdo { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(10,35,10,.98) 0%, #060f06 55%, #0c1210 100%); }
body.theme-erdo .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(20,160,80,.16) 0%, transparent 70%); }
body.theme-erdo .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(20,160,80,.14) 0%, rgba(139,90,43,.08) 40%, transparent 70%); }
body.theme-erdo .card { border-color: rgba(20,160,80,.28) !important; box-shadow: 0 0 0 1px rgba(20,160,80,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(20,160,80,.10) !important; }
body.theme-erdo .prog-fill { background: linear-gradient(90deg, #14a050, #a3e635); }

/* KÖLCSÖNHATÁSOK */
body.theme-kolcson { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(60,30,5,.98) 0%, #1a0e03 55%, #141008 100%); }
body.theme-kolcson .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(245,158,11,.16) 0%, transparent 70%); }
body.theme-kolcson .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(245,158,11,.14) 0%, rgba(239,68,68,.06) 40%, transparent 70%); }
body.theme-kolcson .card { border-color: rgba(245,158,11,.28) !important; box-shadow: 0 0 0 1px rgba(245,158,11,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(245,158,11,.10) !important; }
body.theme-kolcson .prog-fill { background: linear-gradient(90deg, #f59e0b, #ef4444); }

/* FÖLD */
body.theme-fold { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(5,20,50,.98) 0%, #030a1a 55%, #080c18 100%); }
body.theme-fold .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(99,102,241,.18) 0%, transparent 70%); }
body.theme-fold .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(99,102,241,.14) 0%, rgba(56,189,248,.06) 40%, transparent 70%); }
body.theme-fold .card { border-color: rgba(99,102,241,.28) !important; box-shadow: 0 0 0 1px rgba(99,102,241,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(99,102,241,.10) !important; }
body.theme-fold .prog-fill { background: linear-gradient(90deg, #6366f1, #38bdf8); }

/* TERMÉSZET ERŐI */
body.theme-termeszet { background: radial-gradient(ellipse 120% 80% at 50% 100%, rgba(50,10,10,.98) 0%, #180505 55%, #120808 100%); }
body.theme-termeszet .bg-deco::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(220,38,38,.18) 0%, transparent 70%); }
body.theme-termeszet .bg-deco::after { background: radial-gradient(ellipse at 50% 100%, rgba(220,38,38,.14) 0%, rgba(245,158,11,.07) 40%, transparent 70%); }
body.theme-termeszet .card { border-color: rgba(220,38,38,.28) !important; box-shadow: 0 0 0 1px rgba(220,38,38,.16), 0 20px 60px rgba(0,0,0,.65), inset 0 1px 0 rgba(220,38,38,.10) !important; }
body.theme-termeszet .prog-fill { background: linear-gradient(90deg, #dc2626, #f59e0b); }

/* Emoji deco */
.bg-emoji-deco { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
.bg-emoji-deco span { position:absolute;font-size:1.6rem;opacity:0;animation:emojiFloat linear infinite;user-select:none;pointer-events:none; }
@keyframes emojiFloat { 0%{transform:translateY(110vh) rotate(0deg) scale(0.6);opacity:0} 8%{opacity:0.12} 88%{opacity:0.07} 100%{transform:translateY(-12vh) rotate(360deg) scale(1.1);opacity:0} }
.particle.tp { border-radius:2px 50% 2px 50%; }
.particle.tp-w { border-radius:50% 50% 50% 0; }
.particle.tp-r { border-radius:3px; }

        tf:[
          {text:"A gyökér a növény föld alatti része.",answer:true,diff:1,explain:"Igen! A gyökér a talajban van — rögzíti a növényt és vizet, tápanyagot szív fel."},
          {text:"A levél a növény szaporodásra szolgáló része.",answer:false,diff:1,explain:"Nem! A szaporodásra a virág szolgál. A levél a fotoszintézis helye."},
          {text:"A fotoszintézis a levélben megy végbe.",answer:true,diff:1,explain:"Igen! A levél a növény »konyhája« — itt készül a táplálék napfény segítségével."},
          {text:"A fás szárú növények szára puha és hajlékony.",answer:false,diff:1,explain:"Nem! A fás szárú növények (pl. fák, bokrok) szára kemény és fás. A lágyszárúak szára puha."},
          {text:"A termés a virágból fejlődik ki.",answer:true,diff:1,explain:"Pontosan! A virág beporzás után termést fejleszt, ami a magokat védi és terjeszti."},
          {text:"A kultúrnövényeket az ember termeszti a saját hasznára.",answer:true,diff:1,explain:"Igen! Például a búza, a kukorica, a paradicsom és az alma mind kultúrnövény."},
          {text:"A gyökér feladata kizárólag a növény rögzítése.",answer:false,diff:2,explain:"Nem egészen! A gyökér egyszerre rögzíti a növényt ÉS felszívja a vizet és a tápanyagokat."},
          {text:"A virág azért színes és illatos, hogy vonzza a beporzást végző rovarokat.",answer:true,diff:2,explain:"Igen! A rovarok a nektárért jönnek, közben pollent visznek egyik virágból a másikba."},
          {text:"A szár csak tartja a leveleket, de nem szállít anyagokat.",answer:false,diff:2,explain:"Nem! A szár szállítja is a vizet és a tápanyagokat a gyökértől a levelekig és vissza."},
          {text:"A lágyszárú növények szára idővel elfásodik.",answer:false,diff:2,explain:"Nem! A lágyszárú növények szára puha marad. Az elfásodás a fás szárúakra jellemző."},
          {text:"A zöldség és a gyümölcs is kultúrnövény lehet.",answer:true,diff:2,explain:"Igen! Például a paradicsom (zöldség) és az alma (gyümölcs) is kultúrnövény — az ember termeszti."},

      {id:2,icon:'🍎',title:'Az almafa',ready:true,tananyag:{bevezeto:'Az alma a legfontosabb hazai gyümölcsünk – egész évben kapható és nyersen fogyasztjuk. A vadalmából nemesítették, ma már több ezer fajtája létezik. Az almafának sok csapadékra (600–800 mm/év), tápanyagban gazdag talajra és öntözésre van szüksége. Fő termőterülete Szabolcs-Szatmár-Bereg vármegye, a Duna–Tisza köze és Zala vármegye. Tavasszal virágzik, a virágport rovarok szállítják (rovarbeporzás). A virágból különleges termés fejlődik: a vacok és a csészelevelek is részt vesznek az alma kialakításában – ezt almatermésnek nevezzük. A viaszos héj védi a gyümölcshúst, a közepén hártyás rekeszekben találhatók a magok. Az almát károsítja az almamoly: hernyói berágnak a termésbe, ami lehullik. Védekezés: énekesmadarak, hernyófogó övek, permetezés.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Gyümölcs',leiras:'Lédús termés, amit általában nyersen fogyasztunk. Sok vitamint és ásványi anyagot tartalmaz.',kep:''},{nev:'Nemesítés',leiras:'A vadon termő növények tulajdonságainak javítása, hogy jobban megfeleljenek az emberi igényeknek.',kep:''},{nev:'Rovarbeporzás',leiras:'Amikor a rovarok a virágport egyik virágról a másikra viszik, segítve a termés kialakulását.',kep:''},{nev:'Almatermés',leiras:'Különleges termés, amelynek kialakításában a virág vacokja és csészelevelei is részt vesznek.',kep:''},{nev:'Almamoly',leiras:'Az almafa kártevője, melynek hernyói berágnak a termésbe és tönkreteszik azt.',kep:''},{nev:'Kultúrnövény',leiras:'Az ember által termesztett növény, például az alma, a búza vagy a kukorica.',kep:''},{nev:'Termőhely',leiras:'Az a hely, ahol egy növény természetes körülmények között megterem.',kep:''}],erdekes:'💡 Tudtad? Az alma C-vitamint, ásványi anyagokat és rostanyagokat tartalmaz. A héjában lévő rostok tisztítják a vérkeringést, segítik az emésztést és méregtelenítik a szervezetet. Ezért mondják: »Napi egy alma az orvost távol tartja!«',erdekes_kep:'',erdekes_kep_felirat:''}       {id:3,icon:'🫐',title:'A szilvafa',ready:true,tananyag:{bevezeto:'A szilvafa Közép-Ázsiából származik, ma már szinte mindenhol ültetik Magyarországon. A nyirkos talajt kedveli; fő termőterületei a Zalai-dombság, Szabolcs-Szatmár-Bereg vármegye és a hegyvidéki lankák. A legismertebb hazai fajta a besztercei szilva. A szilvafa fás szárú növény: törzse alacsony–közepes, kérge sötétszürke, ágai sűrűn, felfelé nőnek. Gyökérzete a felszín közelében sűrű hálózatot alkot. Termése csonthéjas termés: vékony, viaszos héja véd a rothadástól, belül lédús gyümölcshús, a közepén kemény csonthéjban egy mag van. A szilva kártevője a szilvamoly: hernyói berágnak a gyümölcsbe – ez a »kukacos« szilva. Egy fa évente 40–50 kg szilvát teremhet és kb. 30 évig él. A szilvát lekvárnak, fagyasztva vagy kompótként is tartósítják.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Csonthéjas termés',leiras:'Olyan termés, amelynek belsejében kemény héjú mag (kőmag) van – ilyen a szilva, cseresznye, őszibarack.',kep:''},{nev:'Szilvamoly',leiras:'Kis lepkefaj, amelynek hernyói berágnak a szilva termésbe – ettől lesz »kukacos« a szilva.',kep:''},{nev:'Besztercei szilva',leiras:'A legelterjedtebb és legismertebb hazai szilvafajta.',kep:''},{nev:'Életközösség',leiras:'Élőlények együttélése egy területen, ahol egymásra hatnak és egymástól függenek.',kep:''},{nev:'Életfeltétel',leiras:'Azok a tényezők (fény, víz, hőmérséklet, tápanyag), amelyek nélkülözhetetlenek egy élőlény számára.',kep:''},{nev:'Kártevő',leiras:'Olyan élőlény, amely az ember számára kárt okoz, például termények megrongálásával.',kep:''}],erdekes:'💡 Tudtad? Egy szilvafa évente 40–50 kg szilvát is teremhet és kb. 30 évig él! Egyéb csonthéjas termések: sárgabarack, őszibarack, cseresznye, meggy – és a dió is, bár ott a magját esszük!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A szilvafa Közép-Ázsiából származik.',answer:true,diff:1,explain:'Igen! A szilvafa őse Közép-Ázsiából jött, ma már szerte Magyarországon termes       {id:4,icon:'🍇',title:'A szőlő',ready:true,tananyag:{bevezeto:'A szőlő őse a ligeti szőlő, amely fákra kapaszkodva él a fényes lombkoronában. A nemesítők kb. 5000 fajtát hoztak létre. A legjobb szőlők borvidékeken teremnek (pl. Balaton-felvidék, Tokaj). Hosszú életű növény, több száz évig is elélhet, de a nagyüzemi termesztésben 40–50 évig tartják. Gyökérzete száraz területeken igen mélyre nyúl. A szőlőtőke az elfásodott többéves rész; belőle nőnek a vesszők, levelek és kacsok – utóbbiak kapaszkodóként szolgálnak. Virágai aprók, illatosak (május–június). Termése bogyótermés: héj, gyümölcshús és magok alkotják. Csoportosítás: borszőlők (lédúsak, sok cukor) és csemegeszőlők (kemény hús, nagy szemek). Gombabetegségek: szőlőperonoszpóra és lisztharmat – párás időben terjednek, vegyszeres permetezéssel védekeznek.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Ligeti szőlő',leiras:'A szőlő vad őse, amely fákra kapaszkodva él az erdők szélén.',kep:''},{nev:'Szőlőtőke',leiras:'A szőlő növény elfásodott, többéves főrésze, amelyből a vesszők nőnek.',kep:''},{nev:'Kacs',leiras:'A szőlő hajtásán lévő csigavonal alakú kapaszkodó szerv.',kep:''},{nev:'Bogyótermés',leiras:'Húsos, sokmagvú termés – ilyen a szőlő, a paradicsom és a paprika is.',kep:''},{nev:'Borvidék',leiras:'Olyan terület, ahol a talaj és az éghajlat ideálisan alkalmas a szőlőtermesztésre.',kep:''},{nev:'Szőlőperonoszpóra',leiras:'Gombabetegség, amely a szőlő leveleit és bogyóit károsítja párás időben.',kep:''},{nev:'Növényi részek',leiras:'A növény szervei: gyökér, szár, levél, virágzat, termés – mindegyiknek saját feladata van.',kep:''}],erdekes:'💡 Tudtad? A szőlő segít az izomfáradtság ellen, felfrissít, tisztítja a vért és segíti a szívműködést. Vitamintartalma erősíti az immunrendszert, rostjai segítik a bélműködést. Egyes szőlőtőkék több száz évig is élnek – a világ legöregebb termő szőlőtőkéje Maribor városában (Szlovénia) van, és több mint 400 éves!',erdekes_kep:'',erdekes_kep_felirat:''},tf       {id:5,icon:'🫑',title:'A paprika és a paradicsom',ready:true,tananyag:{bevezeto:'A paprika Közép-Amerikából érkezett a 17. században, és a 19. sz. végétől termesztik tömegesen Magyarországon – főként Szeged és Kalocsa környékén. Sok napfényt és öntözést igényel. Fehér virágjából húsos bogyótermés fejlődik. Levele egyszerű levél, gyökérzete főgyökérzet. Gazdag C- és A-vitaminban: az étkezési paprikát nyersen vagy tartósítva fogyasztják, a fűszerpaprikát szárítják és őrlik. A paradicsom Dél-Amerikából származik, a 20. sz. elejétől termesztik hazánkban. Kevésbé igényes, mint a paprika. Bogyótermése van. Gazdag C-, B- és A-vitaminban. Szára lágyszárú, levele összetett levél, gyökérzete főgyökérzet. Mindkettő egynyári növény: tavasszal palántaágyba vetik, majd május elején ültetik ki a szabadba.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Bogyótermés',leiras:'Húsos, sokmagvú termés – ilyen a paprika, a paradicsom és a szőlő is.',kep:''},{nev:'Főgyökérzet',leiras:'Egy vastag főgyökérből eredő gyökérrendszer, amelyből oldalgyökerek ágaznak el.',kep:''},{nev:'Egynyári növény',leiras:'Olyan növény, amelynek élete egy évig tart – tavasszal kicsírázik, ősszel elpusztul.',kep:''},{nev:'Egyszerű levél',leiras:'A levélnyéllel közvetlenül a szárhoz kapcsolódó, osztatlan lemezű levél – ilyen a paprika levele.',kep:''},{nev:'Összetett levél',leiras:'Több kisebb levélke kapcsolódik egy közös levélnyélhez – ilyen a paradicsom levele.',kep:''},{nev:'Palántaágy',leiras:'Védett hely (fólia vagy üvegház alatt), ahol a növények magjait kora tavasszal elvetik.',kep:''},{nev:'Életfeltétel',leiras:'Azok a tényezők (napfény, víz, hőmérséklet, tápanyag), amelyek szükségesek egy élőlény életéhez.',kep:''}],erdekes:'💡 Tudtad? A paprika C-vitamin tartalma nagyobb, mint a citromé! A fűszerpaprika az egyik legfontosabb magyar fűszer – a Szeged és Kalocsa környéki paprika világhírű. A paradicsom pedig valójában botanikailag gyümölcs (bogyótermés), nem zöldség – de a konyhában zöldsé       {id:1,icon:'🧴',title:'A bőr és egészségvédelme',ready:true,tananyag:{bevezeto:'A bőr a test legnagyobb szerve és kültakarója – elválasztja a belső szerveket a külvilágtól. Három rétegből áll: a hámréteg (legkülső, védő réteg, kórokozók ellen), az irharéteg (középső rész, ereket, idegeket, faggyú- és verejtékmirigyeket tartalmaz) és a bőralja (legalsó, zsírszövetes réteg, hőszigetelés és energiatartalék). A bőr fontos funkciókat lát el: véd a külső hatások, kórokozók és UV-sugárzás ellen; szabályozza a testhőmérsékletet (verejtékezéssel és zsírszövettel); érzékeli a tapintást, hőmérsékletet és fájdalmat; és részt vesz az anyagcserében. A bőr egészségének megőrzéséhez rendszeres tisztálkodás, megfelelő táplálkozás (A- és C-vitamin), bőrsérülések kezelése és napvédelem szükséges. A bőr színét a melanin festékanyag határozza meg, amely UV-védelmet is nyújt.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Bőr (kültakaró)',leiras:'A test külső védőrétege, amely elválasztja a belső szerveket a környezettől.',kep:''},{nev:'Hámréteg',leiras:'A bőr legfelső, védő rétege, amely megakadályozza a kórokozók bejutását.',kep:''},{nev:'Irharéteg',leiras:'A bőr középső, rugalmas rétege, amely ereket, idegeket és mirigyeket tartalmaz.',kep:''},{nev:'Bőralja',leiras:'A bőr legalsó rétege, amely zsírszövetet tartalmaz – hőszigetelő és energiatartalék.',kep:''},{nev:'Faggyúmirigy',leiras:'Zsíros váladékot termel, ami puhává és rugalmassá teszi a bőrt.',kep:''},{nev:'Verejtékmirigy',leiras:'Verejtéket termel, ami párolgással hűti a testet – hőszabályozó szerepe van.',kep:''},{nev:'Érzékszerv',leiras:'A bőrben lévő idegsejtekkel érzékeljük a tapintást, hőmérsékletet és fájdalmat.',kep:''},{nev:'Sejt',leiras:'Az emberi test legkisebb élő egysége.',kep:''},{nev:'Szerv',leiras:'Különböző szövetekből álló testrész, amely egy meghatározott funkciót lát el.',kep:''},{nev:'Szervrendszer',leiras:'Azonos működésű szervek csoportja, amelyek együtt látnak el egy feladatot.',kep:''},{nev:'Szervezet',leiras:'Az emberi test egésze, a szervrendszerek összessége.',kep:''}],erdekes:'💡 Tudtad? A bőr színét a melanin nevű festékanyag mennyisége határozza meg. A melanin véd a káros UV-sugárzástól. A különböző rasszok bőrszíne az evolúció során alakult ki az éghajlati viszonyokhoz alkalmazkodva – a sötétebb bőrűek több melaninnal rendelkeznek, ezért jobban védettek a nap káros hatásaitól. A haj és a körmök szintén bőr eredetű képződmények!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A bőr a test legnagyobb szerve.',answer:true,diff:1,explain:'Igen! A bőr (kültakaró) az emberi test legnagyobb szerve.'},{text:'A hámréteg a bőr legalsó rétege.',answer:false,diff:1,explain:'Nem! A hámréteg a bőr LEGFELSŐ rétege. A legalsó a bőralja.'},{text:'A verejtékmirigy zsíros váladékot termel.',answer:false,diff:1,explain:'Nem! A verejtéket a verejtékmirigy termeli. A faggyúmirigy termeli a zsíros váladékot.'},{text:'A bőr fontos szerepet játszik a hőszabályozásban.',answer:true,diff:1,explain:'Igen! A bőr verejtékezéssel és a bőralja zsírszövetével szabályozza a testhőmérsékletet.'},{text:'Az irharéteg ereket, idegeket és mirigyeket tartalmaz.',answer:true,diff:1,explain:'Igen! Az irharéteg (középső réteg) tartalmazza az ereket, idegeket, faggyú- és verejtékmirigyeket.'},{text:'A bőralja zsírszövete csak esztétikai szerepet tölt be.',answer:false,diff:2,explain:'Nem! A bőralja zsírszövete hőszigetelést biztosít és energiatartalékként is szolgál.'},{text:'A faggyúmirigy puhává és rugalmassá teszi a bőrt.',answer:true,diff:2,explain:'Igen! A faggyúmirigy zsíros váladéka gondoskodik arról, hogy a bőr rugalmas és puha maradjon.'},{text:'A bőr csak a tapintást érzékeli.',answer:false,diff:2,explain:'Nem! A bőr a tapintáson kívül a hőmérsékletet és a fájdalmat is érzékeli.'},{text:'A melanin nevű festékanyag határozza meg a bőr színét.',answer:true,diff:2,explain:'Igen! A melanin mennyisége adja a bőr, a haj és a szem színét, és véd a káros UV-sugaraktól.'},{text:'A szervrendszer egyetlen szervből áll.',answer:false,diff:3,explain:'Nem! A szervrendszer azonos működésű szervek CSOPORTJA, amelyek együtt látnak el egy feladatot.'},{text:'A haj és a körmök bőr eredetű képződmények.',answer:true,diff:2,explain:'Igen! A haj hajhagymákból nő ki, a körmök a körömágyban lévő sejtek osztódásával képződnek – mindkettő bőr eredetű.'},{text:'A napvédelem nem fontos a bőr egészségéhez.',answer:false,diff:3,explain:'Nem! A túlzott napozás káros – sapka, UV-szűrős szemüveg és naptej védi a bőrt.'}],quiz:[{text:'Hány rétegből áll a bőr?',opts:['1 réteg','2 réteg','3 réteg','4 réteg'],correct:2,diff:1,explain:'A bőrnek 3 rétege van: hámréteg (legkülső), irharéteg (középső) és bőralja (legalsó).'},{text:'Melyik a bőr legfelső rétege?',opts:['Bőralja','Irharéteg','Hámréteg','Zsírszövet'],correct:2,diff:1,explain:'A hámréteg a bőr legkülső, védő rétege, amely megakadályozza a kórokozók bejutását.'},{text:'Mi a verejtékmirigy feladata?',opts:['Zsíros váladék termelése','Verejtékezéssel hűti a testet','Melanin termelése','Hőszigetelés'],correct:1,diff:1,explain:'A verejtékmirigy verejtéket termel, amely párolgáskor hűti a testet – ez a bőr hőszabályozó szerepe.'},{text:'Melyik réteg tartalmazza az ereket és idegeket?',opts:['Hámréteg','Irharéteg','Bőralja','Mindegyik'],correct:1,diff:1,explain:'Az irharéteg (középső réteg) tartalmazza az ereket, idegeket és mirigyeket.'},{text:'Mi határozza meg a bőr színét?',opts:['Koleszterin','Melanin','Hemoglobin','Karotin'],correct:1,diff:2,explain:'A melanin festékanyag mennyisége határozza meg a bőr, a haj és a szem színét.'},{text:'Mi a bőralja zsírszövetének feladata?',opts:['Kórokozók elleni védelem','Tapintás érzékelése','Hőszigetelés és energiatartalék','Verejtéktermelés'],correct:2,diff:2,explain:'A bőralja zsírszövete hőszigetelést biztosít és energiatartalékként szolgál a szervezet számára.'},{text:'Mit érzékel a bőr?',opts:['Csak tapintást','Tapintást és hőmérsékletet','Tapintást, hőmérsékletet és fájdalmat','Csak fájdalmat'],correct:2,diff:2,explain:'A bőrben lévő idegvégződések érzékelik a tapintást, a hőmérsékletet és a fájdalmat is.'},{text:'Mi szükséges a bőr egészségének megőrzéséhez?',opts:['Csak tisztálkodás','Csak napozás','Tisztálkodás, helyes táplálkozás és napvédelem','Csak vitaminok'],correct:2,diff:2,explain:'A bőr egészségéhez rendszeres tisztálkodás, megfelelő táplálkozás (A- és C-vitamin) és napvédelem szükséges.'},{text:'Mi a különbség a faggyúmirigy és a verejtékmirigy között?',opts:['Mindkettő verejtéket termel','A faggyúmirigy zsíros váladékot, a verejtékmirigy verejtéket termel','A faggyúmirigy melanint termel','Nincs különbség köztük'],correct:1,diff:3,explain:'A faggyúmirigy zsíros váladékot termel (bőrpuhítás), a verejtékmirigy verejtéket (hőszabályozás).'},{text:'Mi a szervrendszer?',opts:['Egyetlen nagy szerv','A sejtek összessége','Azonos működésű szervek csoportja','A test legkisebb egysége'],correct:2,diff:3,explain:'A szervrendszer azonos működésű szervek csoportja, amelyek együtt látnak el egy feladatot – pl. az emésztőrendszer.'}],fill:[{diff:1,parts:['A bőr legfelső, védő rétege a ',{id:0},'.'],gaps:[{id:0,correct:'hámréteg',options:['hámréteg','irharéteg','bőralja','zsírszövet']}]},{diff:1,parts:['A ',{id:0},' verejtéket termel, ami párolgással hűti a testet.'],gaps:[{id:0,correct:'verejtékmirigy',options:['verejtékmirigy','faggyúmirigy','nyálmirigy','pajzsmirigy']}]},{diff:1,parts:['A bőr középső rétege az ',{id:0},', amely ereket, idegeket és mirigyeket tartalmaz.'],gaps:[{id:0,correct:'irharéteg',options:['irharéteg','hámréteg','bőralja','zsírszövet']}]},{diff:2,parts:['A bőr színét a ',{id:0},' nevű festékanyag mennyisége határozza meg.'],gaps:[{id:0,correct:'melanin',options:['melanin','hemoglobin','koleszterin','karotin']}]},{diff:2,parts:['A ',{id:0},' zsíros váladékot termel, ami puhává teszi a bőrt.'],gaps:[{id:0,correct:'faggyúmirigy',options:['faggyúmirigy','verejtékmirigy','nyálmirigy','pajzsmirigy']}]},{diff:2,parts:['A bőralja legalsó rétege ',{id:0},' szövetet tartalmaz, ami hőszigetelést és energiatartalékot biztosít.'],gaps:[{id:0,correct:'zsír-',options:['zsír-','izom-','csont-','ideg-']}]},{diff:3,parts:['Az azonos működésű szervek csoportját ',{id:0},'nek nevezzük.'],gaps:[{id:0,correct:'szervrendszer',options:['szervrendszer','szövet','sejt','szervek']}]},{diff:3,parts:['A bőr a tapintáson és hőmérséklet-érzékelésen kívül a ',{id:0},' is érzékeli.'],gaps:[{id:0,correct:'fájdalmat',options:['fájdalmat','szagokat','hangokat','ízeket']}]}],sort:[{diff:1,question:'Rendezd sorba a bőr rétegeit kívülről befelé!',items:['Bőralja','Irharéteg','Hámréteg'],correct:[2,1,0],explain:'Kívülről befelé: hámréteg → irharéteg → bőralja.'},{diff:2,question:'Rendezd sorba a bőrsérülés kezelésének lépéseit!',items:['Kötözés','Fertőtlenítés','Orvoshoz fordulás (ha szükséges)','Sebek megvizsgálása'],correct:[3,1,0,2],explain:'Sebek megvizsgálása → fertőtlenítés → kötözés → orvoshoz fordulás (ha szükséges).'},{diff:3,question:'Rendezd sorba a szervezet felépítésének szintjeit a legkisebbtől a legnagyobb felé!',items:['Szervrendszer','Szerv','Szövet','Sejt'],correct:[3,2,1,0],explain:'Legkisebbtől a legnagyobbig: sejt → szövet → szerv → szervrendszer.'}],cat:[{diff:1,question:'Sorold be: melyik BŐR RÉTEGHEZ tartozik?',boxYes:'🔴 Hámréteg / Irharéteg',boxNo:'🟡 Bőralja',items:[{text:'Védő külső réteg',correct:true},{text:'Zsírszövet',correct:false},{text:'Erek és idegek',correct:true},{text:'Energiatartalék',correct:false},{text:'Faggyúmirigyek',correct:true},{text:'Hőszigetelés',correct:false}],explain:'Hámréteg/irharéteg: védő külső réteg, erek és idegek, faggyúmirigyek. Bőralja: zsírszövet, energiatartalék, hőszigetelés.'},{diff:2,question:'Sorold be: a bőr VÉDELMI FUNKCIÓJA vagy HŐSZABÁLYOZÓ FUNKCIÓJA?',boxYes:'🛡️ Védelem',boxNo:'🌡️ Hőszabályozás',items:[{text:'Kórokozók elleni gát',correct:true},{text:'Verejtékezés',correct:false},{text:'UV-sugárzás elleni védelem',correct:true},{text:'Bőralja zsírszövete',correct:false},{text:'Fizikai sérülések ellen',correct:true},{text:'Melanin termelése',correct:false}],explain:'Védelem: kórokozók, UV-sugárzás, fizikai sérülések. Hőszabályozás: verejtékezés, zsírszövet, melanin.'},{diff:3,question:'Sorold be: SEJT, SZERV, SZERVRENDSZER vagy SZERVEZET szintje?',boxYes:'🔬 Kisebb egység (sejt/szövet)',boxNo:'🏗️ Nagyobb egység (szerv/rendszer)',items:[{text:'Bőrsejt',correct:true},{text:'Bőr (mint szerv)',correct:false},{text:'Zsírszövet',correct:true},{text:'Emésztőrendszer',correct:false},{text:'Idegvégződés',correct:true},{text:'Az emberi szervezet',correct:false}],explain:'Kisebb egység: bőrsejt, zsírszövet, idegvégződés. Nagyobb egység: bőr (szerv), emésztőrendszer (szervrendszer), az emberi szervezet.'}]},
      {id:2,icon:'🦴',title:'A mozgásszervrendszer és egészségvédelme',ready:true,tananyag:{bevezeto:'A mozgásszervrendszer két fő részből áll: a csontváz és az izomzat. A csontváz a csontok összessége – feladatai a támasztás, a belső szervek védelme és a vérképzés. A csontok összekapcsolódhatnak összenövéssel, varratokkal (pl. koponyán) vagy ízületekkel. Az ízületnél ízületi tok, szalagok, porcszövet és ízületi nedv biztosítja a mozgást és csökkenti a súrlódást. A vázizmok inakkal kapcsolódnak a csontokhoz – összehúzódással és elernyedéssel mozgatják azokat. A mozgásszervrendszer egészségéhez szükséges a helyes táplálkozás (kalcium, foszfor, fehérjék, zöldségek, gyümölcsök, tejtermékek), a rendszeres testmozgás (erős szalagok, hajlékony ízületek), a helyes testtartás (gerincferdülés megelőzése) és a megfelelő cipő viselése (lúdtalp megelőzése). Fő betegségek: csontritkulás, lúdtalp, gerincferdülés.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Csontváz',leiras:'A testünket alkotó csontok összessége, amely támaszt ad és védi a belső szerveket.',kep:''},{nev:'Izom',leiras:'Összehúzódásra képes szövet, amely a csontokat mozgatja és lehetővé teszi a mozgást.',kep:''},{nev:'Ízület',leiras:'Két vagy több csont találkozásánál lévő mozgatható kapcsolat, amely lehetővé teszi a hajlítást és nyújtást.',kep:''},{nev:'Vázizom',leiras:'A csontokhoz inakkal kapcsolódó izmok, amelyek mozgása akaratunktól függ.',kep:''},{nev:'Gerincferdülés',leiras:'A gerincoszlop oldalirányú görbülete, amelyet helytelen testtartás okozhat.',kep:''},{nev:'Lúdtalp',leiras:'A lábboltozat lesüllyedése, amelyet a lábat tartó szalagok gyengülése okoz.',kep:''},{nev:'Helyes testtartás',leiras:'Az egyenes hát, a nem görnyedt vállak és a test egyensúlyának megőrzése ülés és mozgás közben.',kep:''}],erdekes:'💡 Tudtad? Az emberi testben 206 csont és kb. 640 izom van! A legkisebb csont a fülben van (kengyelcsont, mindössze 3 mm), a legnagyobb pedig a combcsont. A csontok kb. 70%-a ásványi anyagokból (főleg kalciumból) áll – ezért fontos a tejtermékek fogyasztása. A rendszeres testmozgás nemcsak az izmokat, hanem a csontokat is erősíti!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A csontváz a csontok összessége.',answer:true,diff:1,explain:'Igen! A csontváz az összes csont együttese, amely támaszt ad és védi a belső szerveket.'},{text:'A vázizmok mozgása nem függ az akaratunktól.',answer:false,diff:1,explain:'Nem! A vázizmok akaratilag irányíthatók – mi döntjük el, mikor húzzuk össze vagy elernyesztjük őket.'},{text:'Az ízület két vagy több csont mozgatható kapcsolata.',answer:true,diff:1,explain:'Igen! Az ízület teszi lehetővé a csontok egymáshoz viszonyított mozgását – pl. hajlítást, nyújtást.'},{text:'Az inak közvetlenül összekapcsolják a csontokat egymással.',answer:false,diff:1,explain:'Nem! Az inak az izmokat kapcsolják a csontokhoz. A csontokat a szalagok kötik össze.'},{text:'A gerincferdülés a gerincoszlop oldalirányú görbülete.',answer:true,diff:1,explain:'Igen! A gerincferdülés (skoliózis) oldalirányú eltérés a gerinc egyenes vonalától.'},{text:'A lúdtalp a lábboltozat megerősödése.',answer:false,diff:2,explain:'Nem! A lúdtalp a lábboltozat LEsüllyedése, amelyet a szalagok gyengülése okoz.'},{text:'Az ízületi porcszövet csökkenti a súrlódást a mozgás során.',answer:true,diff:2,explain:'Igen! A porcszövet sima felszíne és az ízületi nedv együtt csökkentik a súrlódást mozgáskor.'},{text:'Kalcium és foszfor szükséges az egészséges csontokhoz.',answer:true,diff:2,explain:'Igen! A kalcium és foszfor a csontok fő ásványi anyagai – hiányuk csontritkuláshoz vezethet.'},{text:'A rendszeres testmozgás rontja az ízületek hajlékonyságát.',answer:false,diff:2,explain:'Nem! A rendszeres testmozgás erősíti a szalagokat és lazítja, hajlékonnyá teszi az ízületeket.'},{text:'A csontritkulás a csontok tömegének csökkenése.',answer:true,diff:2,explain:'Igen! Csontritkulásnál a csontok elveszítik ásványi anyagaikat, ezért törékenyek lesznek.'},{text:'A helyes testtartás megelőzheti a gerincferdülést.',answer:true,diff:3,explain:'Igen! Ha ülés és mozgás közben egyenesen tartjuk a hátunkat, csökken a gerincferdülés kockázata.'},{text:'Az ízületi tok feladata a mozgás segítése.',answer:false,diff:3,explain:'Nem! Az ízületi tok fő feladata a védelem – a mozgást az ízületi nedv és a porcszövet segíti.'}],quiz:[{text:'Mi a csontváz fő feladata?',opts:['Tápanyagok szállítása','Támasztás és belső szervek védelme','Hőszabályozás','Légzés'],correct:1,diff:1,explain:'A csontváz támaszt ad a testnek és védi a belső szerveket (pl. a bordák a szívet és tüdőt).'},{text:'Mit nevezünk ízületnek?',opts:['Az izmok és csontok találkozását','Két csont mozgatható kapcsolatát','A csontok összenövését','Az inak befoglaló tokját'],correct:1,diff:1,explain:'Az ízület két vagy több csont mozgatható találkozása, amely lehetővé teszi a hajlítást és nyújtást.'},{text:'Mi az inak szerepe?',opts:['Összekötik a csontokat egymással','Az izmokat kapcsolják a csontokhoz','Csökkentik az ízületi súrlódást','Vérképzést végeznek'],correct:1,diff:1,explain:'Az inak az izmokat kötik a csontokhoz, így az izomösszehúzódás mozgatni tudja a csontot.'},{text:'Mi okozza a gerincferdülést?',opts:['Túl sok kalcium','Helytelen testtartás','Túlzott testmozgás','Sok tej ivása'],correct:1,diff:1,explain:'A gerincferdülést főként a tartósan helytelen testtartás okozza – pl. görnyedt ülés.'},{text:'Melyik tápanyag szükséges leginkább az egészséges csontokhoz?',opts:['C-vitamin','Vas','Kalcium','B-vitamin'],correct:2,diff:2,explain:'A kalcium a csontok legfontosabb ásványi anyaga – tejtermékeknél, zöldségeknél bőségesen megtalálható.'},{text:'Mi a lúdtalp?',opts:['A lábboltozat megerősödése','A lábboltozat lesüllyedése','A talp kiszáradása','A lábujjak görbülete'],correct:1,diff:2,explain:'A lúdtalp a lábboltozat lesüllyedése, amelyet a talp szalagjainak gyengülése okoz.'},{text:'Mi a szalagok szerepe az ízületben?',opts:['Összekötik a csontokat','Az izmokat rögzítik','Ízületi ned       {id:3,icon:'🍽️',title:'A táplálkozás. Az emésztés szervrendszere',ready:true,tananyag:{bevezeto:'Az emésztőrendszer (tápcsatorna) szervei együttesen bontják le a táplálékot és szívják fel a tápanyagokat. Az emésztés a szájüregben kezdődik: a fogak felaprítják, a nyál megkezdi a kémiai bontást. A nyelőcső a gyomorba vezeti a falatot. A gyomor emésztőnedveket termel, alaposan összekeveri a táplálékot. A vékonybél a leghosszabb szakasz – itt szívódnak fel a tápanyagok a vérbe, amelyet a vér szállít el a test minden részébe. A máj és a hasnyálmirigy segítik a vékonybél emésztőmunkáját. A vastagbélben víz szívódik fel és képződik a széklet, majd a végbélnyíláson távozik. A táplálkozás nemcsak energiát és építőanyagot ad, hanem hat a hangulatunkra, koncentrációnkra és energiaszintünkre is.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Tápanyag',leiras:'Az élelmiszerekben található anyagok, amelyek energiát adnak és építik a testünket.',kep:''},{nev:'Emésztés',leiras:'Az a folyamat, amely során a szervezet a táplálékot kisebb részekre bontja, hogy fel tudja szívni.',kep:''},{nev:'Tápcsatorna',leiras:'Az emésztésben részt vevő szervek együttese – a szájjal kezdődik és a végbélnyílással végződik.',kep:''},{nev:'Szervrendszer',leiras:'Olyan szervek csoportja, amelyek együttműködve egy feladatot látnak el a szervezetben.',kep:''},{nev:'Szájüreg',leiras:'Az emésztés kezdőpontja – fogak aprítják a táplálékot, nyál nedvesíti és megkezdi a kémiai bontást.',kep:''},{nev:'Gyomor',leiras:'Tágulékony szerv, ahol a táplálék összekeveredik az emésztőnedvekkel.',kep:''},{nev:'Vékonybél',leiras:'Hosszú, kanyargós cső, ahol a tápanyagok felszívódnak a vérbe. A máj és hasnyálmirigy segíti.',kep:''},{nev:'Vastagbél',leiras:'Az emésztőrendszer utolsó szakasza, ahol a víz felszívódik és a széklet kialakul.',kep:''}],erdekes:'💡 Tudtad? A vékonybél hossza kb. 6–7 méter – ha kiegyenesítenénk, majdnem akkora lenne, mint egy buszmegálló! A gyomor kb. 1–1,5 litert képes befogadni, de szükség esetén akár 4 literre is kitágulhat. Az emésztés teljes folyamata 24–72 óráig tarthat az elfogyasztott ételtől függően.',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'Az emésztés a gyomorban kezdődik.',answer:false,diff:1,explain:'Nem! Az emésztés a szájüregben kezdődik – a fogak aprítják, a nyál nedvesíti és megkezdi a kémiai bontást.'},{text:'A tápcsatorna a szájjal kezdődik és a végbélnyílással végződik.',answer:true,diff:1,explain:'Igen! A tápcsatorna egy hosszú cső: száj → garat → nyelőcső → gyomor → vékonybél → vastagbél → végbélnyílás.'},{text:'A vékonybélben szívódnak fel a tápanyagok a vérbe.',answer:true,diff:1,explain:'Igen! A vékonybél a tápanyagok felszívódásának fő helyszíne – innen kerülnek a véráramba.'},{text:'A vastagbélben fehérjék szívódnak fel.',answer:false,diff:1,explain:'Nem! A vastagbélben víz szívódik fel, és itt képződik a széklet. A fehérjék a vékonybélben szívódnak fel.'},{text:'A nyál megkezdi a táplálék kémiai emésztését.',answer:true,diff:2,explain:'Igen! A nyálban enzimek vannak, amelyek megkezdik a keményítő bontását – ez az emésztés első kémiai lépése.'},{text:'A máj és a hasnyálmirigy a vastagbél munkáját segítik.',answer:false,diff:2,explain:'Nem! A máj és a hasnyálmirigy a VÉKONYBÉL emésztőmunkáját segítik emésztőnedveikkel.'},{text:'A vér szállítja el a felszívódott tápanyagokat a test minden részébe.',answer:true,diff:2,explain:'Igen! A vékonybél falán átjutó tápanyagokat a vér szállítja el a sejtek számára.'},{text:'A gyomor csak mechanikusan dolgozza fel a táplálékot.',answer:false,diff:2,explain:'Nem! A gyomor kémiai bontást is végez – emésztőnedveket termel, amelyek lebontják a fehérjéket.'},{text:'Az emésztőrendszer egyetlen szerv.',answer:false,diff:3,explain:'Nem! Az emésztőrendszer szervrendszer – több szerv (száj, garat, nyelőcső, gyomor, belek) együttesét jelenti.'},{text:'A táplálkozás hat a hangulatunkra és a koncentrációs képességünkre is.',answer:true,diff:2,explain:'Igen! A helyes táplálkozás nemcsak a test, hanem az agy működésére is hat – befolyásolja a hangulatot és a figyelmet.'},{text:'A vékonybél kb. 6–7 méter hosszú.',answer:true,diff:3,explain:'Igen! A vékonybél rendkívül hosszú – kb. 6–7 méter – annak ellenére, hogy a hasüregben kanyargósan helyezkedik el.'},{text:'A széklet a vékonybélben képződik.',answer:false,diff:3,explain:'Nem! A széklet a vastagbélben képződik, miután a víz felszívódott a megemésztett táplálékmaradékból.'}],quiz:[{text:'Hol kezdődik az emésztés?',opts:['A gyomorban','A vékonybélben','A szájüregben','A vastagbélben'],correct:2,diff:1,explain:'Az emésztés a szájüregben kezdődik – a fogak mechtanikusan aprítják, a nyál kémiailag megkezdi a bontást.'},{text:'Mi a tápcsatorna?',opts:['Egyetlen emésztőszerv','Az emésztésben részt vevő szervek együttese','Csak a gyomor és a belek','A vérkeringési rendszer'],correct:1,diff:1,explain:'A tápcsatorna az emésztésben részt vevő szervek összessége – szájtól a végbélnyílásig tart.'},{text:'Hol szívódnak fel a tápanyagok a vérbe?',opts:['A gyomorban','A szájüregben','A vastagbélben','A vékonybélben'],correct:3,diff:1,explain:'A tápanyagok a vékonybélben szívódnak fel a vérbe, onnan kerülnek el a test minden sejtjébe.'},{text:'Mi szívódik fel a vastagbélben?',opts:['Fehérjék','Zsírok','Víz','Szénhidrátok'],correct:2,diff:1,explain:'A vastagbélben víz szívódik fel a maradék táplálékból – így sűrűsödik be a széklet.'},{text:'Mi a nyál szerepe az emésztésben?',opts:['Felszívja a tápanyagokat','Megkezdi a kémiai emésztést és nedvesíti a táplálékot','Eltávolítja a méreganyagokat','Szabályozza a testhőmérsékletet'],correct:1,diff:2,explain:'A nyál enzimeket tartalmaz, amelyek megkezdik a keményítő bontását, emellett nedvesíti a falatot, hogy könnyebben csússzon.'},{text:'Melyik szerv segíti a vékonybél emésztőmunkáját?',opts:['Vastagbél','Garat','Máj és hasnyálmirigy','Nyelőcső'],correct:2,diff:2,explain:'A máj epét, a hasnyálmirigy emésztőenzimeket termel – mindkettő a vékonybélben segíti az emészt ','ásványi anyagokkal','zsírokkal']}]},{diff:2,parts:['A ',{id:0},' és a hasnyálmirigy a vékonybél emésztőmunkáját segítik.'],gaps:[{id:0,correct:'máj',options:['máj','gyomor','vastagbél','garat']}]},{diff:3,parts:['Az emésztőrendszer egy ',{id:0},', mert több szerv együtt végzi az emésztés feladatát.'],gaps:[{id:0,correct:'szervrendszer',options:['szervrendszer','egyedi szerv','szövet','sejt']}]},{diff:3,parts:['A felszívódott tápanyagokat a ',{id:0},' szállítja el a test minden részébe.'],gaps:[{id:0,correct:'vér',options:['vér','nyirok','nyál','gyomornedv']}]}],sort:[{diff:1,question:'Rendezd sorba a táplálék útját az emésztőrendszerben!',items:['Vastagbél','Gyomor','Szájüreg','Vékonybél'],correct:[2,1,3,0],explain:'Helyes sorrend: szájüreg → gyomor → vékonybél → vastagbél (végbélnyílás).'},{diff:2,question:'Rendezd sorba az emésztés folyamatának lépéseit!',items:['Tápanyagok felszívódása a vérbe','Mechanikus aprítás a szájban','Kémiai bontás a gyomorban','Víz felszívása, széklet képzése'],correct:[1,2,0,3],explain:'Sorrend: mechanikus aprítás (száj) → kémiai bontás (gyomor) → tápanyagok felszívódása (vékonybél) → víz felszívása, széklet (vastagbél).'},{diff:3,question:'Rendezd sorba az emésztőrendszer szerveit a tápcsatorna mentén!',items:['Vastagbél','Vékonybél','Nyelőcső','Gyomor','Szájüreg'],correct:[4,2,3,1,0],explain:'Helyes sorrend: szájüreg → nyelőcső → gyomor → vékonybél → vastagbél.'}],cat:[{diff:1,question:'Sorold be: a táplálék MELYIK SZERVBEN jár az emésztés során?',boxYes:'🔴 Felső emésztőrendszer (száj–gyomor)',boxNo:'🔵 Alsó emésztőrendszer (belek)',items:[{text:'Szájüreg',correct:true},{text:'Vékonybél',correct:false},{text:'Gyomor',correct:true},{text:'Vastagbél',correct:false},{text:'Nyelőcső',correct:true},{text:'Végbélnyílás',correct:false}],explain:'Felső: szájüreg, nyelőcső, gyomor. Alsó: vékonybél, vastagbél, végbélnyílás.'},{diff:2,question:'Sorold be: az emésztőszerv FELADATA – felszívás vagy lebontás?',boxYes:'⚗️ Lebontás (kémiai/mechanikus)',boxNo:'🩸 Felszívás',items:[{text:'Fogak (szájüreg)',correct:true},{text:'Vékonybél – tápanyagok',correct:false},{text:'Gyomornedv',correct:true},{text:'Vastagbél – víz',correct:false},{text:'Nyál enzimjei',correct:true},{text:'Vér – szállítás',correct:false}],explain:'Lebontás: fogak, gyomornedv, nyál enzimjei. Felszívás: vékonybél (tápanyagok), vastagbél (víz), vér (szállítás).'},{diff:3,question:'Sorold be: EMÉSZTŐRENDSZER SZERVE vagy EMÉSZTÉST SEGÍTŐ szerv (nem tápcsatorna)?',boxYes:'🔗 Tápcsatorna része',boxNo:'🤝 Emésztést segítő (járulékos)',items:[{text:'Vékonybél',correct:true},{text:'Máj',correct:false},{text:'Vastagbél',correct:true},{text:'Hasnyálmirigy',correct:false},{text:'Gyomor',correct:true},{text:'Nyálmirigyek',correct:false}],explain:'Tápcsatorna: vékonybél, vastagbél, gyomor. Járulékos szervek: máj, hasnyálmirigy, nyálmirigyek (nem részei a csőrendszernek, de nélkülüzhetetlenek).'}]},
      {id:4,icon:'🥗',title:'Az egészséges táplálkozás',ready:true,tananyag:{bevezeto:'Testünknek tápanyagokra van szüksége a működéshez, növekedéshez és az energia biztosításához. A fehérjék építőanyagok (tej, hús, hüvelyesek), a szénhidrátok energiaforrások (lisztből készült ételek, burgonya, rizs), a zsírok energiát raktároznak és hormonokat termelnek – de a telített zsírok túlzott fogyasztása káros. Ha több energiát viszünk be, mint amennyit felhasználunk, zsírszövet képződik, ami elhízáshoz vezet (mozgásszervi betegségek, cukorbetegség, magas vérnyomás). Naponta ötször együnk – bőséges reggeli, könnyű vacsora. A zöldségek és gyümölcsök rostanyagot, vitaminokat és ásványi anyagokat tartalmaznak. Napi 2–3 liter víz szükséges. Fontos vitaminok: C (ellenállóképesség), B (idegrendszer, B12-hiány → vérszegénység), A (látás, bőr), D (csontok, napsugárzásra is képződik). A fogak védelméhez alapos rágás, napi kétszeri fogmosás, cukros ételek kerülése és évente fogorvosi ellenőrzés szükséges.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Tápanyag',leiras:'Olyan anyagok, amelyekre a testünknek szüksége van a működéshez és az energia biztosításához.',kep:''},{nev:'Fehérje',leiras:'Építőanyag, amely segít a növekedésben és az izmok erősítésében. Forrásai: tej, hús, hüvelyesek.',kep:''},{nev:'Szénhidrát',leiras:'Energiaforrás, amely üzemanyagként működik a testünkben. Forrásai: kenyér, rizs, burgonya.',kep:''},{nev:'Vitamin',leiras:'Apró, de nélkülözhetetlen anyagok, amelyek segítik a testünk egészséges működését.',kep:''},{nev:'Ásványi anyag',leiras:'A vitaminokhoz hasonlóan fontosak – pl. a kalcium a csontok erősítéséhez szükséges.',kep:''},{nev:'Rost',leiras:'Növényi részek, amelyek segítik az emésztést, a bélműködést és a káros anyagok kiürítését.',kep:''},{nev:'Egészséges táplálkozás',leiras:'Olyan étrend, amely tartalmazza a megfelelő mennyiségű és minőségű tápanyagokat.',kep:''}],erdekes:'💡 Tudtad? A D-vitamin zsírban oldódik, ezért zsírtartalmú étellel érdemes fogyasztani! Hiánya angolkórt okozhat gyerekeknél és csontritkulást felnőtteknél. Télen, amikor kevesebb a napsütés, különösen fontos a D-vitamin pótlása. Az omega-3 zsírsavak (telítetlen zsírok) kifejezetten jótékony hatásúak a szívre és az agyra!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A fehérjék fő feladata az energiatermelés.',answer:false,diff:1,explain:'Nem! A fehérjék fő feladata az építés (növekedés, izomerősítés). Az energiatermelés a szénhidrátok és zsírok feladata.'},{text:'A szénhidrátok energiaforrásként szolgálnak a testünknek.',answer:true,diff:1,explain:'Igen! A szénhidrátok üzemanyagként működnek – hiányukban fáradtság és gyenge teljesítmény lép fel.'},{text:'Naponta háromszor kellene étkezni.',answer:false,diff:1,explain:'Nem! Az ajánlás szerint naponta ötször étkezzünk – így egyenletesebb az energiaellátás.'},{text:'A C-vitamin segíti az ellenállóképességet.',answer:true,diff:1,explain:'Igen! A C-vitamin erősíti az immunrendszert és segíti a tápanyagok lebontását. Forrásai: gyümölcsök, zöldségek.'},{text:'A D-vitamin csak táplálékból juthat a testünkbe.',answer:false,diff:2,explain:'Nem! A D-vitamin napsugárzás hatására is képződik a bőrben, nem csak táplálékból (tej, tojás) jutunk hozzá.'},{text:'A B12-vitamin hiánya vérszegénységet okozhat.',answer:true,diff:2,explain:'Igen! A B12-vitamin fontos az oxigénszállításhoz – hiánya vérszegénységhez (anémiához) vezet.'},{text:'A telített zsírok túlzott fogyasztása egészségkárosító lehet.',answer:true,diff:2,explain:'Igen! A telített zsírok (főleg állati zsírok) túlzott bevitele növeli a szív- és érrendszeri betegségek kockázatát.'},{text:'A zöldségeket és gyümölcsöket főzve érdemes fogyasztani, mert így több a vitamintartalmuk.',answer:false,diff:2,explain:'Nem! Nyersen magasabb a vitamintartalmuk – főzés során a vitaminok egy része elbomlik.'},{text:'Az elhízás mozgásszervi betegségekhez, cukorbetegséghez és magas vérnyomáshoz vezethet.',answer:true,diff:2,explain:'Igen! A felesleges zsírszövet felgyülemlése számos betegség kockázatát növeli.'},{text:'A rost fő feladata az energiatermelés.',answer:false,diff:3,explain:'Nem! A rost nem ad energiát – fő feladata az emésztés segítése, a bélmozgás serkentése és a káros anyagok kiürítése.'},{text:'A reggeli kihagyása rossz táplálkozási szokás.',answer:true,diff:2,explain:'Igen! A reggeli kihagyása rendszertelen étkezéshez és csökkent teljesítményhez vezet – fontos a bőséges reggeli.'},{text:'Az A-vitamin segíti a látást, a bőr egészségét és a csontok növekedését.',answer:true,diff:3,explain:'Igen! Az A-vitamin fontos a látóhártya egészségéhez, a bőr védelméhez és a csontok fejlődéséhez.'}],quiz:[{text:'Mi a fehérjék fő feladata a testünkben?',opts:['Energiatermelés','Építőanyag: növekedés, izomerősítés','Emésztés segítése','Hőszabályozás'],correct:1,diff:1,explain:'A fehérjék építőanyagok – növekedéshez, sejtmegújuláshoz és izomerősítéshez szükségesek.'},{text:'Hányszor étkezzünk naponta az ajánlás szerint?',opts:['2-szer','3-szor','5-ször','8-szor'],correct:2,diff:1,explain:'A helyes táplálkozáshoz naponta ötszöri étkezés ajánlott, köztük bőséges reggeli és könnyű vacsora.'},{text:'Melyik vitamin erősíti az ellenállóképességet?',opts:['A-vitamin','B12-vitamin','C-vitamin','D-vitamin'],correct:2,diff:1,explain:'A C-vitamin erősíti az immunrendszert és segíti a tápanyagok lebontását. Főleg gyümölcsökben és zöldségekben van.'},{text:'Mi képződik a felesleges energiabevitelből?',opts:['Izomszövet','Zsírszövet','Csontszövet','Idegszövet'],correct:1,diff:1,explain:'Ha több energiát viszünk be, mint amennyit felhasználunk, a felesleg zsírszövetként raktározódik – ez elhízáshoz vezet.'},{text:'Melyik vitamin hiánya okozhat vérszegénységet?',opts:['A-vitamin','C-vitamin','D-vitamin','B12-vitamin'],correct:3,diff:2,explain:'A B12-vitamin fontos az oxigénszállításhoz és a vörös vérsejtek termeléséhez – hiánya vérszegénységet okoz.'},{text:'Miért fontosak a rostok?',opts:['Energiát adnak','Csontokat erősítik','Se       {id:5,icon:'🫁',title:'A légzőszervrendszer és egészségvédelme',ready:true,tananyag:{bevezeto:'A légzőszervrendszer szervei: orrüreg (levegő felmelegítése, tisztítása, párásítása), garat, gége (hangszalagok – hangadás), légcső, hörgők (légcső elágazásai), tüdő és léghólyagok (alveolusok). Belégzéskor a rekeszizom lefelé húzódik, a mellkas tágul – a levegő bejut a tüdőbe. A léghólyagokban gázcsere zajlik: oxigén kerül a vérbe, szén-dioxid a levegőbe. Kilégzéskor a rekeszizom felfelé mozdul, a mellkas szűkül. A légzés automatikus, az agy szabályozza. A sejtek oxigénnel energiát termelnek – ez a sejtlégzés. Egészségvédelem: tiszta levegő, rendszeres mozgás, szellőztetés, dohányzás kerülése. Betegségek: nátha, influenza, hörghurut, tüdőgyulladás, asztma, tbc. A dohányzás károsítja a tüdőt, a szívet, az érrendszert és növeli a rák kockázatát.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Légzőszervrendszer',leiras:'A testünk azon szerveinek összessége, amelyek a légzésért felelősek.',kep:''},{nev:'Tüdő',leiras:'A légzőszervrendszer fő szerve, ahol az oxigén felvétele és a szén-dioxid leadása történik.',kep:''},{nev:'Légcső',leiras:'Egy cső, amely a levegőt a gégéből a tüdőbe szállítja.',kep:''},{nev:'Hörgők',leiras:'A légcső elágazásai a tüdőben, amelyek a levegőt a léghólyagokhoz vezetik.',kep:''},{nev:'Léghólyagok (alveolusok)',leiras:'Apró zsákocskák a tüdőben, ahol a gázcsere zajlik – oxigén a vérbe, szén-dioxid a levegőbe.',kep:''},{nev:'Rekeszizom',leiras:'A mellkas és a hasüreg közötti izom, amely belégzéskor lefelé, kilégzéskor felfelé mozdul.',kep:''},{nev:'Gázcsere',leiras:'Az oxigén felvétele a vérbe és a szén-dioxid leadása a vérből a léghólyagokban.',kep:''}],erdekes:'💡 Tudtad? Egy felnőtt ember naponta kb. 20 000-szer lélegzik! A két tüdő légzési felszíne kb. 70–80 m² – majdnem akkora, mint egy teniszpálya! A sejtlégzés során az oxigén felhasználásával energia termelődik és szén-dioxid keletkezik – ez minden sejt alapvető folyamata, nem csak a tüdőben zajlik.',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A légzőszervrendszer fő szerve a szív.',answer:false,diff:1,explain:'Nem! A légzőszervrendszer fő szerve a TÜDŐ, ahol az oxigén felvétele és a szén-dioxid leadása történik. A szív a keringési rendszer szerve.'},{text:'A léghólyagokban zajlik a gázcsere.',answer:true,diff:1,explain:'Igen! Az alveolusokban (léghólyagokban) cserélődik ki az oxigén és a szén-dioxid a vér és a levegő között.'},{text:'Belégzéskor a rekeszizom felfelé mozdul.',answer:false,diff:1,explain:'Nem! Belégzéskor a rekeszizom LEFELÉ húzódik, ezzel tágítja a mellkast és levegőt szív be a tüdőbe.'},{text:'Az orrüregben a levegő felmelegszik, megtisztul és párásodik.',answer:true,diff:1,explain:'Igen! Az orrüreg előkészíti a belélegzett levegőt – megtisztítja, felmelegíti és párásítja.'},{text:'A gégében találhatók a hangszalagok.',answer:true,diff:1,explain:'Igen! A gége a hangadás szerve – a hangszalagok rezgése hozza létre a hangot.'},{text:'A légzés ütemét a szív szabályozza.',answer:false,diff:2,explain:'Nem! A légzés ütemét az AGY szabályozza (a nyúltagyban lévő légzőközpont). A szív a keringést szabályozza.'},{text:'A hörgők a légcső elágazásai.',answer:true,diff:2,explain:'Igen! A légcső két hörgőre ágazik, amelyek tovább elágaznak és a levegőt a léghólyagokhoz vezetik.'},{text:'A dohányzás nem hat a légzőszervrendszerre.',answer:false,diff:2,explain:'Nem! A dohányzás súlyosan károsítja a tüdőt, a légutakat és az érrendszert, és növeli a rák kockázatát.'},{text:'A sejtlégzés során oxigén felhasználásával energia termelődik.',answer:true,diff:2,explain:'Igen! A sejtek oxigén segítségével energiát termelnek, és szén-dioxidot bocsátanak ki – ez a sejtlégzés.'},{text:'A tüdőgyulladás és az asztma légzőszervi betegségek.',answer:true,diff:2,explain:'Igen! Mindkettő a légzőszervrendszert érinti – a tüdőgyulladás fertőzéses, az asztma krónikus gyulladásos betegség.'},{text:'A kilégzéskor a mellkas tágul.',answer:false,diff:3,expla
