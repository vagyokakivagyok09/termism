correct:true},{text:'Asztma',correct:false},{text:'Szívinfarktus',correct:true},{text:'Gerincferdülés',correct:false},{text:'Trombózis',correct:true},{text:'Nátha',correct:false}],explain:'Vérkeringési: érelmeszesedés, szívinfarktus, trombózis. Nem vérkeringési: asztma (légzőszervi), gerincferdülés (mozgásszervi), nátha (légzőszervi).'},{diff:2,question:'Sorold be: VÖRÖSVÉRSEJT vagy FEHÉRVÉRSEJT feladata?',boxYes:'🔴 Vörösvérsejt',boxNo:'⚪ Fehérvérsejt',items:[{text:'Oxigénszállítás',correct:true},{text:'Védekezés kórokozók ellen',correct:false},{text:'Hemoglobin tartalmaz',correct:true},{text:'Immunrendszer része',correct:false},{text:'Tüdőben oxigénnel telítődik',correct:true},{text:'Baktériumok elpusztítása',correct:false}],explain:'Vörösvérsejt: oxigénszállítás, hemoglobin, tüdőben telítődik. Fehérvérsejt: védekezés, immunrendszer, baktériumok elpusztítása.'},{diff:3,question:'Sorold be: KISVÉRKÖR vagy NAGYVÉRKÖR jellemzője?',boxYes:'🫁 Kisvérkör',boxNo:'🫀 Nagyvérkör',items:[{text:'Szív–tüdő kör',correct:true},{text:'Oxigén a sejtekhez',correct:false},{text:'Vér oxigenizálódik',correct:true},{text:'Szén-dioxid felvétele a sejtektől',correct:false},{text:'Szén-dioxid leadása a tüdőben',correct:true},{text:'Tápanyagok szállítása',correct:false}],explain:'Kisvérkör: szív–tüdő, vér oxigenizálódik, szén-dioxid leadása. Nagyvérkör: oxigén a sejtekhez, szén-dioxid felvétele, tápanyagok szállítása.'}]},
      {id:7,icon:'🔬',title:'Megfigyelések, vizsgálatok, kísérletek',ready:true,tananyag:{bevezeto:'Ebben a témában a korábban tanult rendszereket kísérletekkel és megfigyelésekkel vizsgáljuk meg. A bőr vízlepergető, rugalmas és érzékeny – különböző receptorai vannak: tapintás, hő, fájdalom, nyomás. A testfelületeken a receptorok sűrűsége eltérő – ezért az ujjbegyünk érzékenyebb, mint a hátunk. Az ujjlenyomatok egyediek, mindenkinél más a rajzolat. A csontok szilárdságát a kalcium-foszfát, rugalmasságát a kollagén biztosítja – belső csontvelőjük vérsejteket termel. Az izmok párban működnek: hajlítóizom és feszítőizom egymással ellentétesen dolgoznak. Emésztési kísérlet: rágás közben a kenyér édesedik, mert a nyál keményítőbontó enzimje cukorrá alakítja. Légzési kísérlet: terhelés után (guggolás) nő a légzésszám és a pulzusszám – az agy és az idegrendszer szabályozza mindkettőt. A tüdő kapacitása lufi fújással becsülhető.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Bőr',leiras:'A testünket borító külső réteg, amely véd a külvilágtól és érzékel (tapintás, hő, fájdalom, nyomás).',kep:''},{nev:'Érzékszerv',leiras:'Testünk azon részei, amelyek a külvilágból érkező ingereket felfogják és idegi jellé alakítják.',kep:''},{nev:'Ízület',leiras:'Két vagy több csont találkozási helye, amely lehetővé teszi a mozgást.',kep:''},{nev:'Izom',leiras:'Összehúzódásra képes szövet – hajlítóizom és feszítőizom párban, ellentétesen működnek.',kep:''},{nev:'Emésztés',leiras:'A táplálék lebontásának folyamata – pl. a nyál keményítőbontó enzimje már a szájban megkezdi a bontást.',kep:''},{nev:'Légzés',leiras:'Az oxigén felvétele és a szén-dioxid leadása – terhelés után a légzésszám és pulzusszám nő.',kep:''}],erdekes:'💡 Tudtad? Az ujjlenyomatok egyediek – még az egypetéjű ikrek ujjlenyomata is különbözik egymástól! A bőrünkben lévő receptorok sűrűsége helyenként nagyon különböző: az ujjbegyünkben kb. 2500 érintési receptor van négyzetcentiméterenként, míg a hátunkon jóval kevesebb. Ezért érzünk mindent pontosabban az ujjunkkal, mint a hátunkkal.',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'Az ujjlenyomatok minden embernél egyediek.',answer:true,diff:1,explain:'Igen! Az ujjlenyomatok mintázata minden embernél különböző – még az egypetéjű ikrekéi is eltérnek egymástól.'},{text:'A bőr csak tapintásra érzékeny.',answer:false,diff:1,explain:'Nem! A bőrben tapintás-, hő-, fájdalom- és nyomásérzékelő receptorok is vannak – mindegyik más ingerre reagál.'},{text:'Rágás közben a kenyér édesedik, mert a nyál cukorrá bontja a keményítőt.',answer:true,diff:1,explain:'Igen! A nyál amiláz nevű enzimje a keményítőt maltózzá (cukorféle) bontja – ezért érezzük édesebbnek a rágott kenyeret.'},{text:'A hajlítóizom és a feszítőizom egyszerre húzódik össze.',answer:false,diff:1,explain:'Nem! Az izmok párban, ELLENTÉTESEN működnek – amikor a hajlítóizom összehúzódik, a feszítőizom ellazul, és fordítva.'},{text:'Terhelés után a légzésszám és a pulzusszám csökken.',answer:false,diff:1,explain:'Nem! Terhelés (pl. guggolás) után mindkettő NŐ – a szervezet több oxigénre van szüksége, ezért gyorsabban lélegzünk és ver a szívünk.'},{text:'A csontok szilárdságát a kalcium-foszfát biztosítja.',answer:true,diff:2,explain:'Igen! A kalcium-foszfát adja a csontok keménységét és szilárdságát – ezért fontos a kalciumban gazdag táplálkozás.'},{text:'A bőr receptorainak sűrűsége egyforma az egész testen.',answer:false,diff:2,explain:'Nem! A receptorok sűrűsége helyenként nagyon eltérő – az ujjbegyünk sokkal érzékenyebb, mint például a hátunk.'},{text:'A csontvelő vérsejteket termel.',answer:true,diff:2,explain:'Igen! A csontok belsejében lévő csontvelő termeli a vörösvérsejteket, fehérvérsejteket és vérlemezképeket.'},{text:'A tüdő kapacitása lufi fújásával becsülhető.',answer:true,diff:2,explain:'Igen! Ha egyetlen kilégzéssel fújunk teli egy lufit, annak mérete arányos a tüdő vitálkapacitásával.'},{text:'A kollagén adja a csontok rugalmasságát.',answer:true,diff:3,explain:'Igen! A kollagén rugalmas fehérjerostokat alkot a csontokban – nélküle a csontok törékenyek lennének.'},{text:'A légzésszámot a szív szabályozza.',answer:false,diff:3,explain:'Nem! A légzésszámot az AGY (nyúltagy légzőközpontja) szabályozza – automatikusan, nem a szív.'},{text:'A bekötött szemmel való tárgyfelismerés a bőr tapintási érzékelőit vizsgálja.',answer:true,diff:2,explain:'Igen! Bekötött szemmel csak a tapintási receptoraink segítségével ismerhetjük fel a tárgyak formáját, felszínét.'}],quiz:[{text:'Miért édesedik meg a kenyér rágás közben?',opts:['Cukor kerül bele a fogakból','A nyál keményítőbontó enzimje cukorrá alakítja','A gyomornedv hat rá','A hő miatt változik meg'],correct:1,diff:1,explain:'A nyál amiláz nevű enzimje a keményítőt cukorrá bontja már a szájüregben – ezért érezzük az édes ízt rágás közben.'},{text:'Hogyan működnek az izmok a mozgásban?',opts:['Csak az egyik izom dolgozik','Egyszerre húzódnak össze','Párban, ellentétesen – egyik összehúzódik, másik ellazul','Mindig lazák'],correct:2,diff:1,explain:'Az izmok antagonista párokban dolgoznak – pl. a bicepsz és tricepsz ellentétesen működik: amikor egyik összehúzódik, a másik ellazul.'},{text:'Mi történik a légzésszámmal és pulzussal terhelés után?',opts:['Mindkettő csökken','Mindkettő nő','Csak a légzésszám nő','Csak a pulzus nő'],correct:1,diff:1,explain:'Terhelés után mindkettő nő – a szervezetnek több oxigénre van szüksége, ezért gyorsabban lélegzünk és ver a szívünk.'},{text:'Mi adja a csontok szilárdságát?',opts:['Kollagén','Kalcium-foszfát','Csontvelő','Zsírszövet'],correct:1,diff:1,explain:'A kalcium-foszfát ásványi anyag adja a csontok keménységét és szilárdságát. A kollagén a rugalmasságot biztosítja.'},{text:'Miért érzékenyebb az ujjbegyünk, mint a hátunk?',opts:['Vékonyabb a bőr','Több tapintásreceptor van sűrűbben elhelyezve','Közelebb van az agyhoz','Melegebb'],correct:1,diff:2,explain:'Az ujjbegyekben sokkal sűrűbben helyezkednek el a tapintási receptorok, mint a hát bőrében – ezért pontosabb az érzékelés.'},{text:'Mi a csontvelő feladata?',opts:['A csontok szilárdítása','Vérsejttermelés','A csontok rugalmassá tétele','Tápanyagraktározás'],correct:1,diff:2,explain:'A csontok belső részében található csontvelő vörösvérsejteket, fehérvérsejteket és vérlemezképeket termel.'},{text:'Mit vizsgálunk lufi fújásával?',opts:['A szív teljesítményét','A tüdő kapacitását','A bőr rugalmasságát','Az izmok erejét'],correct:1,diff:2,explain:'Egyetlen kilégzéssel lefújt lufi mérete arányos a tüdő vitálkapacitásával – így becsülhető a légzőfelület nagysága.'},{text:'Mi biztosítja a csontok rugalmasságát?',opts:['Kalcium','Kollagén','Csontvelő','Kalcium-foszfát'],correct:1,diff:3,explain:'A kollagén rugalmas fehérjerost, amely megakadályozza a csontok törékenységét – egészséges csontban kalcium-foszfát és kollagén együtt van.'},{text:'Ki szabályozza a légzés ütemét?',opts:['A szív','A vese','Az agy','A tüdő'],correct:2,diff:3,explain:'A légzés ütemét az agyban (nyúltagyban) lévő légzőközpont szabályozza automatikusan, az igények szerint.'},{text:'Mire jó a bekötött szemmel végzett tárgyfelismerési kísérlet?',opts:['A látás erejét vizsgálja','A bőr tapintási receptorainak működését teszteli','Az ízlelés pontosságát méri','A hallásérzékelést vizsgálja'],correct:1,diff:2,explain:'Bekötött szemmel a tárgyak alakját, felszínét, hőmérsékletét csak a bőr tapintási, hő- és nyomásreceptoraival érzékeljük.'}],fill:[{diff:1,parts:['Rágás közben a kenyér édesedik, mert a nyál ',{id:0},' enzimje a keményítőt cukorrá bontja.'],gaps:[{id:0,correct:'amiláz',options:['amiláz','pepszin','lipáz','inzulin']}]},{diff:1,parts:['Az izmok párban, ',{id:0},' működnek – egyik összehúzódik, másik ellazul.'],gaps:[{id:0,correct:'ellentétesen',options:['ellentétesen','egyidejűleg','egymástól függetlenül','sorban']}]},{diff:1,parts:['Terhelés után a légzésszám és a ',{id:0},' egyaránt megemelkedik.'],gaps:[{id:0,correct:'pulzusszám',options:['pulzusszám','vérnyomás','testsúly','maghőmérséklet']}]},{diff:2,parts:['A csontok szilárdságát a ',{id:0},' biztosítja.'],gaps:[{id:0,correct:'kalcium-foszfát',options:['kalcium-foszfát','kollagén','csontvelő','zsírszövet']}]},{diff:2,parts:['A csontok rugalmasságát a ',{id:0},' fehérjerost biztosítja.'],gaps:[{id:0,correct:'kollagén',options:['kollagén','kalcium','hemoglobin','amiláz']}]},{diff:2,parts:['Az ujjbegyünk érzékenyebb a hátunknál, mert több ',{id:0},' van benne.'],gaps:[{id:0,correct:'tapintásreceptor',options:['tapintásreceptor','izom','csont','verejtékmirigy']}]},{diff:3,parts:['A légzés ütemét az agyban lévő ',{id:0},' szabályozza automatikusan.'],gaps:[{id:0,correct:'légzőközpont',options:['légzőközpont','szívközpont','hallóközpont','mozgásközpont']}]},{diff:3,parts:['A csontok belsejében lévő ',{id:0},' vörös- és fehérvérsejteket termel.'],gaps:[{id:0,correct:'csontvelő',options:['csontvelő','kollagén','kalcium','porcszövet']}]}],sort:[{diff:1,question:'Rendezd sorba a kenyér emésztésének állomásait a szájban!',items:['Édes íz érzékelhető','Keményítő a kenyérben','Nyál enzimje hat','Rágás megkezdése'],correct:[1,3,2,0],explain:'Keményítő a kenyérben → rágás megkezdése → nyál enzimje hat → édes íz érzékelhető.'},{diff:2,question:'Rendezd sorba a légzésszám-mérési kísérlet lépéseit!',items:['Pulzus mérése terhelés után','Légzésszám mérése nyugalomban','20 guggolás elvégzése','Légzésszám mérése terhelés után'],correct:[1,2,3,0],explain:'Légzésszám mérése nyugalomban → 20 guggolás → légzésszám mérése terhelés után → pulzus mérése terhelés után.'},{diff:3,question:'Rendezd sorba a csont felépítését kívülről befelé!',items:['Csontvelő','Csonthártya','Tömött csontállomány','Szivacsos csontállomány'],correct:[1,2,3,0],explain:'Kívülről befelé: csonthártya → tömött csontállomány → szivacsos csontállomány → csontvelő.'}],cat:[{diff:1,question:'Sorold be: melyik KÍSÉRLETRE jellemző?',boxYes:'🖐️ Bőr vizsgálata',boxNo:'🦴 Csontok/izmok vizsgálata',items:[{text:'Ujjlenyomat készítése',correct:true},{text:'Kar hajlítása/nyújtása',correct:false},{text:'Bekötött szemű tárgyfelismerés',correct:true},{text:'Csirkecsont vizsgálata',correct:false},{text:'Bőr vízlepergető képessége',correct:true},{text:'Ízületek mozgástartománya',correct:false}],explain:'Bőr: ujjlenyomat, bekötött szemű felismerés, vízlepergető képesség. Csontok/izmok: karhajlítás, csirkecsont, ízületek mozgástartománya.'},{diff:2,question:'Sorold be: mi adja a csontok SZILÁRDSÁGÁT vagy RUGALMASSÁGÁT?',boxYes:'💪 Szilárdság',boxNo:'🌊 Rugalmasság',items:[{text:'Kalcium-foszfát',correct:true},{text:'Kollagén',correct:false},{text:'Ásványi anyagok',correct:true},{text:'Rugalmas fehérjerostok',correct:false},{text:'Kalcium',correct:true},{text:'Porcszövet',correct:false}],explain:'Szilárdság: kalcium-foszfát, ásványi anyagok, kalcium. Rugalmasság: kollagén, rugalmas fehérjerostok, porcszövet.'},{diff:3,question:'Sorold be: a kísérlet MIRE VONATKOZIK – emésztés, légzés vagy mozgás?',boxYes:'🍞 Emésztés / 🫁 Légzés',boxNo:'💪 Mozgás',items:[{text:'Kenyér édesedése rágáskor',correct:true},{text:'Ízületek mozgástartománya',correct:false},{text:'Lufi fújása',correct:true},{text:'Ellentétes izomműködés',correct:false},{text:'Pulzusmérés terhelés után',correct:true},{text:'Csirkecsont rugalmassága',correct:false}],explain:'Emésztés/légzés: kenyér édesedése, lufi fújása, pulzusmérés. Mozgás: ízületek tartománya, ellentétes izomműködés, csirkecsont rugalmassága.'}]},
      {id:8,icon:'🧬',title:'A nemi szervek felépítése és működése',ready:true,tananyag:{bevezeto:'A szaporító szervrendszer biztosítja az emberi faj fennmaradását. A női belső nemi szervek: petefészkek (petesejtek érnek), petevezetékek (petesejt szállítása), anyaméh (embrió fejlődési helye), hüvely (párzószerv, szülés helye). Ha a petesejt nem termékenyül meg, a méh nyálkahártyája leválik – ez a menstruáció. A férfi nemi szervek: herék a herezacskóban (hímivarsejtek termelése), mellékherék (hímivarsejtek érése), ondóvezeték (szállítás), ondóhólyag és dülmirigy (tápláló váladék), hímvessző (párzószerv). A szaporodás folyamata: a megérett petesejt és a hímivarsejt egyesülése a megtermékenyülés, ezután a megtermékenyült petesejt az anyaméhben fejlődik (méhen belüli fejlődés). A nemi higiénia (rendszeres tisztálkodás) fontos a fertőzések megelőzéséhez. A serdülőkorban hormonális változások hatására fejlődnek ki a nemi szervek és másodlagos nemi jellegek.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Nemi szervek',leiras:'Az emberi test azon részei, amelyek a szaporodásban játszanak szerepet.',kep:''},{nev:'Petefészek',leiras:'A női testben található páros szerv, ahol a petesejtek érnek és tárolódnak.',kep:''},{nev:'Here',leiras:'A férfi páros nemi szerve (herezacskóban), amely a hímivarsejtek termeléséért felelős.',kep:''},{nev:'Megtermékenyülés',leiras:'A petesejt és a hímivarsejt egyesülése, amelyből új élet fejlődik.',kep:''},{nev:'Méhen belüli fejlődés',leiras:'A megtermékenyült petesejt fejlődése az anyaméhben a születésig (kb. 9 hónap).',kep:''},{nev:'Menstruáció',leiras:'Ha a petesejt nem termékenyül meg, a méh nyálkahártyája leválik és a vérrel együtt távozik.',kep:''},{nev:'Nemi higiénia',leiras:'A nemi szervek rendszeres tisztán tartása, amely megelőzi a fertőzéseket.',kep:''}],erdekes:'💡 Tudtad? Egy nő élete során kb. 400–500 petesejtet érlel meg – pedig születéskor már kb. 1–2 millió éretlen petesejt van a petefészkeiben! A hímivarsejtek ezzel szemben folyamatosan képződnek – naponta több százmilliót termel a here. A méhen belüli fejlődés kb. 9 hónapig tart, és ezalatt egyetlen megtermékenyített sejtből kb. 37 billió sejt fejlődik!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A petesejtek a petefészekben érnek.',answer:true,diff:1,explain:'Igen! A petefészkek a nő páros szervei, amelyekben a petesejtek érnek és ahonnan havonta egy petesejt szabadul fel.'},{text:'A hímivarsejtek a mellékherékben képződnek.',answer:false,diff:1,explain:'Nem! A hímivarsejtek a HERÉKBEN képződnek. A mellékherékben csak az érésük folytatódik.'},{text:'A megtermékenyülés a petesejt és a hímivarsejt egyesülése.',answer:true,diff:1,explain:'Igen! A megtermékenyülés során a hímivarsejt behatol a petesejtbe, és együtt alkotják a zigótát, amelyből új élet fejlődik.'},{text:'Az anyaméh az embrió fejlődési helye.',answer:true,diff:1,explain:'Igen! A megtermékenyült petesejt az anyaméhbe vándorol, ott beágyazódik és kb. 9 hónapig fejlődik.'},{text:'A menstruáció azt jelenti, hogy megtermékenyülés történt.',answer:false,diff:2,explain:'Nem! Éppen ellenkezőleg – a menstruáció akkor következik be, ha a petesejt NEM termékenyült meg, és a méh nyálkahártyája leválik.'},{text:'A petevezeték a petesejtet szállítja a petefészektől az anyaméhig.',answer:true,diff:2,explain:'Igen! A petevezeték egy vékony cső, amely a petesejtet a petefészektől az anyaméhig vezeti – itt találkozhat a hímivarsejt.'},{text:'Az ondóhólyag és a dülmirigy hímivarsejtek termelésére szolgál.',answer:false,diff:2,explain:'Nem! Az ondóhólyag és a dülmirigy tápláló váladékot termelnek a hímivarsejtek mozgásához – magát a hímivarsejtet a herék termelik.'},{text:'A serdülőkor hormonális változásokkal jár.',answer:true,diff:2,explain:'Igen! A serdülőkorban a nemi hormonok (ösztrogén, tesztoszteron) termelése beindítja a nemi szervek fejlődését és másodlagos nemi jellegeket alakít ki.'},{text:'A nemi higiénia fontosabb fiúknál, mint lányoknál.',answer:false,diff:3,explain:'Nem! A nemi higiénia mindkét nemnél egyformán fontos – a rendszeres tisztálkodás megelőzi a fertőzéseket mindkét nemnél.'},{text:'A méhen belüli fejlődés kb. 9 hónapig tart.',answer:true,diff:2,explain:'Igen! A megtermékenyülés után az embrió/magzat kb. 9 hónapig (40 hétig) fejlődik az anyaméhben.'},{text:'A hüvely a nő párzószerve és egyben a szülés helye.',answer:true,diff:2,explain:'Igen! A hüvely két fontos funkciót tölt be: párzószerv, és a szüléskor a magzat ezen keresztül születik.'},{text:'Egy nő élete során milliárdnyi petesejtet érlel meg.',answer:false,diff:3,explain:'Nem! Egy nő élete során kb. 400–500 petesejtet érlel meg – bár születéskor már 1–2 millió éretlen petesejt van a petefészekbe.'}],quiz:[{text:'Hol képződnek a hímivarsejtek?',opts:['Mellékherékben','Ondóhólyagban','Herékben','Dülmirigyben'],correct:2,diff:1,explain:'A hímivarsejtek a herékben képződnek. A mellékherékben csak az érésük folytatódik tovább.'},{text:'Mi a megtermékenyülés?',opts:['A petesejt érése a petefészekben','A petesejt és a hímivarsejt egyesülése','A méh nyálkahártyájának leválása','Az embrió fejlődése az anyaméhben'],correct:1,diff:1,explain:'A megtermékenyülés a petesejt és a hímivarsejt egyesülése – ebből a zigótából fejlődik majd az új ember.'},{text:'Mi a menstruáció?',opts:['A petesejt megtermékenyülése','A petesejt érése','A méh nyálkahártyájának leválása, ha nem volt megtermékenyülés','A magzat fejlődése'],correct:2,diff:1,explain:'Ha a petesejt nem termékenyül meg, a méh nyálkahártyája leválik és a vérrel együtt távozik – ezt nevezzük menstruációnak.'},{text:'Hol fejlődik a megtermékenyített petesejt?',opts:['A petevezetékben','A petefészekben','A hüvelyben','Az anyaméhben'],correct:3,diff:1,explain:'A megtermékenyített petesejt az anyaméhben ágyazódik be és kb. 9 hónapig fejlődik ott.'},{text:'Mi a petevezeték feladata?',opts:['Petesejtek termelése','Petesejt szállítása a petefészektől az anyaméhig','Hímivarsejtek tárolása','Az embrió táplálása'],correct:1,diff:2,explain:'A petevezeték elvezeti a petesejtet a petefészektől az anyaméhig – a megtermékenyülés is általában a petevezetékben történik.'},{text:'Mit termelnek az ondóhólyag és a dülmirigy?',opts:['Hímivarsejtet','Petesejtet','Tápláló váladékot a hímivarsejtek mozgásához','Nemi hormonokat'],correct:2,diff:2,explain:'Az ondóhólyag és a dülmirigy tápláló, mozgást segítő váladékot termel – ez alkotja az ondó nagy részét.'},{text:'Melyik szerv biztosítja a hímivarsejtek érését?',opts:['Here','Mellékhere','Ondóvezeték','Dülmirigy'],correct:1,diff:2,explain:'A hímivarsejtek a herékben képződnek, de érésük a mellékherékben fejeződik be.'},{text:'Mi jellemzi a serdülőkort?',opts:['A nemi szervek fejlődése és hormonális változások','A testmagasság csökkenése','A nemi szervek összezsugorodása','Semmi különös változás'],correct:0,diff:2,explain:'A serdülőkorban a nemi hormonok hatására fejlődnek a nemi szervek, kialakul a másodlagos nemi jelleg, és pszichológiai változások is végbemennek.'},{text:'Kb. hány petesejtet érlel meg egy nő élete során?',opts:['10–20-at','400–500-at','Több ezret','Több milliót'],correct:1,diff:3,explain:'Egy nő élete során kb. 400–500 petesejtet érlel meg – bár születéskor 1–2 millió éretlen petesejt van a petefészkeiben.'},{text:'Miért fontos a nemi higiénia?',opts:['Csak esztétikai okokból','A fertőzések megelőzéséért','Csak fiúknál fontos','A hormontermelés szabályozásáért'],correct:1,diff:3,explain:'A nemi szervek rendszeres tisztán tartása megelőzi a bakteriális és gombás fertőzéseket – mindkét nemnél egyformán fontos.'}],fill:[{diff:1,parts:['A petesejtek a ',{id:0},'ben érnek.'],gaps:[{id:0,correct:'petefészek',options:['petefészek','anyaméh','hüvely','petevezeték']}]},{diff:1,parts:['A hímivarsejtek a ',{id:0},'ben képződnek.'],gaps:[{id:0,correct:'herék',options:['herék','mellékherék','ondóhólyag','dülmirigy']}]},{diff:1,parts:['A petesejt és a hímivarsejt egyesülése a ',{id:0},'.'],gaps:[{id:0,correct:'megtermékenyülés',options:['megtermékenyülés','menstruáció','serdülőkor','méhen belüli fejlődés']}]},{diff:2,parts:['Ha a petesejt nem termékenyül meg, a méh nyálkahártyája leválik – ezt ',{id:0},'nak nevezzük.'],gaps:[{id:0,correct:'menstruáció',options:['menstruáció','megtermékenyülés','ovuláció','serdülőkor']}]},{diff:2,parts:['A ',{id:0},' vezeti a petesejtet a petefészektől az anyaméhig.'],gaps:[{id:0,correct:'petevezeték',options:['petevezeték','hüvely','ondóvezeték','anyaméh']}]},{diff:2,parts:['A méhen belüli fejlődés kb. ',{id:0},' hónapig tart.'],gaps:[{id:0,correct:'9',options:['9','3','12','6']}]},{diff:3,parts:['Az ondóhólyag és a dülmirigy ',{id:0},' termelnek a hímivarsejtek mozgásához.'],gaps:[{id:0,correct:'tápláló váladékot',options:['tápláló váladékot','hímivarsejtet','petesejtet','nemi hormont']}]},{diff:3,parts:['A serdülőkorban a ',{id:0},' változások hatására fejlődnek ki a nemi szervek.'],gaps:[{id:0,correct:'hormonális',options:['hormonális','idegrendszeri','keringési','emésztési']}]}],sort:[{diff:1,question:'Rendezd sorba a hímivarsejt útját a megtermékenyülésig!',items:['Petevezetékben találkozik a petesejttel','Képződés a herékben','Érés a mellékherékben','Szállítás az ondóvezetéken'],correct:[1,2,3,0],explain:'Képződés a herékben → érés a mellékherékben → szállítás az ondóvezetéken → találkozás a petesejttel a petevezetékben.'},{diff:2,question:'Rendezd sorba a megtermékenyülés utáni fejlődés főbb állomásait!',items:['Születés','Megtermékenyülés','Beágyazódás az anyaméhbe','Embrió fejlődése az anyaméhben'],correct:[1,2,3,0],explain:'Megtermékenyülés → beágyazódás az anyaméhbe → embrió fejlődése (~9 hónap) → születés.'},{diff:3,question:'Rendezd sorba a petesejt útját ovulációtól a megtermékenyülésig!',items:['Petevezetékbe kerül','Megtermékenyülés (ha hímivarsejt találkozik vele)','Petefészekből szabadul fel','Anyaméhbe vándorol'],correct:[2,0,1,3],explain:'Petefészekből szabadul fel (ovuláció) → petevezetékbe kerül → megtermékenyülés → anyaméhbe vándorol.'}],cat:[{diff:1,question:'Sorold be: NŐI NEMI SZERV vagy FÉRFI NEMI SZERV?',boxYes:'♀️ Női nemi szerv',boxNo:'♂️ Férfi nemi szerv',items:[{text:'Petefészek',correct:true},{text:'Here',correct:false},{text:'Anyaméh',correct:true},{text:'Mellékhere',correct:false},{text:'Petevezeték',correct:true},{text:'Ondóhólyag',correct:false}],explain:'Női: petefészek, anyaméh, petevezeték. Férfi: here, mellékhere, ondóhólyag.'},{diff:2,question:'Sorold be: PETESEJTET ÉRINT vagy HÍMIVARSEJTET ÉRINT?',boxYes:'🥚 Petesejt',boxNo:'🏊 Hímivarsejt',items:[{text:'Petefészek (érés)',correct:true},{text:'Here (képződés)',correct:false},{text:'Petevezeték (szállítás)',correct:true},{text:'Mellékhere (érés)',correct:false},{text:'Menstruáció (le nem váló)',correct:true},{text:'Ondóvezeték (szállítás)',correct:false}],explain:'Petesejt: petefészek, petevezeték, menstruáció. Hímivarsejt: here, mellékhere, ondóvezeték.'},{diff:3,question:'Sorold be: MEGTERMÉKENYÜLÉS ELŐTT vagy UTÁN történik?',boxYes:'⬅️ Előtte',boxNo:'➡️ Utána',items:[{text:'Petesejt érése a petefészekben',correct:true},{text:'Beágyazódás az anyaméhbe',correct:false},{text:'Ovuláció',correct:true},{text:'Embrió fejlődése',correct:false},{text:'Hímivarsejt képződése',correct:true},{text:'Születés',correct:false}],explain:'Előtte: petesejt érése, ovuláció, hímivarsejt képződése. Utána: beágyazódás, embrió fejlődése, születés.'}]},
      {id:9,icon:'🌱',title:'Az egyedfejlődés. A serdülőkor testi és lelki változásai',ready:true,tananyag:{bevezeto:'Az egyedfejlődés az emberi élet születéstől halálig tartó változásainak sorozata. Méhen belüli fejlődés: zigóta (megtermékenyített petesejt) → embrió (korai fejlődés) → magzat (kb. 9 hónap). Méhen kívüli szakaszok: újszülöttkor (1 hónap), csecsemőkor (1 év), kisgyermekkor (6 évig), gyermekkor (10–12 évig), serdülőkor (kb. 8–16 év), ifjúkor (24 évig), felnőttkor (60 évig), időskor (60 év felett). A serdülőkorban a hormonok hatására fejlődnek az elsődleges nemi jellegek (nemi szervek) és másodlagos nemi jellegek. Lányoknál: mell növekedése, csípő szélesedése, menstruáció. Fiúknál: váll szélesedése, szőrzet, hang mutálása. Lelki változások: hangulatingadozás, önállósodás, kortársak fontossága, első szerelmek. Mindenki más ütemben fejlődik – ez teljesen természetes!',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Egyedfejlődés',leiras:'Az emberi élet során végbemenő változások sorozata a születéstől a felnőttkorig (és halálig).',kep:''},{nev:'Serdülőkor',leiras:'Az az életszakasz (kb. 8–16 év), amikor a test és az elme felkészül a felnőtt életre.',kep:''},{nev:'Elsődleges nemi jellegek',leiras:'A nemi szervek, amelyek megkülönböztetik a fiúkat és a lányokat – születéstől meglévők.',kep:''},{nev:'Másodlagos nemi jellegek',leiras:'A serdülőkorban megjelenő testi változások, amelyek férfiasabbá vagy nőiesebbé teszik a testet.',kep:''},{nev:'Hormonok',leiras:'Kémiai hírvivők, amelyek irányítják a test működését – serdülőkorban a nemi hormonok kiemelt szerepet játszanak.',kep:''},{nev:'Ivarsejt',leiras:'A petesejt és a hímivarsejt – ezek egyesüléséből (megtermékenyülés) új élet kezdődik.',kep:''},{nev:'Magzat',leiras:'A fejlődő ember az anyaméhben a korai embrió szakasz után, egészen a születésig.',kep:''}],erdekes:'💡 Tudtad? A serdülőkor kb. 8–16 éves kor között zajlik, de mindenki más ütemben fejlődik – és ez teljesen normális! A lányoknál általában hamarabb kezdődik, mint a fiúknál. A hangi mutálás (mélyülés) fiúknál azért következik be, mert a gége és a hangszalagok megnőnek. Az agyunk is fejlődik a serdülőkorban – a frontális lebeny (döntéshozatal, tervezés) egészen 25 éves korig érik!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A zigóta a megtermékenyített petesejt.',answer:true,diff:1,explain:'Igen! A megtermékenyülés pillanatában keletkező egysejtes képződményt zigótának nevezzük – belőle fejlődik az embrió, majd a magzat.'},{text:'Az embrió a méhen belüli fejlődés legkésőbbi szakasza.',answer:false,diff:1,explain:'Nem! Az embrió a KORAI szakasz. A méhen belüli fejlődés sorrendben: zigóta → embrió → magzat.'},{text:'A serdülőkorban másodlagos nemi jellegek jelennek meg.',answer:true,diff:1,explain:'Igen! A serdülőkorban a nemi hormonok hatására alakulnak ki a másodlagos nemi jellegek (pl. szőrzet, hangmélyülés, mell).'},{text:'A hang mutálása lányoknál jellemző serdülőkori változás.',answer:false,diff:1,explain:'Nem! A hang mutálása (mélyülése) FIÚKNÁL jellemző, mert a gége és a hangszalagok megnőnek a tesztoszteron hatására.'},{text:'A serdülőkor mindenkinél pontosan ugyanolyan korban kezdődik.',answer:false,diff:1,explain:'Nem! Mindenki más ütemben fejlődik – ez teljesen normális és természetes. Lányoknál általában hamarabb kezdődik.'},{text:'Az elsődleges nemi jellegek a serdülőkorban jelennek meg.',answer:false,diff:2,explain:'Nem! Az elsődleges nemi jellegek (nemi szervek) SZÜLETÉSTŐL megvannak. A serdülőkorban a MÁSODLAGOS nemi jellegek jelennek meg.'},{text:'A serdülőkorban lelki változások is végbemennek.',answer:true,diff:2,explain:'Igen! A serdülőkorban nemcsak a test, hanem az érzelmek és a gondolkodás is változik – hangulatingadozás, önállósodási törekvések jellemzők.'},{text:'Az ifjúkor a serdülőkor után következő életszakasz.',answer:true,diff:2,explain:'Igen! A fejlődési sorrendben a serdülőkor után az ifjúkor (kb. 16–24 év) következik, amelyet a felnőttkor követ.'},{text:'A hormonok kémiai hírvivők, amelyek irányítják a test működését.',answer:true,diff:2,explain:'Igen! A hormonok a belső elválasztású mirigyek által termelt anyagok, amelyek a vérkeringésen át jutnak el a célszervekhez.'},{text:'A csecsemőkor az újszülöttkor előtti fejlődési szakasz.',answer:false,diff:3,explain:'Nem! A helyes sorrend: újszülöttkor (1 hónap) → CSECSEMŐKOR (1 éves korig) → kisgyermekkor. Az újszülöttkor az első.'},{text:'A frontális agylebeny egészen 25 éves korig érik.',answer:true,diff:3,explain:'Igen! A döntéshozatalért, tervezésért felelős frontális lebeny a legkésőbb érik az agyban – egészen kb. 25 éves korig.'},{text:'A lányoknál a csípő szélesedése másodlagos nemi jelleg.',answer:true,diff:2,explain:'Igen! A csípő szélesedése lányoknál a serdülőkorban az ösztrogén hatására következik be – ez másodlagos nemi jelleg.'}],quiz:[{text:'Mi a zigóta?',opts:['A fejlődő magzat','A megtermékenyített petesejt','Az embrió korai szakasza','Az anyaméh belső rétege'],correct:1,diff:1,explain:'A zigóta a megtermékenyülés pillanatában keletkező egysejtes képződmény – a petesejt és hímivarsejt egyesüléséből jön létre.'},{text:'Melyik a helyes sorrendben a méhen belüli fejlődés?',opts:['Magzat → Embrió → Zigóta','Zigóta → Magzat → Embrió','Embrió → Zigóta → Magzat','Zigóta → Embrió → Magzat'],correct:3,diff:1,explain:'A méhen belüli fejlődés sorrendben: zigóta → embrió (korai szakasz) → magzat (a születésig).'},{text:'Melyik serdülőkori változás jellemző CSAK fiúkra?',opts:['Szőrzet megjelenése','Hang mutálása','Bőrproblémák','Hangulatingadozás'],correct:1,diff:1,explain:'A hang mutálása (mélyülése) fiúkra jellemző – a tesztoszteron hatására megnő a gége és a hangszalagok, ezért mélyül a hang.'},{text:'Mik az elsődleges nemi jellegek?',opts:['Serdülőkorban megjelenő szőrzet','Születéstől meglévő nemi szervek','A hang mélyülése','A csípő szélesedése'],correct:1,diff:1,explain:'Az elsődleges nemi jellegek a nemi szervek, amelyek születéstől megkülönböztetik a fiúkat és a lányokat.'},{text:'Melyik életszakasz következik a serdülőkor után?',opts:['Kisgyermekkor','Gyermekkor','Ifjúkor','Időskor'],correct:2,diff:2,explain:'A serdülőkor (kb. 8–16 év) után az ifjúkor következik (kb. 16–24 éves kor), amelyet a felnőttkor követ.'},{text:'Mi jellemzi a serdülőkor lelki változásait?',opts:['Semmi különös','Hangulatingadozás és önállósodási törekvések','Csak pozitív érzelmek','A szülőktől való teljes elszakadás'],correct:1,diff:2,explain:'A serdülőkor lelki jellemzői: hangulatingadozás, önállósodási igény, kortársak fontossága, első szerelmek – mindez a hormonális változásokkal függ össze.'},{text:'Mi a különbség az elsődleges és másodlagos nemi jellegek között?',opts:['Nincs különbség','Az elsődleges serdülőkorban jelenik meg, a másodlagos születéstől megvan','Az elsődleges születéstől megvan, a másodlagos serdülőkorban jelenik meg','Mindkettő serdülőkorban jelenik meg'],correct:2,diff:2,explain:'Elsődleges nemi jellegek = nemi szervek (születéstől megvannak). Másodlagos nemi jellegek = serdülőkorban megjelenő változások (szőrzet, hang stb.).'},{text:'Kb. hány éves korig érik a frontális agylebeny?',opts:['14 éves korig','18 éves korig','25 éves korig','35 éves korig'],correct:2,diff:3,explain:'A döntéshozatalért, tervezésért felelős frontális lebeny az utolsó agyterület, amely érik – egészen kb. 25 éves korig.'},{text:'Miért mutál a fiúk hangja serdülőkorban?',opts:['Mert kevesebbet isznak','Mert a tüdő mérete nő','Mert a gége és a hangszalagok megnőnek','Mert az agyuk változik'],correct:2,diff:3,explain:'A tesztoszteron hatására a fiúk géjge és hangszalagjai megnőnek, ezért mélyül a hangjuk serdülőkorban.'},{text:'Melyik életszakasz tartományában van a serdülőkor?',opts:['2–6 éves kor','8–16 éves kor','20–30 éves kor','60 év felett'],correct:1,diff:1,explain:'A serdülőkor kb. 8–16 éves kor között zajlik – de mindenki más ütemben fejlődik, ez teljesen természetes.'}],fill:[{diff:1,parts:['A megtermékenyített petesejtet ',{id:0},'nak nevezzük.'],gaps:[{id:0,correct:'zigóta',options:['zigóta','embrió','magzat','ivarsejt']}]},{diff:1,parts:['A méhen belüli fejlődés sorrendben: zigóta → ',{id:0},' → magzat.'],gaps:[{id:0,correct:'embrió',options:['embrió','ivarsejt','zigóta','hormon']}]},{diff:1,parts:['A serdülőkorban a ',{id:0},' hatására jelennek meg a másodlagos nemi jellegek.'],gaps:[{id:0,correct:'hormonok',options:['hormonok','izmok','csontok','idegek']}]},{diff:2,parts:['A nemi szerveket, amelyek születéstől megvannak, ',{id:0},' nemi jellegeknek nevezzük.'],gaps:[{id:0,correct:'elsődleges',options:['elsődleges','másodlagos','serdülőkori','hormonális']}]},{diff:2,parts:['Fiúknál a hang ',{id:0},' a serdülőkor egyik jellemző változása.'],gaps:[{id:0,correct:'mutálása',options:['mutálása','mélyülése (mutálás)','erősödése','halkulása']}]},{diff:2,parts:['A serdülőkor lelki változásai közé tartozik a hangulatingadozás és az ',{id:0},' törekvés.'],gaps:[{id:0,correct:'önállósodási',options:['önállósodási','kortárs-elkerülési','szülőkre támaszkodási','tanulást kerülő']}]},{diff:3,parts:['A frontális agylebeny (döntéshozatal, tervezés) egészen kb. ',{id:0},' éves korig érik.'],gaps:[{id:0,correct:'25',options:['25','14','18','30']}]},{diff:3,parts:['Az egyedfejlődés méhen kívüli szakaszai: újszülöttkor → csecsemőkor → kisgyermekkor → gyermekkor → ',{id:0},' → ifjúkor → felnőttkor → időskor.'],gaps:[{id:0,correct:'serdülőkor',options:['serdülőkor','pubertás','mutáláskor','hormonkor']}]}],sort:[{diff:1,question:'Rendezd sorba a méhen belüli fejlődés szakaszait!',items:['Magzat','Embrió','Zigóta'],correct:[2,1,0],explain:'Helyes sorrend: zigóta → embrió → magzat.'},{diff:2,question:'Rendezd sorba az egyedfejlődés méhen kívüli szakaszait!',items:['Felnőttkor','Serdülőkor','Csecsemőkor','Gyermekkor'],correct:[2,3,1,0],explain:'Sorrendben: csecsemőkor → gyermekkor → serdülőkor → felnőttkor.'},{diff:3,question:'Rendezd sorba az összes fejlődési szakaszt a legkorábbitól a legkésőbbiig!',items:['Időskor','Serdülőkor','Újszülöttkor','Ifjúkor'],correct:[2,1,3,0],explain:'Sorrendben: újszülöttkor → serdülőkor → ifjúkor → időskor.'}],cat:[{diff:1,question:'Sorold be: LÁNYOKRA JELLEMZŐ vagy FIÚKRA JELLEMZŐ serdülőkori változás?',boxYes:'♀️ Lányokra jellemző',boxNo:'♂️ Fiúkra jellemző',items:[{text:'Mell növekedése',correct:true},{text:'Hang mutálása',correct:false},{text:'Csípő szélesedése',correct:true},{text:'Váll szélesedése',correct:false},{text:'Menstruáció',correct:true},{text:'Arcszőrzet megjelenése',correct:false}],explain:'Lányokra: mell, csípő szélesedése, menstruáció. Fiúkra: hang mutálása, váll szélesedése, arcszőrzet.'},{diff:2,question:'Sorold be: ELSŐDLEGES NEMI JELLEG vagy MÁSODLAGOS NEMI JELLEG?',boxYes:'1️⃣ Elsődleges nemi jelleg',boxNo:'2️⃣ Másodlagos nemi jelleg',items:[{text:'Nemi szervek (születéstől)',correct:true},{text:'Szőrzet megjelenése',correct:false},{text:'Petefészek',correct:true},{text:'Hang mutálása',correct:false},{text:'Here',correct:true},{text:'Mell növekedése',correct:false}],explain:'Elsődleges (születéstől): nemi szervek, petefészek, here. Másodlagos (serdülőkorban): szőrzet, hangmutálás, mell növekedése.'},{diff:3,question:'Sorold be: MÉHEN BELÜLI vagy MÉHEN KÍVÜLI fejlődési szakasz?',boxYes:'🤰 Méhen belüli',boxNo:'🌍 Méhen kívüli',items:[{text:'Zigóta',correct:true},{text:'Csecsemőkor',correct:false},{text:'Embrió',correct:true},{text:'Serdülőkor',correct:false},{text:'Magzat',correct:true},{text:'Ifjúkor',correct:false}],explain:'Méhen belüli: zigóta, embrió, magzat. Méhen kívüli: csecsemőkor, serdülőkor, ifjúkor.'}]},
      {id:10,icon:'🧠',title:'Az idegrendszer. Az érzékszervek: a látás és a hallás',ready:true,tananyag:{bevezeto:'Az idegrendszer a test irányító központja: a központi idegrendszer (agyvelő + gerincvelő) és a perifériás idegrendszer (testet behálózó idegek) alkotja. Az agyban vannak az emlékezet, gondolkodás, érzelmek és mozgás központjai. Az idegsejtek közötti szinapszisok erősödnek tanulással – ezt plaszticitásnak nevezzük. A szem a látás szerve: a fény útja: szaruhártya → pupilla (szabályozza a fény mennyiségét) → szemlencse → ideghártya (csapok: szín, pálcikák: gyenge fény) → látóideg → agy. A fül a hallás és az egyensúly szerve: a hang útja: hallójárat → dobhártya (rezeg) → hallócsontok (erősítenek, továbbítanak) → csiga (hanghullámokat idegi jellé alakítja, benne hallósejtek) → hallóideg → agy. A belső fülben három félkörös ívjárat alkotja az egyensúlyszervünket.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Idegrendszer',leiras:'A test irányító rendszere – agyból, gerincvelőből és idegekből áll.',kep:''},{nev:'Agyvelő',leiras:'Az idegrendszer központja a koponyában – irányítja a test működését, itt vannak a gondolkodás, érzelmek és emlékezet központjai.',kep:''},{nev:'Gerincvelő',leiras:'A gerincoszlopban futó idegrendszeri rész, amely összeköti az agyat a test többi részével.',kep:''},{nev:'Érzékszerv',leiras:'Olyan szerv, amely a környezetből érkező ingereket felfogja és idegi jelekké alakítja (pl. szem, fül, bőr).',kep:''},{nev:'Pupilla',leiras:'A szem szivárványhártyájának közepén lévő nyílás, amely szabályozza a szembe jutó fény mennyiségét.',kep:''},{nev:'Ideghártya',leiras:'A szemgolyó belső fényérzékeny rétege – csapok (szín) és pálcikák (gyenge fény) találhatók benne.',kep:''},{nev:'Dobhártya',leiras:'A fülben lévő vékony hártya, amely a hanghullámok hatására rezeg és továbbítja a rezgést a hallócsontokhoz.',kep:''},{nev:'Csiga',leiras:'A belső fülben lévő csigaház alakú szerv, ahol a hanghullámokat hallósejtek idegi jelekké alakítják.',kep:''}],erdekes:'💡 Tudtad? Az emberi szem kb. 10 millió különböző szín árnyalatát képes megkülönböztetni! A fül kb. 20–20 000 Hz közötti hangokat hall – ennél magasabb hangokat (ultrahang) a denevérek és a delfinek is hallják. Az egyensúlyszerv három félkörös ívjáratból áll – ha forgunk és hirtelen megállunk, a folyadék még tovább mozog, ezért szédülünk.',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'Az idegrendszer az agyból, gerincvelőből és idegekből áll.',answer:true,diff:1,explain:'Igen! A központi idegrendszer (agy + gerincvelő) és a perifériás idegrendszer (idegek) együttesen alkotják az idegrendszert.'},{text:'A gerincvelő az agyban található.',answer:false,diff:1,explain:'Nem! A gerincvelő a GERINCOSZLOPBAN fut – az agy és a test többi része közötti összekötőként működik.'},{text:'A pupilla szabályozza a szembe jutó fény mennyiségét.',answer:true,diff:1,explain:'Igen! Erős fényben a pupilla összeszűkül, gyenge fényben kitágul – így védi a szemet és biztosítja az optimális látást.'},{text:'A hang útja a fülben: dobhártya → hallójárat → hallócsontok → csiga.',answer:false,diff:1,explain:'Nem! A helyes sorrend: HALLÓJÁRAT → dobhártya → hallócsontok → csiga → hallóideg → agy.'},{text:'Az ideghártyán csapok és pálcikák találhatók.',answer:true,diff:2,explain:'Igen! A csapok a szín érzékeléséért felelnek, a pálcikák a gyenge fényviszonyok közötti látást teszik lehetővé.'},{text:'A csiga a középfülben található.',answer:false,diff:2,explain:'Nem! A csiga a BELSŐ fülben található – itt alakulnak a hanghullámok idegi jelekké a hallósejtek segítségével.'},{text:'A látóideg az ideghártyáról az agyba vezeti a látási információt.',answer:true,diff:2,explain:'Igen! A látóideg a retinán (ideghártyán) lévő sejtek axonjaiból áll, és az agyba szállítja a vizuális információt.'},{text:'A pálcikák a színek érzékelésért felelnek.',answer:false,diff:2,explain:'Nem! A színek érzékeléséért a CSAPOK felelnek. A pálcikák a gyenge fényben való látást teszik lehetővé.'},{text:'Az egyensúlyszerv a belső fülben találzható.',answer:true,diff:2,explain:'Igen! Az egyensúlyszerv három félkörös ívjáratból áll a belső fülben – ezek érzékelik a testünk helyzetét és mozgását.'},{text:'A szinapszisok erősödnek tanulás hatására.',answer:true,diff:3,explain:'Igen! Az idegsejtek közötti szinapszisok megerősödnek az ismétlés és tapasztalat hatására – ezt idegrendszeri plaszticitásnak nevezzük.'},{text:'A hallócsontok a hanghullámokat erősítik és továbbítják a csigába.',answer:true,diff:2,explain:'Igen! A három hallócsont (kalapács, üllő, kengyel) a dobhártya rezgéseit erősíti és a belső fülbe (csigába) továbbítja.'},{text:'Az agyban találhatók az emlékezet, gondolkodás és érzelmek központjai.',answer:true,diff:3,explain:'Igen! Az agyvelőben vannak az emlékezet, gondolkodás, érzelmek és mozgás irányítóközpontjai – ezért az agy az idegrendszer legfontosabb szerve.'}],quiz:[{text:'Mi alkotja a központi idegrendszert?',opts:['Csak az agyvelő','Agyvelő és gerincvelő','Gerincvelő és idegek','Az összes érzékszerv'],correct:1,diff:1,explain:'A központi idegrendszer az agyvelőből és a gerincvelőből áll. A test többi részét az idegek hálózzák be (perifériás idegrendszer).'},{text:'Mi a pupilla feladata?',opts:['Szín érzékelése','A fény fókuszálása az ideghártyára','A szembe jutó fény mennyiségének szabályozása','A látóideg védelme'],correct:2,diff:1,explain:'A pupilla a szivárványhártya közepén lévő nyílás – erős fényben szűkül, gyenge fényben tágul, így szabályozza a fény mennyiségét.'},{text:'Melyik a helyes sorrend a fény útjában a szemben?',opts:['Pupilla → szaruhártya → szemlencse → ideghártya','Szemlencse → pupilla → szaruhártya → ideghártya','Szaruhártya → pupilla → szemlencse → ideghártya','Ideghártya → szemlencse → pupilla → szaruhártya'],correct:2,diff:1,explain:'A fény útja: szaruhártya (átlátszó külső réteg) → pupilla (nyílás) → szemlencse (fókuszál) → ideghártya → látóideg → agy.'},{text:'Mi a dobhártya feladata?',opts:['Hanghullámokat idegi jelekké alakítja','A hanghullámok hatására rezeg és továbbítja a rezgést','A hallóideg védelme','Egyensúly érzékelése'],correct:1,diff:1,explain:'A dobhártya a hanghullámok hatására rezeg – ezeket a rezgéseket adja tovább a hallócsontoknak.'},{text:'Hol alakulnak a hanghullámok idegi jelekké?',opts:['A dobhártyában','A hallócsontokban','A csigában','A hallójáratban'],correct:2,diff:2,explain:'A csigában lévő hallósejtek alakítják a hanghullámokat idegi impulzusokká, amelyeket a hallóideg vezet az agyba.'},{text:'Melyik sejtféle felelős a szín érzékeléséért?',opts:['Pálcikák','Csapok','Hallósejtek','Ízlelősejtek'],correct:1,diff:2,explain:'A csapok az ideghártyán lévő fényérzékelő sejtek, amelyek a három alapszínt (vörös, zöld, kék) érzékelik.'},{text:'Mi az idegrendszer plaszticitása?',opts:['Az idegek hajlékonysága','Az agyvelő védelme','Az idegsejtek közötti kapcsolatok erősödése tapasztalat hatására','A gerincvelő rugalmassága'],correct:2,diff:3,explain:'A plaszticitás azt jelenti, hogy az idegsejtek közötti szinapszisok megerősödnek vagy gyengülnek tapasztalat, tanulás hatására – ezáltal tanulunk és emlékezünk.'},{text:'Hány félkörös ívjáratból áll az egyensúlyszerv?',opts:['1-ből','2-ből','3-ból','4-ből'],correct:2,diff:2,explain:'Az egyensúlyszerv három félkörös ívjáratból áll a belső fülben – ezek három egymásra merőleges síkban érzékelik a fejünk mozgását.'},{text:'Mi a hallócsontok feladata?',opts:['Hanghullámokat idegi jelekké alakítanak','A dobhártya rezgéseit erősítik és a csigába továbbítják','A hallójárat védelmét biztosítják','Egyensúlyt tartanak fenn'],correct:1,diff:3,explain:'A három hallócsont (kalapács, üllő, kengyel) mechanikusan erősíti és továbbítja a dobhártya rezgéseit a belső fülbe (csigába).'},{text:'Milyen hangfrekvencia-tartományt hall az ember?',opts:['0–1000 Hz','20–20 000 Hz','100–100 000 Hz','1000–50 000 Hz'],correct:1,diff:3,explain:'Az emberi fül kb. 20–20 000 Hz közötti hangokat érzékel. Ennél magasabb hangokat (ultrahang) pl. denevérek és delfinek hallanak.'}],fill:[{diff:1,parts:['Az idegrendszer irányítja a testet – a ',{id:0},' (agy + gerincvelő) és a perifériás idegrendszer alkotja.'],gaps:[{id:0,correct:'központi idegrendszer',options:['központi idegrendszer','érzékszervi rendszer','vérkeringési rendszer','mozgásrendszer']}]},{diff:1,parts:['A fény útja a szemben: szaruhártya → ',{id:0},' → szemlencse → ideghártya → látóideg → agy.'],gaps:[{id:0,correct:'pupilla',options:['pupilla','csap','pálcika','hallóideg']}]},{diff:1,parts:['A hang útja a fülben: hallójárat → dobhártya → hallócsontok → ',{id:0},' → hallóideg → agy.'],gaps:[{id:0,correct:'csiga',options:['csiga','pupilla','ideghártya','szaruhártya']}]},{diff:2,parts:['Az ideghártyán a ',{id:0},' a szín-, a pálcikák a gyenge fény érzékeléséért felelnek.'],gaps:[{id:0,correct:'csapok',options:['csapok','pálcikák','hallósejtek','látóideg']}]},{diff:2,parts:['A ',{id:0},' a dobhártya rezgéseit erősítik és továbbítják a csigába.'],gaps:[{id:0,correct:'hallócsontok',options:['hallócsontok','hallósejtek','dobhártya','csiga']}]},{diff:2,parts:['Az egyensúlyszerv ',{id:0},' félkörös ívjáratból áll a belső fülben.'],gaps:[{id:0,correct:'három',options:['három','két','négy','öt']}]},{diff:3,parts:['Az idegsejtek közötti szinapszisok tapasztalat hatására erősödnek – ezt ',{id:0},'nak nevezzük.'],gaps:[{id:0,correct:'plaszticitás',options:['plaszticitás','reflexnek','szinaptikus tüzelésnek','ideglefutásnak']}]},{diff:3,parts:['Színvakság esetén a ',{id:0},' bizonyos típusai hiányoznak vagy nem működnek.'],gaps:[{id:0,correct:'csapok',options:['csapok','pálcikák','hallósejtek','hallócsontok']}]}],sort:[{diff:1,question:'Rendezd sorba a fény útját a szemben!',items:['Ideghártya','Szaruhártya','Szemlencse','Pupilla'],correct:[1,3,2,0],explain:'Szaruhártya → pupilla → szemlencse → ideghártya → látóideg → agy.'},{diff:2,question:'Rendezd sorba a hang útját a fülben!',items:['Hallóideg → agy','Dobhártya','Hallócsontok','Csiga'],correct:[1,2,3,0],explain:'Hallójárat → dobhártya → hallócsontok → csiga → hallóideg → agy.'},{diff:3,question:'Rendezd sorba az inger feldolgozásának lépéseit az idegrendszerben!',items:['Az agy értelmezi és válaszol','Az érzékszerv felfogja az ingert','Az ideg továbbítja az ingert','Az érzékszerv idegi jellé alakítja'],correct:[1,3,2,0],explain:'Érzékszerv felfogja → idegi jellé alakítja → ideg továbbítja → agy értelmezi és válaszol.'}],cat:[{diff:1,question:'Sorold be: a SZEM részei vagy a FÜL részei?',boxYes:'👁️ Szem része',boxNo:'👂 Fül része',items:[{text:'Pupilla',correct:true},{text:'Dobhártya',correct:false},{text:'Ideghártya',correct:true},{text:'Csiga',correct:false},{text:'Szemlencse',correct:true},{text:'Hallócsontok',correct:false}],explain:'Szem: pupilla, ideghártya, szemlencse. Fül: dobhártya, csiga, hallócsontok.'},{diff:2,question:'Sorold be: LÁTÁSSAL vagy HALLÁSSAL kapcsolatos fogalom?',boxYes:'👁️ Látás',boxNo:'👂 Hallás',items:[{text:'Csapok',correct:true},{text:'Dobhártya',correct:false},{text:'Látóideg',correct:true},{text:'Hallóideg',correct:false},{text:'Szaruhártya',correct:true},{text:'Csiga',correct:false}],explain:'Látás: csapok, látóideg, szaruhártya. Hallás: dobhártya, hallóideg, csiga.'},{diff:3,question:'Sorold be: KÖZPONTI IDEGRENDSZER vagy PERIFÉRIÁS IDEGRENDSZER része?',boxYes:'🧠 Központi idegrendszer',boxNo:'🔌 Perifériás idegrendszer',items:[{text:'Agyvelő',correct:true},{text:'Látóideg',correct:false},{text:'Gerincvelő',correct:true},{text:'Hallóideg',correct:false},{text:'Szem',correct:false},{text:'Karizom idege',correct:false}],explain:'Központi: agyvelő, gerincvelő. Perifériás: látóideg, hallóideg, szem, karizom idege – ezek az agyhoz/gerincvelőhöz vezető vagy belőlük induló idegek, illetve érzékszervek.'}]},
      {id:11,icon:'🦠',title:'A fertőzés és a járvány',ready:true,tananyag:{bevezeto:'A kórokozók mikroszkopikus élőlények (vírusok, baktériumok, gombák, féregpeték), amelyek bejutva a szervezetbe elszaporodnak és betegséget okoznak. Terjedési módjaik: levegő, étel, víz, sérült bőr, nemi érintkezés. Ha egy fertőző betegség hirtelen sok embert megbetegít egy területen, azt járványnak nevezzük (pl. influenza, AIDS, tífusz, malária). Védekezési módok: védőoltás (legyengített/elölt kórokozók → az immunrendszer ellenanyagot termel) és természetes védettség (egyes emberek hordozhatják a kórokozót anélkül, hogy megbetegednek – ezek a hordozók). Az immunrendszer felismeri és elpusztítja a kórokozókat, és emlékezik a korábbi fertőzésekre. Karantén: a fertőzöttek elkülönítése a betegség terjedésének megakadályozásához. Megelőzés: egészséges életmód, elegendő alvás (9–10 óra), helyes táplálkozás, rendszeres mozgás, szűrővizsgálatok.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Kórokozó',leiras:'Parányi élőlény (vírus, baktérium, gomba), amely ha bejut a szervezetbe, betegséget okozhat.',kep:''},{nev:'Fertőzés',leiras:'Amikor egy kórokozó bejut a szervezetbe és ott elszaporodik, betegséget okozva.',kep:''},{nev:'Járvány',leiras:'Amikor egy fertőző betegség hirtelen sok embert megbetegít egy adott területen.',kep:''},{nev:'Védőoltás',leiras:'Legyengített/elölt kórokozókat juttatnak a szervezetbe, hogy az immunrendszer felkészüljön a valódi fertőzésre.',kep:''},{nev:'Immunrendszer',leiras:'A szervezet védekező rendszere, amely felismeri és elpusztítja a kórokozókat, és emlékezik a korábbi fertőzésekre.',kep:''},{nev:'Karantén',leiras:'A fertőző betegségben szenvedők (vagy fertőzöttnek vélt személyek) elkülönítése a járvány terjedésének megakadályozása érdekében.',kep:''},{nev:'Hordozó',leiras:'Olyan személy, akinek szervezetében van a kórokozó, de maga nem betegszik meg – mégis terjesztheti a betegséget.',kep:''}],erdekes:'💡 Tudtad? Az influenzajárvány 1918–1919-ben (spanyolnátha) kb. 50–100 millió ember halálát okozta – ez több volt, mint az I. világháborúban elhunytak száma! A védőoltásoknak köszönhetően ma a himlő teljesen ki van irtva a Földről – ez az egyetlen emberi betegség, amelyet sikerült teljesen felszámolni. Az immunrendszerünk naponta több ezer kórokozóval küzd meg anélkül, hogy megbetegednénk!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A kórokozók mikroszkopikus élőlények.',answer:true,diff:1,explain:'Igen! A kórokozók (vírusok, baktériumok, gombák, féregpeték) olyan apró élőlények, amelyek csak mikroszkóppal láthatók.'},{text:'A járvány azt jelenti, hogy egy ember megbetegszik.',answer:false,diff:1,explain:'Nem! A járvány akkor következik be, amikor egy fertőző betegség hirtelen SOK embert megbetegít egy adott területen – nem csupán egyetlen embert.'},{text:'A védőoltás legyengített vagy elölt kórokozókat tartalmaz.',answer:true,diff:1,explain:'Igen! A védőoltásban lévő legyengített/elölt kórokozók nem okoznak betegséget, de beindítják az immunrendszer védekezési folyamatát.'},{text:'A kórokozók csak levegőn keresztül terjednek.',answer:false,diff:1,explain:'Nem! A kórokozók sokféleképpen terjedhetnek: levegőn, élelmiszereken, vízen, sérült bőrön, nemi érintkezéssel stb.'},{text:'Az immunrendszer emlékezik a korábbi fertőzésekre.',answer:true,diff:2,explain:'Igen! Az immunrendszer memóriasejtjei megőrzik a korábbi kórokozók emlékét – ezért vagyunk immunisak bizonyos betegségekre, ha egyszer már átestünk rajtuk.'},{text:'A hordozók mindig betegek, de nem mutatnak tüneteket.',answer:false,diff:2,explain:'Nem egészen! A hordozók maguk nem betegednek meg (nem mutatnak tüneteket), mégis terjeszthetik a kórokozót másokra.'},{text:'A karantén célja a betegség terjedésének megakadályozása.',answer:true,diff:2,explain:'Igen! A karantén során elkülönítik a fertőzötteket (vagy fertőzöttnek vélhető személyeket), hogy ne adják át a betegséget másoknak.'},{text:'A védőoltás után azonnal betegek leszünk.',answer:false,diff:2,explain:'Nem! A védőoltás NEM okoz betegséget, mert az abban lévő kórokozók legyengítettek/elöltek. Enyhe, átmeneti tünetek (pl. fájdalom, hőemelkedés) előfordulhatnak, de ez nem betegség.'},{text:'Az egészséges életmód segít a betegségek megelőzésében.',answer:true,diff:2,explain:'Igen! A rendszeres mozgás, elegendő alvás, egészséges táplálkozás és a stressz csökkentése mind erősíti az immunrendszert.'},{text:'A spanyolnátha (1918–1919) kevesebb embert ölt meg, mint az I. világháború.',answer:false,diff:3,explain:'Nem! A spanyolnátha járvány kb. 50–100 millió embert ölt meg – ez jóval több volt, mint az I. világháborúban elesett katonák száma.'},{text:'A himlő az egyetlen betegség, amelyet teljesen sikerült felszámolni.',answer:true,diff:3,explain:'Igen! A himlőt védőoltásoknak köszönhetően sikerült teljesen kiirtani – 1980 óta nem okoz természetes úton fertőzést.'},{text:'A szűrővizsgálatok csak beteg emberek számára szükségesek.',answer:false,diff:3,explain:'Nem! A szűrővizsgálatok MEGELŐZŐ jellegűek – egészséges emberek számára is fontosak, mert korai stádiumban észlelik a betegségeket.'}],quiz:[{text:'Mi a kórokozó?',opts:['Nagy, szabad szemmel látható élőlény','Parányi élőlény, amely betegséget okozhat','Gyógyszer, ami megöli a baktériumokat','A szervezet védekező rendszere'],correct:1,diff:1,explain:'A kórokozók (vírusok, baktériumok, gombák stb.) mikroszkopikus élőlények, amelyek bejutva a szervezetbe betegséget okozhatnak.'},{text:'Mikor beszélünk járványról?',opts:['Ha egy ember megbetegszik','Ha egy betegség megszűnik','Ha egy fertőző betegség sok embert megbetegít egy területen','Ha egy gyógyszer nem hat'],correct:2,diff:1,explain:'A járvány egy fertőző betegség tömeges elterjedése – sok embert érint egyszerre egy adott területen.'},{text:'Mi a védőoltás lényege?',opts:['Azonnal meggyógyítja a betegséget','Legyengített kórokozókkal felkészíti az immunrendszert','Elpusztítja az összes kórokozót a szervezetben','Fájdalomcsillapítást nyújt'],correct:1,diff:1,explain:'A védőoltásban lévő legyengített/elölt kórokozók beindítják az immunrendszer védekezési folyamatát – így a szervezet ellenanyagot termel.'},{text:'Hogyan terjedhetnek a kórokozók?',opts:['Csak levegőn keresztül','Csak érintéssel','Sokféleképpen: levegő, étel, víz, sérült bőr stb.','Csak vérrel'],correct:2,diff:1,explain:'A kórokozók sokféle úton terjedhetnek – levegőn, élelmiszereken, vízen, sérült bőrön, nemi érintkezéssel és vérrel is.'},{text:'Mi az immunrendszer feladata?',opts:['Oxigén szállítása','Tápanyagok emésztése','Kórokozók felismerése és elpusztítása','Hangszabályozás'],correct:2,diff:2,explain:'Az immunrendszer a szervezet védekező rendszere – felismeri az idegen kórokozókat, elpusztítja őket, és emlékezik rájuk a jövőre.'},{text:'Ki a hordozó?',opts:['Aki súlyosan beteg','Akinek nincs immunrendszere','Aki a kórokozót hordozza, de nem betegszik meg','Aki oltást kapott'],correct:2,diff:2,explain:'A hordozó olyan személy, akinek szervezetében jelen van a kórokozó, de ő maga nem betegszik meg – mégis terjesztheti a betegséget.'},{text:'Mi a karantén?',opts:['Gyógyszer a fertőzés ellen','A fertőzöttek elkülönítése a betegség terjedésének megakadályozására','A védőoltás másik neve','Immunrendszer erősítő eljárás'],correct:1,diff:2,explain:'A karantén során a fertőzötteket (vagy fertőzöttnek vélteket) elkülönítik, hogy ne terjeszthessék a betegséget.'},{text:'Melyik betegséget sikerült teljesen felszámolni?',opts:['Influenza','Malária','Himlő','AIDS'],correct:2,diff:3,explain:'A himlőt 1980-ra sikerült teljesen felszámolni védőoltások segítségével – ez az egyetlen emberi betegség, amelyet sikerült kiirtani.'},{text:'Miért fontos az elegendő alvás a betegségek megelőzésében?',opts:['Gyorsítja az emésztést','Erősíti az immunrendszert','Növeli a magasságot','Csökkenti az étvágyat'],correct:1,diff:3,explain:'Alvás közben a szervezet helyreáll és az immunrendszer is regenerálódik – elegendő alvás (9–10 óra) nélkül csökken a betegségekkel szembeni ellenállóképesség.'},{text:'Mi a szűrővizsgálat célja?',opts:['Csak a betegek kezelése','Betegségek korai felismerése egészséges embereknél is','Gyógyszerek kipróbálása','A járványok okozása'],correct:1,diff:3,explain:'A szűrővizsgálatok megelőző jellegűek – még tünetek megjelenése előtt észlelik a betegségeket, ami hatékonyabb kezelést tesz lehetővé.'}],fill:[{diff:1,parts:['A ',{id:0},'ók mikroszkopikus élőlények, amelyek betegséget okozhatnak.'],gaps:[{id:0,correct:'kórokozó',options:['kórokozó','hordozó','immunrendszer','ellenanyag']}]},{diff:1,parts:['Ha egy fertőző betegség hirtelen sok embert megbetegít, azt ',{id:0},'nak nevezzük.'],gaps:[{id:0,correct:'járvány',options:['járvány','fertőzés','karantén','hordozás']}]},{diff:1,parts:['A védőoltás ',{id:0},' kórokozókat juttat a szervezetbe, hogy az immunrendszer felkészüljön.'],gaps:[{id:0,correct:'legyengített/elölt',options:['legyengített/elölt','élő és erős','mérgező','radioaktív']}]},{diff:2,parts:['A ',{id:0},' felismeri és elpusztítja a kórokozókat, és emlékezik a korábbi fertőzésekre.'],gaps:[{id:0,correct:'immunrendszer',options:['immunrendszer','emésztőrendszer','vérkeringés','idegrendszer']}]},{diff:2,parts:['Aki a kórokozót hordozza, de nem betegszik meg, azt ',{id:0},'nak nevezzük.'],gaps:[{id:0,correct:'hordozó',options:['hordozó','beteg','oltott','immunis']}]},{diff:2,parts:['A fertőzöttek elkülönítését, amely megakadályozza a betegség terjedését, ',{id:0},'nak nevezzük.'],gaps:[{id:0,correct:'karantén',options:['karantén','oltás','szűrővizsgálat','gyógykezelés']}]},{diff:3,parts:['Az 1918–19-es ',{id:0},' járvány kb. 50–100 millió ember halálát okozta.'],gaps:[{id:0,correct:'spanyolnátha',options:['spanyolnátha','influenza','tífusz','malária']}]},{diff:3,parts:['A betegségek megelőzéséhez napi ',{id:0},' óra alvás ajánlott gyerekeknek.'],gaps:[{id:0,correct:'9–10',options:['9–10','4–5','6–7','12–14']}]}],sort:[{diff:1,question:'Rendezd sorba a fertőzés folyamatát!',items:['Betegség tünetei megjelennek','Kórokozó bejut a szervezetbe','Ellenanyagok képződnek','Kórokozó elszaporodik'],correct:[1,3,0,2],explain:'Kórokozó bejut → elszaporodik → tünetek megjelennek → ellenanyagok képződnek (immunválasz).'},{diff:2,question:'Rendezd sorba a védőoltás hatásmechanizmusát!',items:['Immunrendszer ellenanyagot termel','Oltás kerül a szervezetbe','Valódi fertőzés esetén gyors védekezés','Legyengített kórokozó felismerése'],correct:[1,3,0,2],explain:'Oltás kerül a szervezetbe → immunrendszer felismeri → ellenanyagot termel → valódi fertőzésnél gyors védekezés.'},{diff:3,question:'Rendezd sorba a járvány megfékezésének lépéseit!',items:['Karantén bevezetése','Járvány kitörése','Oltási kampány indítása','Betegség felismerése és azonosítása'],correct:[1,3,0,2],explain:'Járvány kitörése → betegség felismerése és azonosítása → karantén bevezetése → oltási kampány indítása.'}],cat:[{diff:1,question:'Sorold be: KÓROKOZÓ TÍPUSA vagy BETEGSÉG TÜNETE?',boxYes:'🦠 Kórokozó típusa',boxNo:'🤒 Betegség tünete',items:[{text:'Vírus',correct:true},{text:'Láz',correct:false},{text:'Baktérium',correct:true},{text:'Fáradtság',correct:false},{text:'Gomba',correct:true},{text:'Bőrkiütés',correct:false}],explain:'Kórokozó típusa: vírus, baktérium, gomba. Betegség tünete: láz, fáradtság, bőrkiütés.'},{diff:2,question:'Sorold be: VÉDEKEZÉSI MÓD a fertőzés ellen vagy TERJEDÉSI ÚT?',boxYes:'🛡️ Védekezési mód',boxNo:'⚠️ Terjedési út',items:[{text:'Védőoltás',correct:true},{text:'Fertőzött levegő',correct:false},{text:'Karantén',correct:true},{text:'Szennyezett víz',correct:false},{text:'Egészséges életmód',correct:true},{text:'Nemi érintkezés',correct:false}],explain:'Védekezés: védőoltás, karantén, egészséges életmód. Terjedési út: fertőzött levegő, szennyezett víz, nemi érintkezés.'},{diff:3,question:'Sorold be: JÁRVÁNYOS BETEGSÉG vagy NEM JÁRVÁNYOS betegség?',boxYes:'🦠 Járványos betegség',boxNo:'🩺 Nem járványos',items:[{text:'Influenza',correct:true},{text:'Csontritkulás',correct:false},{text:'Malária',correct:true},{text:'Gerincferdülés',correct:false},{text:'Tífusz',correct:true},{text:'Lúdtalp',correct:false}],explain:'Járványos: influenza, malária, tífusz (fertőző, terjedhet). Nem járványos: csontritkulás, gerincferdülés, lúdtalp (nem fertőző).'}]},
      {id:12,icon:'🩹',title:'Az elsősegélynyújtás alapismeretei',ready:true,tananyag:{bevezeto:'Az elsősegély gyors segítségnyújtás baleseteknél, rosszulléteknél – életmentő lehet a mentők megérkezéséig. Újraélesztés lépései: 1) Életjelenségek vizsgálata (megszólítás, vállak megrázása) → ha nincs válasz: 112-es hívás. 2) Hátra fektetés, fej óvatos hátrahajtása. 3) Légzés vizsgálata 10 másodpercig. 4) Ha nincs légzés: 30 mellkaskompresszió (két kéz a szegycsont alsó harmadán, 4–5 cm mélyen, 100–120/perc, minden nyomás után teljesen felengedni) + 2 befújás (orr befogva). Ismétlés: 30+2, a mentők megérkezéséig. Eszméletlen, de lélegző beteg: stabil oldalfekvés. Ájulásnál: hanyatt fektetés, lábak felemelése. Légzési nehézségnél: félülő testhelyzet. Orrvérzésnél: fej előre, orrnyílások összenyomása 5–10 percig. Vérzéscsillapításnál: verőér-vérzésnél nyomókötés + ér nyomása csonthoz; gyűjtőér-vérzésnél steril gézlap + nyomókötés.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Életjelenségek vizsgálata',leiras:'Annak megállapítása, hogy valaki lélegzik-e, van-e pulzusa, reagál-e a külvilágra.',kep:''},{nev:'Újraélesztés',leiras:'Beavatkozások összessége (mellkaskompresszió + befújás), amelyek célja a keringés és légzés helyreállítása.',kep:''},{nev:'Mellkaskompresszió',leiras:'Újraélesztés során a mellkas ritmikus nyomása (4–5 cm mélyen, 100–120/perc) a szív működésének serkentésére.',kep:''},{nev:'Stabil oldalfekvés',leiras:'Eszméletlen, de lélegző beteg biztonságos pozíciója, hogy a légutak szabadok maradjanak és ne fulladjon meg.',kep:''},{nev:'Nyomókötés',leiras:'Vérzéscsillapításra alkalmazott kötés, amely nyomást gyakorol a sérült területre, elzárva a vérereket.',kep:''}],erdekes:'💡 Tudtad? Az újraélesztés hatékonysága percenként kb. 10%-kal csökken – ezért minden perc számít! Ha valaki az összeesés után azonnal megkapja az újraélesztést, az életben maradás esélye akár 3–4-szeresére nőhet. A 112 az egységes európai segélyhívó szám – Magyarországon is ezen érhető el a mentő, rendőrség és tűzoltóság.',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'Az újraélesztés 30 mellkaskompresszióból és 2 befújásból áll (egy ciklusban).',answer:true,diff:1,explain:'Igen! Az újraélesztés egy ciklusa: 30 mellkaskompresszió + 2 befújás – ezt kell ismételni a mentők megérkezéséig.'},{text:'Ha valaki eszméletvesztett, de lélegzik, újraélesztést kell végezni.',answer:false,diff:1,explain:'Nem! Ha a beteg lélegzik, stabil oldalfekvésbe kell helyezni – az újraélesztés csak akkor szükséges, ha NEM lélegzik.'},{text:'Ájulásnál a lábakat fel kell emelni.',answer:true,diff:1,explain:'Igen! Ájulásnál hanyatt fektetés + lábak felemelése segíti a vér visszaáramlását az agyba, ami enyhíti az állapotot.'},{text:'Orrvérzésnél a fejet hátradöntjük.',answer:false,diff:1,explain:'Nem! Orrvérzésnél a fejet ELŐRE kell hajtani (nem hátra), hogy a vér ne folyjon a torokba – és az orrnyílások lágy részét kell összenyomni.'},{text:'A mellkaskompresszió mélysége felnőttnél 4–5 cm.',answer:true,diff:2,explain:'Igen! Felnőttnél a mellkast 4–5 cm mélyen kell benyomni, 100–120 kompresszió/perc sebességgel.'},{text:'A verőér-vérzésnél a vér szivárog a sebből.',answer:false,diff:2,explain:'Nem! A verőér-vérzésnél a vér SPRICCEL (lüktetve) a sebből. A gyűjtőér-vérzésnél szivárog.'},{text:'Légzési nehézség esetén félülő testhelyzetet biztosítunk a betegnek.',answer:true,diff:2,explain:'Igen! Légzési nehézségnél a félülő helyzet segíti a légzést, mert a rekeszizom jobban tud mozogni.'},{text:'A stabil oldalfekvés célja, hogy a légutak szabadok maradjanak.',answer:true,diff:2,explain:'Igen! Az eszméletlen, de lélegző beteget stabil oldalfekvésbe helyezik, hogy ne fulladjon meg a hányadékától vagy a hátracsúszó nyelvétől.'},{text:'A 112-es segélyhívót csak Magyarországon lehet hívni.',answer:false,diff:3,explain:'Nem! A 112 az egységes EURÓPAI segélyhívó szám – az Európai Unió minden tagállamában elérhető.'},{text:'A nyomókötés ne legyen túl szoros, mert az akadályozhatja a vérkeringést.',answer:true,diff:2,explain:'Igen! A nyomókötés szorításának mértékét jól kell megválasztani – a túl szoros kötés elzárja a vérkeringést, ami súlyosabb sérüléshez vezethet.'},{text:'Az újraélesztés hatékonysága percenként kb. 10%-kal csökken.',answer:true,diff:3,explain:'Igen! Minél korábban kezdik meg az újraélesztést, annál nagyobb az esély a túlélésre – ezért minden perc kritikus.'},{text:'Mellkaskompressziónál a karokat be kell hajlítani.',answer:false,diff:3,explain:'Nem! A karokat NYÚJTVA kell tartani a kompresszió során – hajlított karokkal nem tud megfelelő mélységű és erejű nyomást kifejteni az elsősegélynyújtó.'}],quiz:[{text:'Hány mellkaskompresszió és befújás alkot egy újraélesztési ciklust?',opts:['15 kompresszió + 1 befújás','30 kompresszió + 2 befújás','20 kompresszió + 3 befújás','10 kompresszió + 5 befújás'],correct:1,diff:1,explain:'Egy újraélesztési ciklus: 30 mellkaskompresszió + 2 befújás – ezt kell ismételni folyamatosan a mentők megérkezéséig.'},{text:'Mit kell tenni, ha valaki eszméletlen, de lélegzik?',opts:['Azonnal újraélesztést végezni','Stabil oldalfekvésbe helyezni','Felültetni','Hideg vizet önteni rá'],correct:1,diff:1,explain:'Eszméletlen, de lélegző beteget stabil oldalfekvésbe kell helyezni, hogy a légutak szabadok maradjanak és ne fulladjon meg.'},{text:'Mi az első lépés eszméletvesztett embernél?',opts:['Azonnal mellkaskompressziót végezni','Befújást végezni','Megszólítani és megrázni a vállát, majd segítséget hívni','Vizet adni neki'],correct:2,diff:1,explain:'Először megpróbálják felébreszteni (megszólítás, vállak megrázása). Ha nem reagál, 112 hívás, majd légzésvizsgálat.'},{text:'Mit kell tenni orrvérzésnél?',opts:['Fejet hátradönteni','Fejet előrehajtani és az orrnyílásokat összenyomni','Lefektetni','Jeget tenni a homlokra'],correct:1,diff:1,explain:'Orrvérzésnél a fejet előre kell hajtani (ne hátra!), és az orrnyílások lágy részeit 5–10 percig össze kell nyomni.'},{text:'Milyen mély legyen a mellkaskompresszió felnőttnél?',opts:['1–2 cm','4–5 cm','8–10 cm','2–3 cm'],correct:1,diff:2,explain:'Felnőttnél a mellkas benyomásának mélysége 4–5 cm – ha sekélyebb, nem hatékony; ha mélyebb, bordatörést okozhat.'},{text:'Mi a különbség a verőér- és gyűjtőér-vérzés között?',opts:['Nincs különbség','Verőérnél szivárog, gyűjtőérnél spriccel','Verőérnél spriccel, gyűjtőérnél szivárog','Mindkettő egyformán spriccel'],correct:2,diff:2,explain:'Verőér-vérzésnél (artéria) a vér lüktetve spriccel a sebből. Gyűjtőér-vérzésnél (véna) a vér folyamatosan szivárog.'},{text:'Milyen testhelyzetbe kell fektetni ájult beteget?',opts:['Félülő helyzetbe','Stabil oldalfekvés','Hanyatt fektetés, lábak felemelve','Hasra fektetés'],correct:2,diff:2,explain:'Ájulásnál hanyatt fektetés + lábak felemelése segít a vér agyba visszaáramlásában, enyhítve az ájulás tüneteit.'},{text:'Hány másodpercig vizsgáljuk a légzést az újraélesztés előtt?',opts:['5 másodpercig','10 másodpercig','30 másodpercig','60 másodpercig'],correct:1,diff:3,explain:'A légzést legfeljebb 10 másodpercig vizsgáljuk – ha ennyi idő alatt nem látható/hallható/érezhető légzés, azonnal meg kell kezdeni az újraélesztést.'},{text:'Milyen sebességgel kell végezni a mellkaskompressziót?',opts:['50–60/perc','80–90/perc','100–120/perc','150–160/perc'],correct:2,diff:3,explain:'A mellkaskompresszió ajánlott sebessége 100–120/perc – kb. 2 kompresszió másodpercenként.'},{text:'Mi az egységes európai segélyhívó szám?',opts:['104','107','112','911'],correct:2,diff:1,explain:'A 112 az egységes európai segélyhívó szám – mentő, rendőrség és tűzoltóság egyaránt elérhető ezen.'}],fill:[{diff:1,parts:['Az újraélesztés egy ciklusa: ',{id:0},' mellkaskompresszió + 2 befújás.'],gaps:[{id:0,correct:'30',options:['30','15','20','10']}]},{diff:1,parts:['Orrvérzésnél a fejet ',{id:0},' kell hajtani.'],gaps:[{id:0,correct:'előre',options:['előre','hátra','oldalra','egyenesen']}]},{diff:1,parts:['Az egységes európai segélyhívó szám a ',{id:0},'.'],gaps:[{id:0,correct:'112',options:['112','104','107','911']}]},{diff:2,parts:['Eszméletlen, de lélegző beteget ',{id:0},' kell helyezni.'],gaps:[{id:0,correct:'stabil oldalfekvésbe',options:['stabil oldalfekvésbe','hanyatt','félülő helyzetbe','hasra']}]},{diff:2,parts:['A mellkaskompressziót felnőttnél ',{id:0},' cm mélyen kell végezni.'],gaps:[{id:0,correct:'4–5',options:['4–5','1–2','8–10','6–7']}]},{diff:2,parts:['Ájulásnál hanyatt fektetés + ',{id:0},' felemelése segít.'],gaps:[{id:0,correct:'lábak',options:['lábak','karok','fej','mellkas']}]},{diff:3,parts:['A mellkaskompresszió ajánlott sebessége ',{id:0},' ütés/perc.'],gaps:[{id:0,correct:'100–120',options:['100–120','50–60','150–160','200–220']}]},{diff:3,parts:['Verőér-vérzésnél a vér ',{id:0},' a sebből, gyűjtőér-vérzésnél szivárog.'],gaps:[{id:0,correct:'spriccel',options:['spriccel','szivárog','csöpög','ömlik']}]}],sort:[{diff:1,question:'Rendezd sorba az újraélesztés lépéseit!',items:['30 kompresszió + 2 befújás ismétlése','Életjelenségek vizsgálata','Légzésvizsgálat (10 mp)','112 hívása'],correct:[1,3,2,0],explain:'Életjelenségek vizsgálata → 112 hívása → légzésvizsgálat (10 mp) → 30 kompresszió + 2 befújás ismétlése.'},{diff:2,question:'Rendezd sorba a vérzéscsillapítás lépéseit gyűjtőér-vérzésnél!',items:['Nyomókötés felhelyezése','Beteg lefektetése','Steril gézlap a sebre','Vérző testrész felemelése'],correct:[1,3,2,0],explain:'Beteg lefektetése → vérző testrész felemelése → steril gézlap a sebre → nyomókötés felhelyezése.'},{diff:3,question:'Rendezd sorba az ájulás észlelésétől a segítségnyújtásig!',items:['Lábak felemelése','Hanyatt fektetés','Ájulás tüneteinek észlelése (sápadtság, szédülés)','Orvos/mentő értesítése ha nem tér magához'],correct:[2,1,0,3],explain:'Tünetek észlelése → hanyatt fektetés → lábak felemelése → orvos értesítése (ha nem tér magához).'}],cat:[{diff:1,question:'Sorold be: melyik ELSŐSEGÉLY-HELYZETHEZ tartozik?',boxYes:'😮 Eszméletlen / Újraélesztés',boxNo:'🩸 Vérzés / Ájulás',items:[{text:'Stabil oldalfekvés',correct:true},{text:'Nyomókötés',correct:false},{text:'30 kompresszió + 2 befújás',correct:true},{text:'Lábak felemelése',correct:false},{text:'Légzésvizsgálat',correct:true},{text:'Gézlap a sebre',correct:false}],explain:'Eszméletlen/újraélesztés: stabil oldalfekvés, 30+2, légzésvizsgálat. Vérzés/ájulás: nyomókötés, lábak emelése, gézlap.'},{diff:2,question:'Sorold be: VERŐÉR-VÉRZÉS vagy GYŰJTŐÉR-VÉRZÉS jellemzője?',boxYes:'💥 Verőér-vérzés',boxNo:'💧 Gyűjtőér-vérzés',items:[{text:'Vér spriccel',correct:true},{text:'Vér szivárog',correct:false},{text:'Ér nyomása csonthoz',correct:true},{text:'Steril gézlap elég',correct:false},{text:'Lüktető vérzés',correct:true},{text:'Folyamatos szivárgás',correct:false}],explain:'Verőér: spriccel, lüktető, ér nyomása csonthoz. Gyűjtőér: szivárog, folyamatos, steril gézlap.'},{diff:3,question:'Sorold be: HELYES elsősegély-eljárás vagy HELYTELEN?',boxYes:'✅ Helyes',boxNo:'❌ Helytelen',items:[{text:'Orrvérzésnél fej előre',correct:true},{text:'Eszméletlen légzőt újraéleszteni',correct:false},{text:'Ájulásnál lábak felemelése',correct:true},{text:'Mellkaskompressziónál karok hajlítva',correct:false},{text:'Légzés vizsgálata max. 10 mp',correct:true},{text:'Orrvérzésnél fej hátra',correct:false}],explain:'Helyes: orrvérzésnél fej előre, ájulásnál lábak felemelése, légzés 10 mp. Helytelen: lélegző beteget újraéleszteni, karok hajlítva, orrvérzésnél hátra.'}]},
      {id:13,icon:'💡',title:'Érdekességek testünkről és életműködéseinkről',ready:true,tananyag:{bevezeto:'Ez az összefoglaló altéma az összes tanult szervrendszert áttekinti. Bőr: védelem, hőszabályozás, érzékelés (3 réteg: hámréteg, irharéteg, bőralja). Mozgásszervrendszer: csontváz + vázizomzat, ízületek. Emésztőrendszer: szájtól a végbélig; tápanyagok felszívása a vékonybélben. Légzőrendszer: orrüreg→légcső→hörgők→léghólyagok; gázcsere. Vérkeringés: szív + erek; kisvérkör (tüdő) + nagyvérkör (test); vörösvérsejt=oxigén, fehérvérsejt=védelem. Kiválasztás: vese→vizelet. Idegrendszer: agy + gerincvelő irányítja az összes folyamatot; látás (szem) és hallás (fül). Nemi szervek: petefészek/here→megtermékenyülés→méhen belüli fejlődés. Egyedfejlődés: zigóta→embrió→magzat→születés→serdülőkor. Fertőzés/járvány: kórokozók, immunrendszer, védőoltás, karantén. Elsősegély: 112, újraélesztés (30+2), stabil oldalfekvés, nyomókötés.',bevezeto_kep:'',bevezeto_kep_felirat:'',fogalmak:[{nev:'Bőr',leiras:'Testünk külső védőrétege – véd, hőt szabályoz, érzékel (hámréteg, irharéteg, bőralja).',kep:''},{nev:'Csontváz',leiras:'Testünk merevítő váza – tartást ad és védi a belső szerveket.',kep:''},{nev:'Izom',leiras:'Összehúzódásra és elernyedésre képes szövet, amely lehetővé teszi a mozgást.',kep:''},{nev:'Emésztés',leiras:'A táplálék lebontása kisebb, felszívható részekre – a vékonybélben szívódnak fel a tápanyagok.',kep:''},{nev:'Légzés',leiras:'Oxigén felvétele és szén-dioxid leadása – a léghólyagokban zajlik a gázcsere.',kep:''},{nev:'Vérkeringés',leiras:'A szív és az erek rendszere, amely szállítja az oxigént, tápanyagokat és elviszi a salakanyagokat.',kep:''},{nev:'Kiválasztás',leiras:'A felesleges és káros anyagok eltávolítása – főként a vesén keresztül (vizelet).',kep:''},{nev:'Idegrendszer',leiras:'Az agyból és gerincvelőből álló rendszer, amely irányítja és összehangolja a test összes működését.',kep:''},{nev:'Érzékszerv',leiras:'Speciális szervek, amelyek a külvilág ingereit fogják fel (szem=látás, fül=hallás, bőr=tapintás).',kep:''},{nev:'Immunrendszer',leiras:'A szervezet védekező rendszere – felismeri és elpusztítja a kórokozókat, emlékezik a korábbi fertőzésekre.',kep:''},{nev:'Elsősegély',leiras:'Azonnali segítségnyújtás sérülés vagy rosszullét esetén – a mentők megérkezéséig életmentő lehet.',kep:''},{nev:'Megtermékenyítés',leiras:'A hímivarsejt és a petesejt egyesülése – ebből fejlődik a zigóta, majd az embrió és a magzat.',kep:''}],erdekes:'💡 Összefoglaló érdekességek: A bőr az emberi test legnagyobb szerve! A vékonybél kb. 6–7 méter hosszú. Naponta kb. 20 000-szer lélegzünk. A szív egy életen át kb. 2,5 milliárd-szor dobban. A vesék naponta kb. 180 liter vért szűrnek át. Az agyunk egészen 25 éves korig fejlődik. Egy nő élete során kb. 400–500 petesejtet érlel meg. Az emberi testben 206 csont és kb. 640 izom van!',erdekes_kep:'',erdekes_kep_felirat:''},tf:[{text:'A bőr a test legnagyobb szerve.',answer:true,diff:1,explain:'Igen! A bőr (kültakaró) az emberi test legnagyobb szerve – a teljes testfelületet beborítja.'},{text:'A tápanyagok a vastagbélben szívódnak fel.',answer:false,diff:1,explain:'Nem! A tápanyagok a VÉKONYBÉLBEN szívódnak fel a vérbe. A vastagbélben víz szívódik fel és a széklet képződik.'},{text:'A gázcsere a léghólyagokban (alveolusokban) zajlik.',answer:true,diff:1,explain:'Igen! Az alveolusokban kerül az oxigén a vérbe és a szén-dioxid a levegőbe.'},{text:'A vörösvérsejtek a szervezet védekezéséért felelnek.',answer:false,diff:1,explain:'Nem! A FEHÉRVÉRSEJTEK felelnek a védekezésért (immunrendszer). A vörösvérsejtek oxigént szállítanak.'},{text:'Az újraélesztés egy ciklusa 30 kompresszió + 2 befújás.',answer:true,diff:1,explain:'Igen! Az újraélesztés standardizált ciklusa: 30 mellkaskompresszió + 2 befújás – ismételve a mentők megérkezéséig.'},{text:'Az idegrendszer csak a mozgást irányítja.',answer:false,diff:2,explain:'Nem! Az idegrendszer irányítja az összes életfunkciót – légzést, szívverést, érzékelést, gondolkodást, mozgást egyaránt.'},{text:'A kisvérkörben a vér a tüdőben oxigénnel telítődik.',answer:true,diff:2,explain:'Igen! A kisvérkör a szív és a tüdő közötti kör – itt adja le a szén-dioxidot és veszi fel az oxigént.'},{text:'A megtermékenyülés után a zigóta az anyaméhben fejlődik tovább.',answer:true,diff:2,explain:'Igen! A zigóta → embrió → magzat fejlődési sorban az anyaméh biztosítja a fejlődés helyét kb. 9 hónapig.'},{text:'A védőoltás azonnal meggyógyítja a betegséget.',answer:false,diff:2,explain:'Nem! A védőoltás MEGELŐZ – az immunrendszert készíti fel a jövőbeli fertőzésre, de aktív betegséget nem gyógyít.'},{text:'A vese naponta kb. 180 liter vért szűr át.',answer:true,diff:3,explain:'Igen! A vese óriási szűrőteljesítménnyel dolgozik – naponta ~180 liter elsődleges szűrletet termel, de ebből csak 1–2 liter marad vizelet.'},{text:'Az agyunk 18 éves korra teljesen kifejlődik.',answer:false,diff:3,explain:'Nem! Az agy egészen kb. 25 éves korig fejlődik – a döntéshozatalért felelős frontális lebeny a legkésőbb érik.'},{text:'Az elsődleges nemi jellegek a serdülőkorban jelennek meg.',answer:false,diff:2,explain:'Nem! Az elsődleges nemi jellegek (nemi szervek) SZÜLETÉSTŐL megvannak. A serdülőkorban a másodlagos nemi jellegek jelennek meg.'}],quiz:[{text:'Melyik szervrendszer fő feladata a gázcsere?',opts:['Emésztőrendszer','Keringési rendszer','Légzőszervrendszer','Kiválasztó rendszer'],correct:2,diff:1,explain:'A légzőszervrendszer végzi a gázcserét – a léghólyagokban oxigén kerül a vérbe, szén-dioxid a levegőbe.'},{text:'Hol szívódnak fel a tápanyagok?',opts:['Gyomorban','Vastagbélben','Vékonybélben','Szájüregben'],correct:2,diff:1,explain:'A tápanyagok a vékonybélben szívódnak fel a vérbe, amelyet a keringési rendszer szállít el a sejtekhez.'},{text:'Mi a fehérvérsejtek feladata?',opts:['Oxigénszállítás','Védekezés a kórokozók ellen','Tápanyagszállítás','Szén-dioxid szállítása'],correct:1,diff:1,explain:'A fehérvérsejtek az immunrendszer részei – felismerik és elpusztítják a kórokozókat.'},{text:'Mi a kisvérkör?',opts:['A szív és a test sejtjei közötti kör','A szív és a tüdő közötti kör','A vese és a szív közötti kör','A gyomor és a szív közötti kör'],correct:1,diff:2,explain:'A kisvérkör a szív és a tüdő közötti vérkörzés – itt telítődik a vér oxigénnel.'},{text:'Melyik szervrendszer irányítja az összes életfunkciót?',opts:['Keringési rendszer','Légzőszervrendszer','Idegrendszer','Kiválasztó rendszer'],correct:2,diff:2,explain:'Az idegrendszer (agy + gerincvelő) irányítja és koordinálja az összes életfunkciót – légzést, szívverést, érzékelést, mozgást.'},{text:'Mi a stabil oldalfekvés célja?',opts:['Fájdalom csökkentése','Légutak szabadon tartása eszméletlen lélegző betegnél','Vérnyomás csökkentése','Újraélesztés megkönnyítése'],correct:1,diff:2,explain:'A stabil oldalfekvés eszméletlen, de lélegző betegnek biztosít biztonságos pozíciót, hogy a légutak szabadok maradjanak.'},{text:'Melyik fejlődési sorrendben jön létre az új emberi élet?',opts:['Embrió→Zigóta→Magzat','Zigóta→Magzat→Embrió','Zigóta→Embrió→Magzat','Magzat→Embrió→Zigóta'],correct:2,diff:2,explain:'Helyes sorrend: zigóta (megtermékenyített petesejt) → embrió (korai fejlődés) → magzat (születésig).'},{text:'Melyik szervrendszer betegsége a gerincferdülés?',opts:['Légzőszervrendszer','Mozgásszervrendszer','Vérkeringési rendszer','Idegrendszer'],correct:1,diff:3,explain:'A gerincferdülés a mozgásszervrendszer (gerinc) betegsége – a gerincoszlop oldalirányú görbülete.'},{text:'Melyik NEM a bőr feladata?',opts:['Védelem','Hőszabályozás','Gázcsere','Érzékelés'],correct:2,diff:3,explain:'A gázcsere a légzőszervrendszer feladata (léghólyagokban). A bőr feladata: védelem, hőszabályozás, érzékelés.'},{text:'Mi a karantén?',opts:['Védőoltás fajtája','Fertőzöttek elkülönítése a betegség terjedésének megakadályozásához','Gyógyszer neve','Az immunrendszer egyik sejtje'],correct:1,diff:2,explain:'A karantén a fertőzöttek (vagy fertőzöttnek vélt személyek) elkülönít let playerName='', currentBigTopic=null, currentTopic=null, mode='';
